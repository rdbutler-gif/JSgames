<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outpost by Rusko</title>
<style>
  :root {
    --bg:        #2b3a4a;
    --panel:     #3a5169;
    --ink:       #ffffff;
    --ink-dim:   #b8c9d9;
    --line:      #24313f;
    --wood:      #e09a4a;
    --stone:     #9fb0c0;
    --gold:      #ffcf3f;
    --silver:    #d8e0e8;
    --bronze:    #d98a48;
    --accent:    #5fc55f;
    --select:    #ffe08a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: #1a2530;
    color: var(--ink);
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #1a2530; border-radius: 10px; image-rendering: pixelated;
    max-width: 100%; touch-action: none; cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
  <canvas id="game" width="768" height="720"></canvas>

<script>
(() => {
  "use strict";

  // ---- Grid / config ----------------------------------------------------
  const TILE = 48;              // 16px source tile * 3 = clean 3x

  // The VIEWPORT is the fixed visible window: always 16x12 tiles (768x576).
  // The WORLD can be larger than the viewport on later levels; the camera picks
  // which slice of the world shows. worldCols/worldRows are set per-level.
  const VIEW_COLS = 16, VIEW_ROWS = 12;
  let worldCols = 16, worldRows = 12;   // set from LEVELS[currentLevel].cols/rows

  // ---- Canvas regions ---------------------------------------------------
  const HUD_H = 60, BUILD_H = 84;
  const VIEW_W = VIEW_COLS * TILE;            // 768 — fixed visible width
  const VIEW_H = VIEW_ROWS * TILE;            // 576 — fixed visible height
  const VIEW_Y = HUD_H;                       // play viewport starts below HUD
  const CANVAS_W = VIEW_W;
  const CANVAS_H = HUD_H + VIEW_H + BUILD_H;  // 720

  const canvas = document.getElementById("game");
  canvas.width = CANVAS_W; canvas.height = CANVAS_H;
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;   // crisp pixel-art scale-up

  // ---- Camera (world<->screen). The camera offset (in world pixels) selects
  // which part of a larger-than-viewport world is drawn. Clamped so it never
  // shows past the world edges. On a world that fits the viewport it stays 0,0.
  const camera = { x: 0, y: 0 };
  const worldPxW = () => worldCols * TILE;
  const worldPxH = () => worldRows * TILE;
  function clampCamera() {
    // If the world is smaller than the viewport in a dimension, pin to 0.
    camera.x = Math.max(0, Math.min(camera.x, Math.max(0, worldPxW() - VIEW_W)));
    camera.y = Math.max(0, Math.min(camera.y, Math.max(0, worldPxH() - VIEW_H)));
  }
  // world tile (tx,ty) -> screen pixel (top-left of that tile)
  const wsx = (tx) => tx*TILE - camera.x;
  const wsy = (ty) => ty*TILE - camera.y + VIEW_Y;
  // screen pixel -> world tile
  function screenToTile(sx, sy) {
    // Use the same whole-pixel camera the renderer uses, so the tile the player
    // taps is exactly the tile drawn under the cursor.
    const cx = Math.round(camera.x), cy = Math.round(camera.y);
    return { tx: Math.floor((sx + cx)/TILE),
             ty: Math.floor((sy - VIEW_Y + cy)/TILE) };
  }
  function regionAt(sy) {
    if (sy < HUD_H) return "hud";
    if (sy >= HUD_H + VIEW_H) return "build";
    return "grid";
  }

  // ---- Audio (Web Audio API synthesis) ---------------------------------
  // One AudioContext, a library of named effects built from oscillators + noise
  // with shaped envelopes. No files — clean and portable. Browsers start the
  // context "suspended" until a user gesture, so we resume it on first click.
  // Real recorded music cues can be added later alongside these without touching
  // the call sites. Effects are called as sfx.chop(), sfx.deposit(), etc.
  const sfx = (() => {
    let ctx = null, master = null, muted = false;
    function ensure() {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctx = new AC();
        master = ctx.createGain();
        master.gain.value = 0.35;         // overall headroom
        master.connect(ctx.destination);
      }
      if (ctx.state === "suspended") ctx.resume();
      return ctx;
    }
    // A single enveloped oscillator voice.
    function tone(freq, t0, dur, { type="sine", gain=0.5, glideTo=null, attack=0.005, release=null } = {}) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t0);
      if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
      const rel = release ?? dur;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(gain, t0 + attack);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + rel);
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0 + rel + 0.02);
    }
    // A short filtered noise burst (for impacts: chops, breaks, mining).
    function noise(t0, dur, { gain=0.5, type="lowpass", freq=1200, q=1 } = {}) {
      const n = Math.floor(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, n, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n); // decaying
      const src = ctx.createBufferSource(); src.buffer = buf;
      const f = ctx.createBiquadFilter(); f.type = type; f.frequency.value = freq; f.Q.value = q;
      const g = ctx.createGain(); g.gain.value = gain;
      src.connect(f); f.connect(g); g.connect(master);
      src.start(t0); src.stop(t0 + dur + 0.02);
    }
    // Wrap each effect so a suspended/absent context never throws at a call site.
    function play(fn) {
      if (muted) return;
      const c = ensure(); if (!c) return;
      try { fn(c.currentTime); } catch (e) {}
    }
    return {
      resume() { if (!muted) ensure(); },
      toggleMute() { muted = !muted; if (muted && ctx) master.gain.value = 0; else if (ctx) master.gain.value = 0.35; return muted; },
      isMuted() { return muted; },
      // ---- gameplay effects ----
      chop()    { play(t => { noise(t, 0.12, { gain:0.5, type:"lowpass", freq:800, q:2 }); tone(180, t, 0.10, { type:"triangle", gain:0.25, glideTo:90 }); }); },
      mine()    { play(t => { noise(t, 0.10, { gain:0.55, type:"bandpass", freq:2200, q:3 }); tone(320, t, 0.06, { type:"square", gain:0.15, glideTo:160 }); }); },
      wallHit() { play(t => { noise(t, 0.14, { gain:0.5, type:"lowpass", freq:500, q:1 }); tone(120, t, 0.12, { type:"square", gain:0.2, glideTo:70 }); }); },
      wallBreak(){ play(t => { noise(t, 0.45, { gain:0.7, type:"lowpass", freq:1400, q:0.7 }); tone(90, t, 0.4, { type:"sawtooth", gain:0.25, glideTo:45 }); }); },
      deposit() { play(t => { tone(523, t, 0.08, { type:"sine", gain:0.3 }); tone(784, t+0.06, 0.10, { type:"sine", gain:0.3 }); }); },
      place()   { play(t => { tone(300, t, 0.07, { type:"square", gain:0.25, glideTo:420 }); }); },
      build()   { play(t => { tone(440, t, 0.10, { type:"triangle", gain:0.3 }); tone(660, t+0.09, 0.12, { type:"triangle", gain:0.3 }); tone(880, t+0.2, 0.14, { type:"triangle", gain:0.3 }); }); },
      win()     { play(t => { [523,659,784,1047].forEach((f,i)=> tone(f, t+i*0.12, 0.22, { type:"triangle", gain:0.32 })); }); },
      click()   { play(t => { tone(660, t, 0.04, { type:"square", gain:0.18 }); }); },
      blocked() { play(t => { tone(200, t, 0.12, { type:"sawtooth", gain:0.22, glideTo:140 }); }); },
    };
  })();

  let NEED_WOOD = 15, NEED_STONE = 10;   // tower cost — set per-level from LEVELS[currentLevel].cost
  const TOWER_BUILD_MS = 6000;             // effort for ONE worker; N workers finish in TOWER_BUILD_MS/N (linear)
  const THALL_BUILD_MS = 14000;            // town-hall section: deliberately long — a whole-crew job
  const THALL_COST = { wood: 12, stone: 8 };  // per section (6 sections total)
  let GOLD_SEC = 90, SILVER_SEC = 140;   // star time thresholds — set per-level from LEVELS[currentLevel].stars

  // ---- Buildable types (build menu) -------------------------------------
  // Tower is intentionally NOT here — it's pre-placed and is the win goal.
  // Room left to add more types later.
  const BUILDINGS = {
    house:    { label: "House",    tile: 74,  wood: 8,  stone: 0, desc: "+1 worker" },
    workshop: { label: "Workshop", tile: 57,  wood: 15, stone: 0, desc: "unlocks rock mining" },
  };
  // Upgrading an existing L1 workshop to L2 (enables wall-breaking).
  const WORKSHOP_UPGRADE = { wood: 8, stone: 6, tile: 102 };
  // Upgrading a house (on levels where maxHouseLevel > 1) makes that house's
  // worker walk twice as fast. Per-house: the boost follows the resident worker.
  const HOUSE_UPGRADE = { wood: 20, stone: 10 };
  let buildMode = null;     // key into BUILDINGS while placing, else null
  let hoverCell = null;     // {x,y} cell under cursor during build mode
  let workshopLevel = 0;    // 0 = none, 1 = rock mining, 2 = wall breaking

  // Camera drag-to-pan state. A press that moves past DRAG_THRESH px becomes a
  // pan (works for mouse and touch); a press that stays put is a click/dispatch.
  const DRAG_THRESH = 6;
  let drag = null;   // { startX, startY, camX, camY, panning } while a pointer is down in the grid
  let buildHint = "";       // instruction text shown in the build bar
  let timerStr = "0:00";    // current elapsed time, formatted
  let winStars = 0;         // stars earned on the win screen
  let winTimeStr = "";      // finish time text for the win screen
  let mouse = { x: -1, y: -1 };   // last-known mouse pos (screen px) for hover

  // ---- Sprite sheet -----------------------------------------------------
  // Tiny Town: 16x16 tiles, 1px spacing -> stride 17. Sheet is 12 cols x 11 rows.
  const SRC = 16, GAP = 1, STRIDE = SRC + GAP;   // 17px per tile step
  const SHEET_COLS = 12, SHEET_ROWS = 11, SHEET_N = SHEET_COLS * SHEET_ROWS;

  const sheet = new Image();
  let sheetReady = false;
  sheet.onload  = () => { sheetReady = true; };
  sheet.onerror = () => { sheetReady = false; console.warn("tilemap.png not found — using placeholder shapes"); };
  sheet.src = "assets/tilemap.png";   // repo-relative; loads over https on Pages / localhost

  // Second sheet: Tiny Dungeon (characters). Same 16px / 1px / 12-wide layout.
  const charSheet = new Image();
  let charReady = false;
  charSheet.onload  = () => { charReady = true; };
  charSheet.onerror = () => { charReady = false; console.warn("dungeon.png not found — worker stays primitive"); };
  charSheet.src = "assets/dungeon.png";

  // index (0..131) -> source pixel origin on the sheet
  function srcXY(idx) {
    const c = idx % SHEET_COLS, r = (idx / SHEET_COLS) | 0;
    return { sx: c * STRIDE, sy: r * STRIDE };
  }
  // draw sheet tile `idx` into grid cell (gx,gy), scaled to TILE.
  // img/ready default to the terrain sheet; pass charSheet/charReady for characters.
  function blit(idx, gx, gy, img = sheet, ready = sheetReady) {
    if (idx == null || !ready) return;
    const { sx, sy } = srcXY(idx);
    ctx.drawImage(img, sx, sy, SRC, SRC, gx*TILE, gy*TILE, TILE, TILE);
  }

  // ---- Tile index map (PLACEHOLDER — fill from debug picker) -------------
  // Set any of these to a real sheet index (0..131) once you've read them
  // off the picker. Leave as null to fall back to the drawn primitive.
  const TILEMAP = {
    ground: 0,      // grassempty
    tree:   28,     // treegreensingle
    rock:   43,     // rock pile
    wall:   77,     // destructible wall — full-height barrier
    store:  74,     // single-tile structure
    tower:  102,    // single-tile structure
    towerSite: null,
    worker: 86,     // Tiny Dungeon character (on dungeon.png / charSheet)
  };

  // Ground: green grass everywhere, ~20% chance of a flower/plant accent.
  // Rolled once per level so it doesn't flicker.
  const GRASS = 0, PLANT = 1, FLOWER = 2;
  let groundTiles = null;   // Map "x,y" -> tile idx, stable for the level

  function rollGround() {
    groundTiles = new Map();
    for (let y=0; y<worldRows; y++) for (let x=0; x<worldCols; x++) {
      let t = GRASS;
      if (Math.random() < 0.10) t = Math.random() < 0.5 ? PLANT : FLOWER;
      groundTiles.set(key(x,y), t);
    }
  }

  function groundTile(x, y) {
    return (groundTiles && groundTiles.get(key(x,y))) ?? GRASS;
  }

  // Debug picker: D toggles it, T flips which sheet it shows.
  let showPicker = false;
  let pickerSheet = 0;   // 0 = terrain (tilemap), 1 = characters (dungeon)
  const _keysDown = new Set();   // track held keys so we can detect chords (O+P)
  window.addEventListener("keydown", (e) => {
    if (e.key === "d" || e.key === "D") { showPicker = !showPicker; }
    if (e.key === "t" || e.key === "T") { pickerSheet = pickerSheet ? 0 : 1; }

    // Cheat: O + P held together = "overpowered" -> unlock every level for play.
    // Keyboards fire one keydown per key, so we detect the chord by checking
    // whether the other key is currently held. Toggles, so pressing again relocks.
    const k = e.key.toLowerCase();
    if (k === "o" || k === "p" || k === "x") {
      _keysDown.add(k);
      if (_keysDown.has("o") && _keysDown.has("p")) {
        allUnlocked = !allUnlocked;
        if (typeof setMsg === "function") {
          setMsg(allUnlocked ? "OVERPOWERED — all levels unlocked" : "Cheat off — normal unlock rules");
        }
      }
      // X + P on the level-select screen = arm "export level" mode: installed
      // level cells highlight, and clicking one dumps its builder-ready data.
      if (_keysDown.has("x") && _keysDown.has("p") && screen === "levelSelect") {
        exportMode = !exportMode;
        selectMsg = { text: exportMode ? "EXPORT MODE — click a level to copy its data"
                                       : "Export mode off", born: performance.now() };
      }
    }
  });
  window.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    if (k === "o" || k === "p" || k === "x") _keysDown.delete(k);
  });

  // Tile types
  const EMPTY = 0, TREE = 1, ROCK = 2, RUBBLE = 3, TOWER = 4, STOCK = 5, BUILDING = 6, THALL = 7;
  // STOCK is a historical name — this tile type actually means "a house sits here."
  // The real stockpile is res.wood/res.stone in the HUD, not a tile. HOUSE is the
  // honest alias; both point at the same value so existing code keeps working and
  // new code can read clearly. Prefer HOUSE going forward.
  const HOUSE = STOCK;

  // ---- Level definitions ------------------------------------------------
  // A level is DATA, not code — the engine below reads one of these to build a
  // playable map. LEVELS[0] is the original hardcoded level 1, lifted verbatim;
  // adding a level = adding an entry here (no new code paths). cols/rows set the
  // WORLD size per level; the camera scrolls when the world exceeds the viewport.
  const LEVELS = [
    {
      name: "The Clearing",
      subtitle: "LEVEL 1",
      clearText: "Level Cleared",   // shown on the level-complete screen
      goal: "Rebuild the Watchtower",   // one-line objective on the intro screen
      blurb: "The frontier has gone quiet, and the old watchtower lies in ruin. " +
             "Clear the wilderness, gather timber and stone, and put your settlers " +
             "to work. Raise a workshop, break through the ridge, and rebuild the " +
             "watchtower to reclaim the clearing.",
      cols: 16, rows: 12,
      startHouse: { x: 2, y: 6 },     // worker 1's home (also the stockpile cell)
      tower:      { x: 13, y: 6 },    // build target / win goal
      wallCol: 8,                     // full-height destructible wall column
      trees: [[5,2],[6,3],[4,4],[3,3],[11,2],[12,4],[10,9]],
      rocks: [[11,9],[12,8],[5,9],[6,10],[13,3]],
      cost:  { wood: 15, stone: 10 }, // tower cost
      stars: { gold: 100, silver: 150 }, // 1:40 gold, 2:30 silver
      intro: "Click a tree or rock to send your nearest free worker to gather it. " +
             "Use the BUILD bar below to place a house (more workers) or a workshop " +
             "(unlocks stone, then wall-breaking). Gather 15 wood + 10 stone, then " +
             "click the TOWER to raise it and win.",
    },
    // ===== LEVEL 2 =====================================================
    {
      name: "The Expanse",
      subtitle: "LEVEL 2",
      clearText: "The Expanse Settled",
      goal: "Build 5 Houses, Clear the Wall, Raise the Watchtower",
      blurb: "Word of the reclaimed clearing has spread, and villagers are moving " +
             "in to help tame the wider expanse. Put the whole crew to work — raise " +
             "homes for the newcomers, break down the long wall that splits the land, " +
             "and rebuild a watchtower on the far side to keep the growing settlement safe.",
      cols: 24, rows: 18,
      startHouse: { x: 2, y: 3 },
      tower:      { x: 20, y: 12 },     // far side, beyond the wall
      wallCol: 11,                      // full-height wall dividing the map
      // West of the wall: wood to build houses + the workshop, and one rock so
      // the workshop can be upgraded to L2 (needed to break the wall).
      trees: [[3,6],[4,8],[2,10],[5,11],[3,13],[6,5],[4,2],[7,9],[5,15],[8,13]],
      rocks: [[6,7], [4,5], [8,10], [3,15]],   // 4 rocks = 24 stone: 6 for the workshop upgrade, 10 for the tower, buffer to spare
      cost:  { wood: 15, stone: 10 },   // tower cost
      stars: { gold: 160, silver: 210 },   // 2:40 gold, 3:30 silver
      // Tower is gated: settle the outpost (5 houses) and clear the whole wall
      // before it will accept builders.
      objectives: { houses: 5, clearWalls: true },
      intro: "THE EXPANSE — click and drag the map to explore new area. " +
             "Settlers are moving in: build 5 houses (one per worker — meet all " +
             "five!), upgrade a workshop to break through the wall, clear every " +
             "wall section, then raise a new watchtower on the far side to win.",
    },
    // ===== LEVEL 3 =====================================================
    {
      name: "The Town Hall",
      subtitle: "LEVEL 3",
      clearText: "Town Hall Raised",
      goal: "Assemble the Town Hall (all 6 sections)",
      blurb: "The settlement has outgrown its clearing. It's time to raise a proper " +
             "Town Hall at the heart of the territory — a great timber-and-stone hall " +
             "that will take the whole crew and a mountain of materials to assemble. " +
             "Harvest the thick forests in every corner, quarry the stone ringing the " +
             "site, and build all six sections of the hall to complete the outpost.",
      cols: 24, rows: 18,
      startHouse: { x: 2, y: 2 },
      tower: null,   // no tower this level — the town hall is the goal
      wallCol: -1,   // no wall this level
      nodeHpMult: 2, // thick forests / dense rock — twice the harvest time
      // Town hall: 2 wide x 3 tall, anchored so it sits centered on a 24x18 map.
      // tiles listed row-major from the anchor: [left,right] per row, top->bottom.
      townhall: {
        anchor: { x: 11, y: 7 },
        tiles: [ [100,100], [111,112], [123,124] ],
      },
      // Tree clusters in all four corners.
      trees: [
        [2,5],[3,5],[2,6],[4,6],[3,7],
        [20,4],[21,5],[22,5],[21,6],[20,6],
        [2,13],[3,14],[2,15],[4,14],[3,15],
        [20,13],[21,14],[22,14],[21,15],[20,15],
      ],
      // Rocks circling the town-hall site (center ~11-12, 7-9).
      rocks: [
        [9,6],[11,5],[13,6],[14,8],[14,10],[13,11],[11,12],[9,11],[8,9],[9,8],
      ],
      cost:  { wood: 0, stone: 0 },
      stars: { gold: 300, silver: 480 },
      objectives: null,
      // decoration layer (added in builder): border trim around the map edges.
      // [x, y, sheetIndex(0=tilemap,1=dungeon), tileIndex]
      deco: [[0,0,0,27],[1,0,0,27],[2,0,0,27],[3,0,0,27],[20,0,0,27],[21,0,0,27],[22,0,0,27],[23,0,0,27],[0,1,0,27],[1,1,0,27],[22,1,0,27],[23,1,0,27],[0,2,0,27],[23,2,0,27],[0,3,0,27],[23,3,0,27],[0,14,0,27],[23,14,0,27],[0,15,0,27],[23,15,0,27],[0,16,0,27],[1,16,0,27],[22,16,0,27],[23,16,0,27],[0,17,0,27],[1,17,0,27],[2,17,0,27],[3,17,0,27],[20,17,0,27],[21,17,0,27],[22,17,0,27],[23,17,0,27]],
      intro: "THE TOWN HALL — click and drag to explore. Chop the corner forests for " +
             "wood, build a workshop so your crew can mine the ring of stone, then click " +
             "each of the six shadowed Town Hall sections in the center to assemble it. " +
             "Every section is a long build — put your whole crew on it. Finish all six to win.",
    },

    // ---- LEVEL 4 — first import from the Outpost Level Builder ----
    // A pathing test: buildings and fences (the solid mask) force the crew to
    // wind through the settlement, and the tower sits in a pocket of rock they
    // must harvest through to reach. Goal: gather enough to raise the tower.
    {
      name: "The Warren",
      subtitle: "LEVEL 4",
      clearText: "The Warren Cleared",
      goal: "Build the Watchtower",
      blurb: "The old settlement is a maze of walls and half-built structures. " +
             "Somewhere past them, on a shelf of stone, the tower must rise.",
      cols: 24, rows: 18,
      startHouse: { x: 4, y: 16 },
      tower:      { x: 3, y: 2 },
      wallCol: -1,
      trees: [[23,3],[0,7],[22,7],[23,8],[1,9],[0,10],[21,10],[22,10],[22,11],[23,13],[23,14]],
      rocks: [[3,1],[2,2],[4,2],[3,3],[22,9],[22,16],[23,17]],
      cost:  { wood: 40, stone: 20 },
      stars: { gold: 180, silver: 300 },

      intro: "THE WINDING ROAD — a longer haul. The settlement winds back on itself, so your crew has to work the road. The old town hall is not enough: raise a new one at the road's end, and a watchtower besides. Trees and rocks take twice as long to harvest but yield more. Tip: upgrade a house (20 wood, 10 stone) and its worker walks twice as fast.",

  ];
  let currentLevel = 0;   // index into LEVELS; the level currently loaded

  // ---- Progress persistence --------------------------------------------
  // Namespaced + versioned so it can't collide with Ghost Patrol's localStorage
  // on the same GitHub Pages origin, and so a future schema change can migrate
  // or reset cleanly instead of choking on an old save. Shape:
  //   { v:1, stars: { "0": 3, "1": 2, ... } }  — best stars ever per level index.
  // A level is "completed" iff it has a stars entry >= 1. Unlock is linear:
  // level N is playable iff N===0 or level N-1 is completed.
  const SAVE_KEY = "outpost.progress.v1";

    try {
      const raw = localStorage.getItem(SAVE_KEY);

    } catch (e) { /* corrupt or unavailable — start fresh, don't crash */ }
  }

    try { localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); } catch (e) {}
  }
  function clearProgress() {
    progress = { v: 1, stars: {} };
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  }
  function starsForLevel(idx) { return progress.stars[idx] || 0; }
  function isCompleted(idx) { return starsForLevel(idx) >= 1; }
  let allUnlocked = false;   // debug cheat (O+P chord): opens every level without faking star scores
  let exportMode = false;    // level-select (X+P chord): click a level to copy its builder data
  function isUnlocked(idx) { return allUnlocked || idx === 0 || isCompleted(idx - 1); }
  function recordStars(idx, stars) {

  // Yields / work durations (ms)
  // For resource nodes: hp == total units the node holds, and `amount` (units
  // per swing) must divide hp evenly so a worker never carries a partial load.
  // Tree: 9 wood = 3 swings of 3.  Rock: 6 stone = 2 swings of 3.
  // Wall (RUBBLE) yields nothing; hp just sets how many swings to breach it.
  const JOB = {
    [TREE]:   { res: "wood",  amount: 3, work: 2100, hp: 9,  label: "tree"  },
    [ROCK]:   { res: "stone", amount: 3, work: 2500, hp: 6,  label: "rock"  },
    [RUBBLE]: { res: null,    amount: 0, work: 2000, hp: 12, label: "wall"},
  };

  let solidMask = null;   // Set of "x,y" keys the crew cannot walk through (from L.solid)
  let decoTiles = null;   // Map "x,y" -> {s, i}: ground-layer art drawn under entities (from L.deco)
  let screen = "mainMenu";   // "mainMenu" | "levelSelect" | "levelIntro" | "play" | "levelComplete"

  function resetState(levelIndex) {
    if (typeof levelIndex === "number") currentLevel = levelIndex;
    const L = LEVELS[currentLevel];

    // camera scrolls when the world is bigger. Reset the camera to the origin.

      grid[tower.y][tower.x] = TOWER;

    }

    // each cell built independently, walk-through until built. Win = all built.
    townhall = null;
    if (L.townhall) {
      const th = L.townhall, parts = [];
      for (let r = 0; r < th.tiles.length; r++) {
        for (let c = 0; c < th.tiles[r].length; c++) {
          const x = th.anchor.x + c, y = th.anchor.y + r;
          grid[y][x] = THALL;
          parts.push({ x, y, tile: th.tiles[r][c], built: false, building: false, progress: 0 });
        }
      }

    }

    // Houses: each is a home tile a worker lives in and hauls to. Worker 1 starts
    // in the first house; more are built during play via the build menu.
    houses = [];
    addHouse(L.startHouse.x, L.startHouse.y, true);   // house 0 = starting home

    wallBreached = false;   // announce "the way is open" only the first time the wall clears
    if (L.wallCol >= 0) for (let y = 0; y < worldRows; y++) place(L.wallCol, y, RUBBLE);

    solidMask = new Set((L.solid || []).map(([x,y]) => key(x,y)));

    decoTiles = new Map();

    done = false;

  }

  // ---- Houses & workers -------------------------------------------------
  const MAX_WORKERS = 5;        // practical ceiling on this small map
  // Each worker gets its own sprite from dungeon.png, in spawn order.
  const WORKER_SPRITES = [85, 86, 88, 99, 112];
  const WORKER_NAMES = ["Bobby", "Sammy", "Tommy", "Mindy", "Freddy"];

  // Floating "+N" popups over houses on deposit. Ephemeral, no gameplay effect.
  let floaters = [];
  function addFloater(x, y, text, color) {
    floaters.push({ x, y, text, color, born: performance.now() });
  }

  // Centered notification flash in the play field (replaces the bottom text bar
  // as the primary feedback channel). One at a time; a new flash replaces the old.
  let flash = null;   // { text, color, born }
  function flashMsg(text, color) {
    flash = { text, color: color || "#e8ddc8", born: performance.now() };
  }

  // Sticky intro banner: unlike a flash, it does NOT fade — it stays until the
  // player's first real action (clicking a worker/node/tower/build button), so
  // there's time to read the how-to-play text. Word-wrapped so it never runs off
  // the canvas edges. Set in resetState, cleared by dismissIntro().
  let introBanner = null;   // { text } or null
  function dismissIntro() { introBanner = null; }

  function addHouse(x, y, isStart) {
    grid[y][x] = HOUSE;         // this cell now holds a house structure
    houses.push({ x, y, level: 1 });
    return houses[houses.length - 1];
  }

  function spawnWorker(home) {
    const sprite = WORKER_SPRITES[workers.length % WORKER_SPRITES.length];
    const name = WORKER_NAMES[workers.length % WORKER_NAMES.length];
    home.name = name;   // label the house with its resident's name
    workers.push({
      home,                                   // this worker's house {x,y}
      name,                                   // Bobby, Sammy, Tommy, Mindy, Freddy
      sprite,                                 // its own tile on dungeon.png
      px: home.x, py: home.y,
      path: [], target: null, state: "idle",
      carry: null, carryAmt: 0, workUntil: 0, moveT: 0,
      facing: 1, animT: 0,
      speedMult: 1,                           // 2 after this worker's house is upgraded
      _node: null, _repeatNode: null, _depositOnArrive: false, _targetNodeKey: null,
      _buildType: null, _upgradeWorkshop: null, _upgradeHouse: null, _buildAt: null, buildUntil: 0, _towerBuild: false, _thallPart: null,
    });
  }

  let nodeHpMult = 1;   // per-level: scales tree/rock hp (longer to harvest). Keep integer so hp stays divisible by amount.
  // Per-level caps on building upgrades. A building is upgradeable iff its
  // current level < the cap. Houses default to 1 (no upgrade) except where a
  // level opts in; workshops default to 2 (the L1->L2 mining/wall path).
  let maxHouseLevel = 1;
  let maxWorkshopLevel = 2;
  let wallBreached = false;   // set true the first time the wall is fully cleared, so the breach message fires once
  function place(x, y, type) { grid[y][x] = type; if (JOB[type]) nodes.set(key(x,y), {type, hp: JOB[type].hp * (JOB[type].res ? nodeHpMult : 1), x, y}); }
  function remove(x, y) { grid[y][x] = EMPTY; nodes.delete(key(x,y)); }
  const key = (x,y) => x + "," + y;

  // ---- A* pathfinding ---------------------------------------------------
  // Walkable = EMPTY or STOCK or the tile adjacent target handled by caller.
  function walkable(x, y) {
    if (x < 0 || y < 0 || x >= worldCols || y >= worldRows) return false;
    // Solid mask blocks movement regardless of what tile sits here — it's the
    // level builder's collision layer for buildings, fences, and terrain.
    if (solidMask && solidMask.has(key(x,y))) return false;
    const t = grid[y][x];
    if (t === THALL) {
      // A town-hall cell blocks movement only once its part is built; ghosted
      // (unbuilt) parts are walk-through, matching the shadow-then-solid design.
      const part = townhall && townhall.parts.find(p => p.x === x && p.y === y);
      return !part || !part.built;
    }
    return t === EMPTY || t === STOCK;
  }

  function astar(sx, sy, tx, ty) {
    // target tile itself may be non-walkable (a tree); we path to it and stop adjacent.
    const goalAdjacent = !walkable(tx, ty);
    const h = (x,y) => Math.abs(x-tx) + Math.abs(y-ty);
    const open = new Map();      // key -> node
    const came = new Map();
    const g = new Map();
    const startK = key(sx,sy);
    open.set(startK, {x:sx, y:sy, f: h(sx,sy)});
    g.set(startK, 0);

    while (open.size) {
      // node w/ lowest f
      let curK, cur, best = Infinity;
      for (const [k,n] of open) if (n.f < best) { best = n.f; curK = k; cur = n; }
      open.delete(curK);

      const reached = goalAdjacent
        ? (Math.abs(cur.x-tx)+Math.abs(cur.y-ty) === 1)
        : (cur.x === tx && cur.y === ty);
      if (reached) return rebuild(came, curK, sx, sy);

      for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nx = cur.x+dx, ny = cur.y+dy;
        if (!walkable(nx, ny)) continue;
        const nk = key(nx,ny);
        const tentative = g.get(curK) + 1;
        if (tentative < (g.get(nk) ?? Infinity)) {
          came.set(nk, curK);
          g.set(nk, tentative);
          open.set(nk, {x:nx, y:ny, f: tentative + h(nx,ny)});
        }
      }
    }
    return null; // no path
  }

  function rebuild(came, endK, sx, sy) {
    const path = [];
    let k = endK;
    while (k !== key(sx,sy)) {
      const [x,y] = k.split(",").map(Number);
      path.push({x,y});
      k = came.get(k);
      if (k === undefined) break;

  }

  // ---- Input ------------------------------------------------------------
  function eventPos(e) {
    const r = canvas.getBoundingClientRect();

      } else if (menuSelectBtn && pointInRect(mx, my, menuSelectBtn.x, menuSelectBtn.y, menuSelectBtn.w, menuSelectBtn.h)) {

      }
      return;
    }

    // --- Level select ---
    if (screen === "levelSelect") {
      if (clearProgressBtn && pointInRect(mx, my, clearProgressBtn.x, clearProgressBtn.y, clearProgressBtn.w, clearProgressBtn.h)) {

      for (const cell of selectCells) {
        if (!pointInRect(mx, my, cell.x, cell.y, cell.w, cell.h)) continue;
        // Export mode (X+P): clicking any INSTALLED level copies its data,
        // regardless of lock state — you may want to edit a level you haven't
        // unlocked for play yet.
        if (exportMode) {
          if (cell.exists) {
            sfx.click();
            showExportOverlay(levelToExportText(LEVELS[cell.i], cell.i), `Level ${cell.i + 1} — ${LEVELS[cell.i].name}`);
          } else {
