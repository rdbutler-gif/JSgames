<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outpost — Level 1</title>
<style>
  :root {
    --bg:        #2b3a4a;
    --panel:     #3a5169;
    --ink:       #ffffff;
    --ink-dim:   #b8c9d9;
    --line:      #24313f;
    --wood:      #e09a4a;
    --stone:     #9fb0c0;
    --gold:      #ffcf3f;
    --silver:    #d8e0e8;
    --bronze:    #d98a48;
    --accent:    #5fc55f;
    --select:    #ffe08a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: #1a2530;
    color: var(--ink);
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #1a2530; border-radius: 10px; image-rendering: pixelated;
    max-width: 100%; touch-action: none; cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
  <canvas id="game" width="768" height="720"></canvas>

<script>
(() => {
  "use strict";

  // ---- Grid / config ----------------------------------------------------
  const TILE = 48;              // 16px source tile * 3 = clean 3x

  // The VIEWPORT is the fixed visible window: always 16x12 tiles (768x576).
  // The WORLD can be larger than the viewport on later levels; the camera picks
  // which slice of the world shows. worldCols/worldRows are set per-level.
  const VIEW_COLS = 16, VIEW_ROWS = 12;
  let worldCols = 16, worldRows = 12;   // set from LEVELS[currentLevel].cols/rows

  // ---- Canvas regions ---------------------------------------------------
  const HUD_H = 60, BUILD_H = 84;
  const VIEW_W = VIEW_COLS * TILE;            // 768 — fixed visible width
  const VIEW_H = VIEW_ROWS * TILE;            // 576 — fixed visible height
  const VIEW_Y = HUD_H;                       // play viewport starts below HUD
  const CANVAS_W = VIEW_W;
  const CANVAS_H = HUD_H + VIEW_H + BUILD_H;  // 720

  const canvas = document.getElementById("game");
  canvas.width = CANVAS_W; canvas.height = CANVAS_H;
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = false;   // crisp pixel-art scale-up

  // ---- Camera (world<->screen). The camera offset (in world pixels) selects
  // which part of a larger-than-viewport world is drawn. Clamped so it never
  // shows past the world edges. On a world that fits the viewport it stays 0,0.
  const camera = { x: 0, y: 0 };
  const worldPxW = () => worldCols * TILE;
  const worldPxH = () => worldRows * TILE;
  function clampCamera() {
    // If the world is smaller than the viewport in a dimension, pin to 0.
    camera.x = Math.max(0, Math.min(camera.x, Math.max(0, worldPxW() - VIEW_W)));
    camera.y = Math.max(0, Math.min(camera.y, Math.max(0, worldPxH() - VIEW_H)));
  }
  // world tile (tx,ty) -> screen pixel (top-left of that tile)
  const wsx = (tx) => tx*TILE - camera.x;
  const wsy = (ty) => ty*TILE - camera.y + VIEW_Y;
  // screen pixel -> world tile
  function screenToTile(sx, sy) {
    // Use the same whole-pixel camera the renderer uses, so the tile the player
    // taps is exactly the tile drawn under the cursor.
    const cx = Math.round(camera.x), cy = Math.round(camera.y);
    return { tx: Math.floor((sx + cx)/TILE),
             ty: Math.floor((sy - VIEW_Y + cy)/TILE) };
  }
  function regionAt(sy) {
    if (sy < HUD_H) return "hud";
    if (sy >= HUD_H + VIEW_H) return "build";
    return "grid";
  }

  let NEED_WOOD = 15, NEED_STONE = 10;   // tower cost — set per-level from LEVELS[currentLevel].cost
  const TOWER_BUILD_MS = 6000;             // effort for ONE worker; N workers finish in TOWER_BUILD_MS/N (linear)
  let GOLD_SEC = 90, SILVER_SEC = 140;   // star time thresholds — set per-level from LEVELS[currentLevel].stars

  // ---- Buildable types (build menu) -------------------------------------
  // Tower is intentionally NOT here — it's pre-placed and is the win goal.
  // Room left to add more types later.
  const BUILDINGS = {
    house:    { label: "House",    tile: 74,  wood: 8,  stone: 0, desc: "+1 worker" },
    workshop: { label: "Workshop", tile: 57,  wood: 15, stone: 0, desc: "unlocks rock mining" },
  };
  // Upgrading an existing L1 workshop to L2 (enables wall-breaking).
  const WORKSHOP_UPGRADE = { wood: 8, stone: 6, tile: 102 };
  let buildMode = null;     // key into BUILDINGS while placing, else null
  let hoverCell = null;     // {x,y} cell under cursor during build mode
  let workshopLevel = 0;    // 0 = none, 1 = rock mining, 2 = wall breaking

  // Camera drag-to-pan state. A press that moves past DRAG_THRESH px becomes a
  // pan (works for mouse and touch); a press that stays put is a click/dispatch.
  const DRAG_THRESH = 6;
  let drag = null;   // { startX, startY, camX, camY, panning } while a pointer is down in the grid
  let buildHint = "";       // instruction text shown in the build bar
  let timerStr = "0:00";    // current elapsed time, formatted
  let winStars = 0;         // stars earned on the win screen
  let winTimeStr = "";      // finish time text for the win screen
  let mouse = { x: -1, y: -1 };   // last-known mouse pos (screen px) for hover

  // ---- Sprite sheet -----------------------------------------------------
  // Tiny Town: 16x16 tiles, 1px spacing -> stride 17. Sheet is 12 cols x 11 rows.
  const SRC = 16, GAP = 1, STRIDE = SRC + GAP;   // 17px per tile step
  const SHEET_COLS = 12, SHEET_ROWS = 11, SHEET_N = SHEET_COLS * SHEET_ROWS;

  const sheet = new Image();
  let sheetReady = false;
  sheet.onload  = () => { sheetReady = true; };
  sheet.onerror = () => { sheetReady = false; console.warn("tilemap.png not found — using placeholder shapes"); };
  sheet.src = "assets/tilemap.png";   // repo-relative; loads over https on Pages / localhost

  // Second sheet: Tiny Dungeon (characters). Same 16px / 1px / 12-wide layout.
  const charSheet = new Image();
  let charReady = false;
  charSheet.onload  = () => { charReady = true; };
  charSheet.onerror = () => { charReady = false; console.warn("dungeon.png not found — worker stays primitive"); };
  charSheet.src = "assets/dungeon.png";

  // index (0..131) -> source pixel origin on the sheet
  function srcXY(idx) {
    const c = idx % SHEET_COLS, r = (idx / SHEET_COLS) | 0;
    return { sx: c * STRIDE, sy: r * STRIDE };
  }
  // draw sheet tile `idx` into grid cell (gx,gy), scaled to TILE.
  // img/ready default to the terrain sheet; pass charSheet/charReady for characters.
  function blit(idx, gx, gy, img = sheet, ready = sheetReady) {
    if (idx == null || !ready) return;
    const { sx, sy } = srcXY(idx);
    ctx.drawImage(img, sx, sy, SRC, SRC, gx*TILE, gy*TILE, TILE, TILE);
  }

  // ---- Tile index map (PLACEHOLDER — fill from debug picker) -------------
  // Set any of these to a real sheet index (0..131) once you've read them
  // off the picker. Leave as null to fall back to the drawn primitive.
  const TILEMAP = {
    ground: 0,      // grassempty
    tree:   28,     // treegreensingle
    rock:   43,     // rock pile
    wall:   77,     // destructible wall — full-height barrier
    store:  74,     // single-tile structure
    tower:  102,    // single-tile structure
    towerSite: null,
    worker: 86,     // Tiny Dungeon character (on dungeon.png / charSheet)
  };

  // Ground: green grass everywhere, ~20% chance of a flower/plant accent.
  // Rolled once per level so it doesn't flicker.
  const GRASS = 0, PLANT = 1, FLOWER = 2;
  let groundTiles = null;   // Map "x,y" -> tile idx, stable for the level

  function rollGround() {
    groundTiles = new Map();
    for (let y=0; y<worldRows; y++) for (let x=0; x<worldCols; x++) {
      let t = GRASS;
      if (Math.random() < 0.10) t = Math.random() < 0.5 ? PLANT : FLOWER;
      groundTiles.set(key(x,y), t);
    }
  }

  function groundTile(x, y) {
    return (groundTiles && groundTiles.get(key(x,y))) ?? GRASS;
  }

  // Debug picker: D toggles it, T flips which sheet it shows.
  let showPicker = false;
  let pickerSheet = 0;   // 0 = terrain (tilemap), 1 = characters (dungeon)
  window.addEventListener("keydown", (e) => {
    if (e.key === "d" || e.key === "D") { showPicker = !showPicker; }
    if (e.key === "t" || e.key === "T") { pickerSheet = pickerSheet ? 0 : 1; }
  });

  // Tile types
  const EMPTY = 0, TREE = 1, ROCK = 2, RUBBLE = 3, TOWER = 4, STOCK = 5, BUILDING = 6;
  // STOCK is a historical name — this tile type actually means "a house sits here."
  // The real stockpile is res.wood/res.stone in the HUD, not a tile. HOUSE is the
  // honest alias; both point at the same value so existing code keeps working and
  // new code can read clearly. Prefer HOUSE going forward.
  const HOUSE = STOCK;

  // ---- Level definitions ------------------------------------------------
  // A level is DATA, not code — the engine below reads one of these to build a
  // playable map. LEVELS[0] is the original hardcoded level 1, lifted verbatim;
  // adding a level = adding an entry here (no new code paths). cols/rows set the
  // WORLD size per level; the camera scrolls when the world exceeds the viewport.
  const LEVELS = [
    {
      name: "The Clearing",
      subtitle: "LEVEL 1",
      clearText: "Level Cleared",   // shown on the level-complete screen
      cols: 16, rows: 12,
      startHouse: { x: 2, y: 6 },     // worker 1's home (also the stockpile cell)
      tower:      { x: 13, y: 6 },    // build target / win goal
      wallCol: 8,                     // full-height destructible wall column
      trees: [[5,2],[6,3],[4,4],[3,3],[11,2],[12,4],[10,9]],
      rocks: [[11,9],[12,8],[5,9],[6,10],[13,3]],
      cost:  { wood: 15, stone: 10 }, // tower cost
      stars: { gold: 100, silver: 150 }, // 1:40 gold, 2:30 silver
      intro: "Click a tree or rock to send your nearest free worker to gather it. " +
             "Use the BUILD bar below to place a house (more workers) or a workshop " +
             "(unlocks stone, then wall-breaking). Gather 15 wood + 10 stone, then " +
             "click the TOWER to raise it and win.",
    },
    // ===== LEVEL 2 =====================================================
    {
      name: "The Expanse",
      subtitle: "LEVEL 2",
      clearText: "The Expanse Settled",
      cols: 24, rows: 18,
      startHouse: { x: 2, y: 3 },
      tower:      { x: 20, y: 12 },     // far side, beyond the wall
      wallCol: 11,                      // full-height wall dividing the map
      // West of the wall: wood to build houses + the workshop, and one rock so
      // the workshop can be upgraded to L2 (needed to break the wall).
      trees: [[3,6],[4,8],[2,10],[5,11],[3,13],[6,5],[4,2],[7,9],[5,15],[8,13]],
      rocks: [[6,7], [4,5], [8,10], [3,15]],   // 4 rocks = 24 stone: 6 for the workshop upgrade, 10 for the tower, buffer to spare
      cost:  { wood: 15, stone: 10 },   // tower cost
      stars: { gold: 180, silver: 300 },
      // Tower is gated: settle the outpost (5 houses) and clear the whole wall
      // before it will accept builders.
      objectives: { houses: 5, clearWalls: true },
      intro: "THE EXPANSE — click and drag the map to explore new area. " +
             "Settlers are moving in: build 5 houses (one per worker — meet all " +
             "five!), upgrade a workshop to break through the wall, clear every " +
             "wall section, then raise a new watchtower on the far side to win.",
    },
  ];
  let currentLevel = 0;   // index into LEVELS; the level currently loaded

  // ---- Progress persistence --------------------------------------------
  // Namespaced + versioned so it can't collide with Ghost Patrol's localStorage
  // on the same GitHub Pages origin, and so a future schema change can migrate
  // or reset cleanly instead of choking on an old save. Shape:
  //   { v:1, stars: { "0": 3, "1": 2, ... } }  — best stars ever per level index.
  // A level is "completed" iff it has a stars entry >= 1. Unlock is linear:
  // level N is playable iff N===0 or level N-1 is completed.
  const SAVE_KEY = "outpost.progress.v1";
  let progress = { v: 1, stars: {} };

  function loadProgress() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const p = JSON.parse(raw);
      if (p && p.v === 1 && p.stars && typeof p.stars === "object") progress = p;
    } catch (e) { /* corrupt or unavailable — start fresh, don't crash */ }
  }
  function saveProgress() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); } catch (e) {}
  }
  function clearProgress() {
    progress = { v: 1, stars: {} };
    try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  }
  function starsForLevel(idx) { return progress.stars[idx] || 0; }
  function isCompleted(idx) { return starsForLevel(idx) >= 1; }
  function isUnlocked(idx) { return idx === 0 || isCompleted(idx - 1); }
  function recordStars(idx, stars) {
    // best-ever: never let a sloppy replay lower an earned score
    if (stars > (progress.stars[idx] || 0)) { progress.stars[idx] = stars; saveProgress(); }
  }

  // Yields / work durations (ms)
  // For resource nodes: hp == total units the node holds, and `amount` (units
  // per swing) must divide hp evenly so a worker never carries a partial load.
  // Tree: 9 wood = 3 swings of 3.  Rock: 6 stone = 2 swings of 3.
  // Wall (RUBBLE) yields nothing; hp just sets how many swings to breach it.
  const JOB = {
    [TREE]:   { res: "wood",  amount: 3, work: 2100, hp: 9,  label: "tree"  },
    [ROCK]:   { res: "stone", amount: 3, work: 2500, hp: 6,  label: "rock"  },
    [RUBBLE]: { res: null,    amount: 0, work: 2000, hp: 12, label: "wall"},
  };

  let grid, nodes, workers, houses, workshops, res, stockpile, tower, startTime, done, raf;
  let screen = "mainMenu";   // "mainMenu" | "levelSelect" | "levelIntro" | "play" | "levelComplete"

  function resetState(levelIndex) {
    if (typeof levelIndex === "number") currentLevel = levelIndex;
    const L = LEVELS[currentLevel];

    // Pull per-level tuning into the engine's working variables.
    NEED_WOOD = L.cost.wood; NEED_STONE = L.cost.stone;
    GOLD_SEC = L.stars.gold; SILVER_SEC = L.stars.silver;

    // World dimensions come from the level. The viewport is fixed (16x12); the
    // camera scrolls when the world is bigger. Reset the camera to the origin.
    worldCols = L.cols; worldRows = L.rows;
    camera.x = 0; camera.y = 0;

    // grid of tile types (sized to the WORLD); nodes[] holds live objects w/ hp.
    grid = Array.from({length: worldRows}, () => Array(worldCols).fill(EMPTY));
    nodes = new Map(); // key "x,y" -> {type, hp, x, y}

    stockpile = { x: L.startHouse.x, y: L.startHouse.y };
    tower     = { x: L.tower.x, y: L.tower.y, built: false, building: false, progress: 0 };
    grid[stockpile.y][stockpile.x] = HOUSE;
    grid[tower.y][tower.x] = TOWER;

    // Houses: each is a home tile a worker lives in and hauls to. Worker 1 starts
    // in the first house; more are built during play via the build menu.
    houses = [];
    addHouse(L.startHouse.x, L.startHouse.y, true);   // house 0 = starting home

    // Destructible wall — a full-height column, no gaps (spans the world height).
    for (let y = 0; y < worldRows; y++) place(L.wallCol, y, RUBBLE);

    // Resource nodes from data.
    L.trees.forEach(([x,y]) => place(x,y,TREE));
    L.rocks.forEach(([x,y]) => place(x,y,ROCK));

    // Additional houses & the workshop are placed by the player via the build
    // menu (see BUILDINGS). No pre-authored sites.
    workshops = [];
    workshopLevel = 0;
    buildMode = null; hoverCell = null; buildHint = "";

    workers = [];
    spawnWorker(houses[0]);      // worker 1 for the starting house

    res = { wood: 0, stone: 0 };
    done = false;
    startTime = performance.now();
    simNow = 0; simAccum = 0;    // reset the simulation clock for the new level
    updateHUD();
    rollGround();
    introBanner = { text: L.intro };
  }

  // ---- Houses & workers -------------------------------------------------
  const MAX_WORKERS = 5;        // practical ceiling on this small map
  // Each worker gets its own sprite from dungeon.png, in spawn order.
  const WORKER_SPRITES = [85, 86, 88, 99, 112];
  const WORKER_NAMES = ["Bobby", "Sammy", "Tommy", "Mindy", "Freddy"];

  // Floating "+N" popups over houses on deposit. Ephemeral, no gameplay effect.
  let floaters = [];
  function addFloater(x, y, text, color) {
    floaters.push({ x, y, text, color, born: performance.now() });
  }

  // Centered notification flash in the play field (replaces the bottom text bar
  // as the primary feedback channel). One at a time; a new flash replaces the old.
  let flash = null;   // { text, color, born }
  function flashMsg(text, color) {
    flash = { text, color: color || "#e8ddc8", born: performance.now() };
  }

  // Sticky intro banner: unlike a flash, it does NOT fade — it stays until the
  // player's first real action (clicking a worker/node/tower/build button), so
  // there's time to read the how-to-play text. Word-wrapped so it never runs off
  // the canvas edges. Set in resetState, cleared by dismissIntro().
  let introBanner = null;   // { text } or null
  function dismissIntro() { introBanner = null; }

  function addHouse(x, y, isStart) {
    grid[y][x] = HOUSE;         // this cell now holds a house structure
    houses.push({ x, y, level: 1 });
    return houses[houses.length - 1];
  }

  function spawnWorker(home) {
    const sprite = WORKER_SPRITES[workers.length % WORKER_SPRITES.length];
    const name = WORKER_NAMES[workers.length % WORKER_NAMES.length];
    workers.push({
      home,                                   // this worker's house {x,y}
      name,                                   // Bobby, Sammy, Tommy, Mindy, Freddy
      sprite,                                 // its own tile on dungeon.png
      px: home.x, py: home.y,
      path: [], target: null, state: "idle",
      carry: null, carryAmt: 0, workUntil: 0, moveT: 0,
      facing: 1, animT: 0,
      _node: null, _repeatNode: null, _depositOnArrive: false, _targetNodeKey: null,
      _buildType: null, _upgradeWorkshop: null, _buildAt: null, buildUntil: 0, _towerBuild: false,
    });
  }

  function place(x, y, type) { grid[y][x] = type; if (JOB[type]) nodes.set(key(x,y), {type, hp: JOB[type].hp, x, y}); }
  function remove(x, y) { grid[y][x] = EMPTY; nodes.delete(key(x,y)); }
  const key = (x,y) => x + "," + y;

  // ---- A* pathfinding ---------------------------------------------------
  // Walkable = EMPTY or STOCK or the tile adjacent target handled by caller.
  function walkable(x, y) {
    if (x < 0 || y < 0 || x >= worldCols || y >= worldRows) return false;
    const t = grid[y][x];
    return t === EMPTY || t === STOCK;
  }

  function astar(sx, sy, tx, ty) {
    // target tile itself may be non-walkable (a tree); we path to it and stop adjacent.
    const goalAdjacent = !walkable(tx, ty);
    const h = (x,y) => Math.abs(x-tx) + Math.abs(y-ty);
    const open = new Map();      // key -> node
    const came = new Map();
    const g = new Map();
    const startK = key(sx,sy);
    open.set(startK, {x:sx, y:sy, f: h(sx,sy)});
    g.set(startK, 0);

    while (open.size) {
      // node w/ lowest f
      let curK, cur, best = Infinity;
      for (const [k,n] of open) if (n.f < best) { best = n.f; curK = k; cur = n; }
      open.delete(curK);

      const reached = goalAdjacent
        ? (Math.abs(cur.x-tx)+Math.abs(cur.y-ty) === 1)
        : (cur.x === tx && cur.y === ty);
      if (reached) return rebuild(came, curK, sx, sy);

      for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nx = cur.x+dx, ny = cur.y+dy;
        if (!walkable(nx, ny)) continue;
        const nk = key(nx,ny);
        const tentative = g.get(curK) + 1;
        if (tentative < (g.get(nk) ?? Infinity)) {
          came.set(nk, curK);
          g.set(nk, tentative);
          open.set(nk, {x:nx, y:ny, f: tentative + h(nx,ny)});
        }
      }
    }
    return null; // no path
  }

  function rebuild(came, endK, sx, sy) {
    const path = [];
    let k = endK;
    while (k !== key(sx,sy)) {
      const [x,y] = k.split(",").map(Number);
      path.push({x,y});
      k = came.get(k);
      if (k === undefined) break;
    }
    return path.reverse();
  }

  // ---- Input ------------------------------------------------------------
  function eventPos(e) {
    const r = canvas.getBoundingClientRect();
    const scale = canvas.width / r.width;
    return { mx: (e.clientX - r.left) * scale, my: (e.clientY - r.top) * scale };
  }

  canvas.addEventListener("pointerdown", (e) => {
    const { mx, my } = eventPos(e);
    if (e.button !== 0) {
      // right-click still cancels build mode during play
      if (screen === "play" && buildMode) { toggleBuildMode(null); }
      return;
    }

    // --- Main menu ---
    if (screen === "mainMenu") {
      if (menuPlayBtn && pointInRect(mx, my, menuPlayBtn.x, menuPlayBtn.y, menuPlayBtn.w, menuPlayBtn.h)) {
        gotoLevel(nextPlayLevel());
      } else if (menuSelectBtn && pointInRect(mx, my, menuSelectBtn.x, menuSelectBtn.y, menuSelectBtn.w, menuSelectBtn.h)) {
        screen = "levelSelect"; clearArmed = false;
      }
      return;
    }

    // --- Level select ---
    if (screen === "levelSelect") {
      if (clearProgressBtn && pointInRect(mx, my, clearProgressBtn.x, clearProgressBtn.y, clearProgressBtn.w, clearProgressBtn.h)) {
        if (clearArmed) { clearProgress(); clearArmed = false; }
        else { clearArmed = true; }   // first tap arms, second confirms
        return;
      }
      clearArmed = false;   // any other click disarms the confirm
      for (const cell of selectCells) {
        if (cell.clickable && pointInRect(mx, my, cell.x, cell.y, cell.w, cell.h)) { gotoLevel(cell.i); return; }
      }
      if (selectBackBtn && pointInRect(mx, my, selectBackBtn.x, selectBackBtn.y, selectBackBtn.w, selectBackBtn.h)) { screen = "mainMenu"; }
      return;
    }

    // --- Level intro ---
    if (screen === "levelIntro") {
      if (introStartBtn && pointInRect(mx, my, introStartBtn.x, introStartBtn.y, introStartBtn.w, introStartBtn.h)) { beginPlay(); }
      else if (introBackBtn && pointInRect(mx, my, introBackBtn.x, introBackBtn.y, introBackBtn.w, introBackBtn.h)) { screen = "mainMenu"; }
      return;
    }

    // --- Level complete ---
    if (screen === "levelComplete") {
      if (continueBtn && pointInRect(mx, my, continueBtn.x, continueBtn.y, continueBtn.w, continueBtn.h)) {
        gotoLevel(currentLevel + 1);
      } else if (completeSelectBtn && pointInRect(mx, my, completeSelectBtn.x, completeSelectBtn.y, completeSelectBtn.w, completeSelectBtn.h)) {
        screen = "mainMenu";
      }
      return;
    }

    // --- In play ---
    const region = regionAt(my);

    // First real interaction clears the sticky intro banner. Grid and build-bar
    // clicks dismiss it; HUD clicks (handled below, display-only) do not, since
    // they'd otherwise wipe the instructions without doing anything.
    if (introBanner && region !== "hud") dismissIntro();

    // --- Build bar clicks ---
    if (region === "build") {
      for (const btn of buildButtons) {
        if (pointInRect(mx, my, btn.x, btn.y, btn.w, btn.h)) { toggleBuildMode(btn.key); return; }
      }
      if (restartBtn && pointInRect(mx, my, restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h)) { start(); return; }
      if (quitBtn && pointInRect(mx, my, quitBtn.x, quitBtn.y, quitBtn.w, quitBtn.h)) {
        resetState(currentLevel);   // clear in-progress play state
        screen = "mainMenu";        // back to the overall title screen
        return;
      }
      return;
    }
    if (region === "hud") return;   // HUD is display-only for now

    // --- Grid: build-mode taps place immediately; otherwise arm a drag-or-click ---
    const { tx: gx, ty: gy } = screenToTile(mx, my);
    if (gx < 0 || gy < 0 || gx >= worldCols || gy >= worldRows) return;

    if (buildMode) { tryPlaceBuilding(gx, gy); return; }

    // Arm a potential pan. If the pointer moves past the threshold it becomes a
    // camera drag; if it's released in place, pointerup fires the click below.
    drag = { startX: mx, startY: my, camX: camera.x, camY: camera.y, panning: false };
  });

  // The actual worker-dispatch logic for a grid click (fires on pointerup when
  // the press didn't turn into a pan).
  function handleGridClick(mx, my) {
    const { tx: gx, ty: gy } = screenToTile(mx, my);
    if (gx < 0 || gy < 0 || gx >= worldCols || gy >= worldRows) return;

    const t = grid[gy][gx];

    // Click an existing L1 workshop -> upgrade it to L2 (enables wall-breaking)
    const ws = workshops.find(s => s.x === gx && s.y === gy);
    if (ws) {
      if (ws.level >= 2) { setMsg("This workshop is already fully upgraded."); return; }
      const u = WORKSHOP_UPGRADE;
      if (res.wood < u.wood || res.stone < u.stone) { setMsg(`Need ${u.wood}w + ${u.stone}s`); return; }
      const w = nearestIdleTo(gx, gy);
      if (!w) { setMsg("No free worker to upgrade the workshop. Wait for one."); return; }
      res.wood -= u.wood; res.stone -= u.stone; updateHUD();
      dispatch(w, gx, gy, { upgrade: ws });
      setMsg(`${w.name} is heading out to upgrade the workshop.`);
      return;
    }

    // Click a job (tree / rock / wall)
    if (t === TREE || t === ROCK || t === RUBBLE) {
      if (t === ROCK && workshopLevel < 1) {
        setMsg("Your workers can't mine stone yet. Build a Workshop first.");
        return;
      }
      if (t === RUBBLE && workshopLevel < 2) {
        setMsg("The wall is too solid. Upgrade a Workshop to Level 2 to break it.");
        return;
      }
      const w = nearestIdleTo(gx, gy);
      if (!w) { setMsg(dispatchFailMsg(gx, gy)); return; }
      dispatch(w, gx, gy);
      const action = t === TREE ? "is cutting trees"
                   : t === ROCK ? "is mining stone"
                   : "is breaking the wall";
      setMsg(`${w.name} ${action}.`);
      return;
    }

    // Click the tower: start a timed build (charge resources once), or send
    // another idle worker to join an in-progress build (speeds it up linearly).
    if (t === TOWER) {
      if (tower.built) return;
      // Objective gate: some levels require houses/walls done before the tower
      // will accept any workers.
      if (!tower.building) {
        const gate = towerGate();
        if (!gate.ok) { setMsg(gate.why); return; }
        if (res.wood < NEED_WOOD || res.stone < NEED_STONE) {
          setMsg(`Need ${NEED_WOOD}w + ${NEED_STONE}s`);
          return;
        }
        const w = nearestIdleTo(gx, gy);
        if (!w) { setMsg(dispatchFailMsg(gx, gy)); return; }
        res.wood -= NEED_WOOD; res.stone -= NEED_STONE; updateHUD();
        tower.building = true; tower.progress = 0;
        dispatch(w, gx, gy, { tower: true });
        setMsg(`${w.name} is building the watchtower — click it again to add more workers.`);
      } else {
        const w = nearestIdleTo(gx, gy);
        if (!w) { setMsg(anyIdleWorker() ? "Can't reach the tower." : "No free worker to add. Wait for one."); return; }
        dispatch(w, gx, gy, { tower: true });
        setMsg(`${w.name} joins the tower build.`);
      }
      return;
    }
  }

  // Can a building go on (gx,gy)? Empty cell, and placing it must not seal
  // off any resource / the tower from every worker.
  // A placement is invalid only if it makes something WORSE — i.e. strands a
  // node/target that is reachable RIGHT NOW. Things already blocked (e.g. by the
  // wall) aren't this placement's fault, so we ignore them.
  function reachableNow(tx, ty) {
    for (const w of workers) {
      if (astar(Math.round(w.px), Math.round(w.py), tx, ty)) return true;
    }
    return false;
  }

  function placementValid(gx, gy) {
    if (grid[gy][gx] !== EMPTY) return { ok: false, why: "That tile is occupied." };

    // The tile must be reachable by at least one worker — otherwise the ghost
    // would show green over a spot no one can walk to, and the click would only
    // fail at dispatch. Checking here turns the ghost red up front.
    if (!reachableNow(gx, gy)) return { ok: false, why: "No worker can reach that spot — clear a path first." };

    // Snapshot what's reachable BEFORE placing.
    const nodesReachableBefore = [];
    for (const [, n] of nodes) if (reachableNow(n.x, n.y)) nodesReachableBefore.push(n);
    const towerReachableBefore = reachableNow(tower.x, tower.y);

    // Temporarily place a non-walkable building and re-test only those.
    grid[gy][gx] = BUILDING;
    let stranded = null;
    for (const n of nodesReachableBefore) {
      if (!reachableNow(n.x, n.y)) { stranded = "a resource"; break; }
    }
    if (!stranded && towerReachableBefore && !reachableNow(tower.x, tower.y)) {
      stranded = "the tower";
    }
    grid[gy][gx] = EMPTY;

    if (stranded) return { ok: false, why: `Can't build there — it would cut off ${stranded}.` };
    return { ok: true };
  }

  function tryPlaceBuilding(gx, gy) {
    const b = BUILDINGS[buildMode];
    if (buildMode === "house" && workers.length >= MAX_WORKERS) {
      setMsg(`Outpost is full — ${MAX_WORKERS} workers is the max on this map.`);
      return;
    }
    const valid = placementValid(gx, gy);
    if (!valid.ok) { setMsg(valid.why); return; }
    if (res.wood < b.wood || res.stone < b.stone) {
      setMsg(`Need ${b.wood}w${b.stone?` + ${b.stone}s`:""}`);
      return;
    }
    const w = nearestIdleTo(gx, gy);
    if (!w) { setMsg(dispatchFailMsg(gx, gy)); return; }
    // pay now, construct on arrival
    res.wood -= b.wood; res.stone -= b.stone; updateHUD();
    dispatch(w, gx, gy, { build: buildMode });
    setMsg(`${w.name} is heading out to build the ${b.label}.`);
    toggleBuildMode(buildMode);   // exit build mode after placing
  }

  // Right-click anywhere on the canvas cancels build mode (mouse-only design).
  canvas.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    if (screen !== "play") return;
    if (buildMode) toggleBuildMode(buildMode);
  });

  // Track the cell under the cursor for the build-mode ghost preview, and handle
  // camera drag-panning when a grid press moves past the threshold.
  canvas.addEventListener("pointermove", (e) => {
    const { mx, my } = eventPos(e);
    mouse.x = mx; mouse.y = my;

    if (drag) {
      const dx = mx - drag.startX, dy = my - drag.startY;
      if (!drag.panning && Math.hypot(dx, dy) > DRAG_THRESH) drag.panning = true;
      if (drag.panning) {
        camera.x = drag.camX - dx;   // pull the map: dragging right reveals the left
        camera.y = drag.camY - dy;
        clampCamera();
      }
    }

    if (!buildMode || regionAt(my) !== "grid") { hoverCell = null; return; }
    const { tx, ty } = screenToTile(mx, my);
    hoverCell = (tx>=0 && ty>=0 && tx<worldCols && ty<worldRows) ? {x:tx, y:ty} : null;
  });

  // Release: if a grid press never became a pan, it's a click -> dispatch.
  canvas.addEventListener("pointerup", (e) => {
    if (drag) {
      if (!drag.panning && screen === "play" && !buildMode) {
        const { mx, my } = eventPos(e);
        if (regionAt(my) === "grid") handleGridClick(mx, my);
      }
      drag = null;
    }
  });

  canvas.addEventListener("pointerleave", () => { hoverCell = null; mouse.x = -1; mouse.y = -1; drag = null; });

  // Find the idle worker with the SHORTEST PATH to (gx,gy).
  function nearestIdleTo(gx, gy) {
    let best = null, bestLen = Infinity;
    for (const w of workers) {
      if (w.state !== "idle") continue;
      const path = astar(Math.round(w.px), Math.round(w.py), gx, gy);
      if (!path) continue;                 // can't reach it at all
      if (path.length < bestLen) { bestLen = path.length; best = w; best._pendingPath = path; }
    }
    return best;
  }

  const anyIdleWorker = () => workers.some(w => w.state === "idle");

  // Given a target got no worker, return the right reason for the player.
  function dispatchFailMsg(gx, gy) {
    return anyIdleWorker()
      ? "Can't reach that — clear a path first."
      : "Every worker is busy. Wait for one to finish.";
  }

  function dispatch(w, gx, gy, opts = {}) {
    // reuse the path nearestIdleTo already computed if present
    const path = w._pendingPath || astar(Math.round(w.px), Math.round(w.py), gx, gy);
    w._pendingPath = null;
    if (!path) { setMsg("No path there — break through the wall first."); return; }
    // cancel any stale repeat/haul state
    w._repeatNode = null;
    w._depositOnArrive = false;
    w.carry = null; w.carryAmt = 0;
    w._buildType = opts.build || null;   // building key to construct on arrival, or null
    w._upgradeWorkshop = opts.upgrade || null;   // workshop object to upgrade on arrival
    w._towerBuild = opts.tower || false;   // heading to the tower to contribute build progress
    // is the destination a live harvest node? (tree/rock/wall) — used to abort
    // the walk if it gets depleted before the worker arrives.
    w._targetNodeKey = (!w._buildType && !w._upgradeWorkshop && !w._towerBuild && nodes.has(key(gx, gy))) ? key(gx, gy) : null;
    w.path = path;
    w.target = {x: gx, y: gy};
    w.state = "moving";
  }

  // ---- Update loop ------------------------------------------------------
  const MOVE_MS = 260; // per tile

  // Fixed-step simulation. The world advances in whole TICK_MS steps regardless
  // of the display's refresh rate, so gameplay runs at identical speed on a
  // 60Hz and a 120Hz screen (fairness: a faster machine can't win). Rendering
  // still happens every animation frame. simNow is the accumulated sim time in
  // ms — ALL gameplay timing (movement, gather/build durations, tower progress,
  // the win timer) is measured against it, never against the wall clock.
  const TICK_MS = 16;                 // one simulation step
  const MAX_CATCHUP = 6;              // cap ticks/frame so a stalled tab can't flood catch-up
  let simNow = 0;                     // sim clock (ms of accumulated ticks)
  let simAccum = 0;                   // leftover real ms waiting to become ticks
  let lastFrame = 0;                  // wall-clock timestamp of previous frame

  function update(now) {
    // Non-play screens are static — draw and yield. Keep the frame clock fresh
    // so re-entering play doesn't see a huge first delta.
    if (screen !== "play" && screen !== "levelComplete") {
      lastFrame = now;
      if (screen === "mainMenu")    { drawMainMenu();    raf = requestAnimationFrame(update); return; }
      if (screen === "levelSelect") { drawLevelSelect(); raf = requestAnimationFrame(update); return; }
      if (screen === "levelIntro")  { drawTitle();       raf = requestAnimationFrame(update); return; }
    }
    if (screen === "levelComplete") { lastFrame = now; draw(); drawWinBanner(); raf = requestAnimationFrame(update); return; }

    // screen === "play": drain accumulated real time into fixed sim ticks.
    let dt = now - lastFrame;
    lastFrame = now;
    if (dt < 0) dt = 0;
    if (dt > 250) dt = 250;           // first frame / tab-return guard
    if (!done) {
      simAccum += dt;
      let steps = 0;
      while (simAccum >= TICK_MS && steps < MAX_CATCHUP) {
        simNow += TICK_MS;
        for (const w of workers) stepWorker(w, simNow);
        simAccum -= TICK_MS;
        steps++;
      }
      if (steps === MAX_CATCHUP) simAccum = 0;   // dropped ticks after a stall; don't hoard them
      timerStr = fmt(Math.floor(simNow / 1000));
    }
    draw();
    raf = requestAnimationFrame(update);
  }

  function stepWorker(w, now) {
    w.animT += TICK_MS;
    if (w.state === "moving") {
      // If the worker is walking to a harvest node that got depleted mid-transit,
      // stop now instead of walking to an empty tile. (_targetNodeKey is set only
      // when the destination was a live tree/rock/wall at dispatch time.)
      if (w._targetNodeKey && !nodes.has(w._targetNodeKey)) {
        w._targetNodeKey = null;
        w._repeatNode = null;
        w.state = "idle"; w.target = null; w.path = [];
        return;
      }
      if (w.path.length === 0) {
        if (w.target) { arriveAtTarget(w, now); }
        else { w.state = "idle"; }
        return;
      }
      w.moveT += TICK_MS;
      const next = w.path[0];
      if (next.x > Math.round(w.px)) w.facing = 1;
      else if (next.x < Math.round(w.px)) w.facing = -1;
      const p = Math.min(1, w.moveT / MOVE_MS);
      w.px = lerp(w.startX ?? w.px, next.x, p);
      w.py = lerp(w.startY ?? w.py, next.y, p);
      if (p >= 1) {
        w.px = next.x; w.py = next.y;
        w.path.shift();
        w.moveT = 0;
        w.startX = w.px; w.startY = w.py;
      } else if (w.moveT === TICK_MS) {
        w.startX = Math.round(w.px); w.startY = Math.round(w.py);
      }
    } else if (w.state === "working") {
      if (now >= w.workUntil) finishWork(w, now);
    } else if (w.state === "building") {
      if (now >= w.buildUntil) finishBuild(w, now);
    } else if (w.state === "tower") {
      // Each parked worker contributes one fixed tick of effort. N workers => N x
      // progress per tick => finishes in TOWER_BUILD_MS / N (linear).
      if (tower.built) { w._towerBuild = false; w.state = "idle"; return; }
      tower.progress += TICK_MS / TOWER_BUILD_MS;
      if (tower.progress >= 1) {
        tower.progress = 1;
        tower.built = true;
        tower.building = false;
        grid[tower.y][tower.x] = TOWER;
        // release everyone parked on the tower back to idle
        for (const o of workers) if (o.state === "tower") { o._towerBuild = false; o.state = "idle"; o.target = null; }
        updateHUD();
        win(now);
      }
    }
  }

  const BUILD_MS = 2600;   // time to construct a house/workshop
  const UPGRADE_MS = 4200;  // upgrading an existing workshop — longer than a fresh build

  function finishBuild(w, now) {
    const key_ = w._buildType;
    const at = w._buildAt;
    w._buildType = null; w._buildAt = null;
    if (!at) { w.state = "idle"; return; }
    const bx = at.x, by = at.y;

    // Workshop upgrade completing (no _buildType — it's an upgrade payload).
    if (w._upgradeWorkshop) {
      const ws = w._upgradeWorkshop;
      w._upgradeWorkshop = null;
      ws.level = 2;
      workshopLevel = Math.max(workshopLevel, 2);
      addFloater(bx, by, "Upgraded!", "#cfe6c0");
      setMsg("Workshop upgraded to Level 2! Workers can now break the wall.");
    } else if (key_ === "house") {
      const newHome = addHouse(bx, by, false);
      spawnWorker(newHome);
      addFloater(bx, by, "House!", "#cfe6c0");
      setMsg(`House built — worker ${workers.length} moved in`);
    } else if (key_ === "workshop") {
      grid[by][bx] = BUILDING;
      workshops.push({ x: bx, y: by, level: 1 });
      workshopLevel = Math.max(workshopLevel, 1);
      addFloater(bx, by, "Workshop!", "#cfe6c0");
      setMsg("Workshop built — rock mining unlocked");
    }

    // Builder walks back to its OWN home instead of standing on the new build.
    const path = astar(Math.round(w.px), Math.round(w.py), w.home.x, w.home.y);
    if (path) {
      w.path = path;
      w.target = { x: w.home.x, y: w.home.y };
      w.state = "moving";
    } else {
      w.state = "idle"; w.target = null;
    }
  }

  function arriveAtTarget(w, now) {
    const tgt = w.target;
    const t = grid[tgt.y][tgt.x];

    // Upgrading an existing workshop from L1 to L2. Enter the timed "building"
    // state (same machinery as a fresh build) but with UPGRADE_MS and the
    // workshop reference carried through; finishBuild applies the level bump.
    if (w._upgradeWorkshop) {
      w.state = "building";
      w.buildUntil = now + UPGRADE_MS;
      w._buildAt = { x: tgt.x, y: tgt.y };
      w.target = null;
      return;
    }

    // Constructing a building the player placed via the build menu.
    // Enter a timed "building" state; the structure appears when it completes,
    // then the builder walks back to its OWN home (no stacking on the new house).
    if (w._buildType) {
      w.state = "building";
      w.buildUntil = now + BUILD_MS;
      w._buildAt = { x: tgt.x, y: tgt.y };
      w.target = null;
      return;
    }

    // Arrived adjacent to the tower to contribute build progress. Park in the
    // "tower" state; stepWorker accumulates progress every frame while here.
    if (w._towerBuild && !tower.built) {
      w.state = "tower";
      w.target = null;
      return;
    }
    if (w._towerBuild) { w._towerBuild = false; w.state = "idle"; w.target = null; return; }

    // A hauler carrying goods has arrived at its own home tile. Deposit here and
    // re-arm the gather loop directly — this must happen in arriveAtTarget (same
    // sim tick as arrival), not in a separate render-time pass, or the node
    // lookup below would idle the worker before any deposit fired.
    if (w._depositOnArrive && tgt.x === w.home.x && tgt.y === w.home.y) {
      depositAndRepeat(w);
      return;
    }

    const node = nodes.get(key(tgt.x, tgt.y));
    if (!node) { w.state = "idle"; w.target = null; w._targetNodeKey = null; return; }

    w.state = "working";
    w.workUntil = now + JOB[node.type].work;
    w._node = node;
    w._targetNodeKey = null;   // arrived; no longer in transit
  }

  function finishWork(w, now) {
    const node = w._node;
    if (!node) { w.state = "idle"; return; }
    const job = JOB[node.type];

    // Double-spend guard: if another worker already finished this node off
    // (gone from the map, or hp already <=0), this worker banks nothing.
    const stillLive = nodes.has(key(node.x, node.y)) && node.hp > 0;
    if (!stillLive) {
      w._node = null; w._repeatNode = null;
      w.state = "idle"; w.target = null;
      return;
    }

    // Units per swing = job.amount (for resource nodes, 1 hp == 1 unit, and hp
    // divides evenly by amount, so this is always a whole load — no partials).
    // For the wall, amount is 0 and swingHp falls back to a fixed chunk.
    const swingHp = job.res ? Math.min(job.amount, node.hp) : Math.min(3, node.hp);
    node.hp -= swingHp;

    if (job.res && swingHp > 0) {
      w.carry = job.res;
      w.carryAmt = (w.carryAmt || 0) + swingHp;   // 1 hp == 1 unit
    }

    if (node.hp <= 0) {
      remove(node.x, node.y);
      setMsg(job.label === "wall" ? "Wall breached — the way is open." : `Depleted a ${job.label}.`);
    }

    if (job.res) {
      w._repeatNode = (node.hp > 0) ? {x: node.x, y: node.y} : null;
      // haul back to THIS worker's own home
      const path = astar(Math.round(w.px), Math.round(w.py), w.home.x, w.home.y);
      w.path = path || [];
      w.target = {x: w.home.x, y: w.home.y};
      w.state = "moving";
      w._depositOnArrive = true;
      w._node = null;
    } else {
      if (node.hp > 0) { w.state = "working"; w.workUntil = now + job.work; }
      else { w.state = "idle"; w.target = null; w._node = null; }
    }
  }

  // Deposit a hauler's load at home and either resume gathering the same node
  // (if it still has resources) or go idle. Called from arriveAtTarget the moment
  // the worker reaches home, on the sim clock.
  function depositAndRepeat(w) {
    if (w.carry) {
      res[w.carry] += w.carryAmt;
      const col = w.carry === "wood" ? "#d69a4c" : "#aab4c0";
      addFloater(w.home.x, w.home.y, `+${w.carryAmt}`, col);
    }
    w.carry = null; w.carryAmt = 0;
    w._depositOnArrive = false;
    updateHUD();
    checkReady();

    // Repeat: return to the same node if it still has resources.
    const rn = w._repeatNode;
    if (rn && nodes.has(key(rn.x, rn.y))) {
      const path = astar(Math.round(w.px), Math.round(w.py), rn.x, rn.y);
      if (path) {
        w.path = path;
        w.target = {x: rn.x, y: rn.y};
        w._targetNodeKey = key(rn.x, rn.y);   // enable mid-transit abort on return
        w.state = "moving";
        return;
      }
    }
    w._repeatNode = null;
    w.state = "idle"; w.target = null;
  }

  function checkReady() {
    if (res.wood >= NEED_WOOD && res.stone >= NEED_STONE && !tower.built) {
      setMsg("Enough materials! Click the Tower site — the nearest free worker will build it.");
    }
  }

  // ---- Rendering --------------------------------------------------------
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ==== WORLD (clipped to the play viewport, offset by camera) ====
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, VIEW_Y, VIEW_W, VIEW_H);
    ctx.clip();
    // Snap the camera offset to whole pixels for the draw. Fractional offsets
    // put tile edges on sub-pixels, and with image smoothing off the browser
    // rounds adjacent tiles inconsistently — leaving flickering 1px seams that
    // "stick" until the camera lands on an integer. Rounding the translate here
    // (without touching the stored camera) makes panning smooth AND seam-free.
    const camDX = Math.round(camera.x), camDY = Math.round(camera.y);
    ctx.translate(-camDX, VIEW_Y - camDY);

    // Only iterate tiles within the visible camera window (+1 tile margin), so
    // big worlds don't pay to draw off-screen tiles.
    const x0 = Math.max(0, Math.floor(camera.x / TILE));
    const y0 = Math.max(0, Math.floor(camera.y / TILE));
    const x1 = Math.min(worldCols, Math.ceil((camera.x + VIEW_W) / TILE) + 1);
    const y1 = Math.min(worldRows, Math.ceil((camera.y + VIEW_H) / TILE) + 1);

    // ground
    for (let y=y0; y<y1; y++) for (let x=x0; x<x1; x++) {
      if (sheetReady) {
        blit(groundTile(x, y), x, y);
      } else {
        ctx.fillStyle = ((x+y)&1) ? "#2a3f2a" : "#2f472f";
        ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
      }
    }

    // tiles
    for (let y=y0; y<y1; y++) for (let x=x0; x<x1; x++) {
      const t = grid[y][x];
      const cx = x*TILE + TILE/2, cy = y*TILE + TILE/2;
      const has = (k) => sheetReady && TILEMAP[k] != null;
      if (t === TREE)   has("tree")  ? blit(TILEMAP.tree, x, y)  : drawTree(cx, cy, nodes.get(key(x,y)));
      else if (t === ROCK)   has("rock")  ? blit(TILEMAP.rock, x, y)  : drawRock(cx, cy, nodes.get(key(x,y)));
      else if (t === RUBBLE) has("wall") ? blit(TILEMAP.wall, x, y) : drawRubble(cx, cy, nodes.get(key(x,y)));
      else if (t === STOCK)  {
        has("store") ? blit(TILEMAP.store, x, y) : drawHouse(x*TILE, y*TILE);
        // house level badge (all houses L1 for now; upgrade mechanics come later)
        const h = houses.find(hh => hh.x === x && hh.y === y);
        if (h) levelBadge(x, y, h.level || 1);
      }
      else if (t === BUILDING) {
        const ws = workshops.find(s => s.x === x && s.y === y);
        const tile = (ws && ws.level >= 2) ? WORKSHOP_UPGRADE.tile : BUILDINGS.workshop.tile;
        blit(tile, x, y);
        if (ws) levelBadge(x, y, ws.level);
        // pulsing "up arrow" hint on an upgradeable L1 workshop you can afford
        if (ws && ws.level === 1 &&
            res.wood >= WORKSHOP_UPGRADE.wood && res.stone >= WORKSHOP_UPGRADE.stone) {
          const pulse = 0.5 + 0.4*Math.abs(Math.sin(performance.now()/400));
          ctx.globalAlpha = pulse;
          ctx.fillStyle = "#ffcf3f";
          ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
          ctx.fillText("▲", x*TILE + TILE/2, y*TILE + 12);
          ctx.globalAlpha = 1;
        }
      }
      else if (t === TOWER)  {
        if (tower.built) {
          has("tower") ? blit(TILEMAP.tower, x, y) : drawTower(x*TILE, y*TILE);
        } else {
          // Unbuilt site: ground is already drawn beneath; overlay a faded,
          // pulsing preview of the tower (tile 7) so it reads as "build here",
          // not a hole in the map.
          const pulse = 0.35 + 0.30*Math.abs(Math.sin(performance.now()/600));
          ctx.save();
          ctx.globalAlpha = pulse;
          if (charReady) blit(7, x, y, charSheet, charReady); else drawTower(x*TILE, y*TILE);
          ctx.restore();
          // "BUILD" tag + a solid outline so the target is unmistakable
          ctx.strokeStyle = `rgba(230,180,34,${0.5+0.4*Math.abs(Math.sin(performance.now()/600))})`;
          ctx.lineWidth = 2; ctx.setLineDash([5,4]);
          ctx.strokeRect(x*TILE+3, y*TILE+3, TILE-6, TILE-6);
          ctx.setLineDash([]);
          ctx.fillStyle = "rgba(0,0,0,.55)";
          ctx.fillRect(x*TILE+4, y*TILE+TILE-13, TILE-8, 11);
          ctx.fillStyle = "#e6b422";
          ctx.font = "8px sans-serif"; ctx.textAlign = "center";
          ctx.fillText("TOWER", x*TILE+TILE/2, y*TILE+TILE-4);

          // build progress bar — same style/position as node health bars, but
          // it FILLS as work accumulates (health bars drain). Green throughout
          // since this is progress toward done, not damage.
          if (tower.building) {
            const frac = Math.max(0, Math.min(1, tower.progress));
            const bx = x*TILE + 6, by = y*TILE + 3, bw = TILE - 12, bh = 4;
            ctx.fillStyle = "rgba(0,0,0,.55)";
            ctx.fillRect(bx-1, by-1, bw+2, bh+2);
            ctx.fillStyle = "#6fae5f";
            ctx.fillRect(bx, by, bw * frac, bh);
          }
        }
      }
    }

    // health bars — only on damaged nodes (hidden when full)
    for (const [, n] of nodes) {
      const max = JOB[n.type].hp;
      if (n.hp >= max) continue;               // full = no bar
      const frac = Math.max(0, n.hp / max);
      const bx = n.x*TILE + 6, by = n.y*TILE + 3, bw = TILE - 12, bh = 4;
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(bx-1, by-1, bw+2, bh+2);
      ctx.fillStyle = frac > 0.5 ? "#6fae5f" : frac > 0.25 ? "#e6b422" : "#c0503a";
      ctx.fillRect(bx, by, bw * frac, bh);
    }

    // Build-mode ghost: highlight the cell under the cursor green (valid) or red.
    if (buildMode && hoverCell) {
      const { x, y } = hoverCell;
      const valid = placementValid(x, y).ok && res.wood >= BUILDINGS[buildMode].wood
                    && res.stone >= BUILDINGS[buildMode].stone;
      const hx = x*TILE, hy = y*TILE;
      // ghost sprite of the building, faded
      ctx.globalAlpha = 0.5;
      if (sheetReady) blit(BUILDINGS[buildMode].tile, x, y);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = valid ? "#6fae5f" : "#c0503a";
      ctx.lineWidth = 3;
      ctx.strokeRect(hx+2, hy+2, TILE-4, TILE-4);
    }

    // path dots for every moving worker
    ctx.fillStyle = "rgba(255,224,138,.30)";
    for (const w of workers) {
      for (const p of w.path) {
        ctx.beginPath();
        ctx.arc(p.x*TILE+TILE/2, p.y*TILE+TILE/2, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }

    for (const w of workers) drawWorker(w);

    // floating "+N" deposit popups — rise and fade over ~1s
    const FLOAT_MS = 1000, nowT = performance.now();
    for (const f of floaters) {
      const age = nowT - f.born;
      const p = age / FLOAT_MS;
      const fx = f.x*TILE + TILE/2;
      const fy = f.y*TILE + TILE/2 - 8 - p*22;   // drift upward
      ctx.globalAlpha = Math.max(0, 1 - p);
      ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
      ctx.textAlign = "center";
      ctx.lineWidth = 3; ctx.strokeStyle = "rgba(0,0,0,.7)";
      ctx.strokeText(f.text, fx, fy);
      ctx.fillStyle = f.color;
      ctx.fillText(f.text, fx, fy);
      ctx.globalAlpha = 1;
    }
    floaters = floaters.filter(f => nowT - f.born < FLOAT_MS);

    ctx.restore();   // ==== END WORLD (back to screen space) ====

    // ==== UI (screen space) ====
    drawHUD();
    drawBuildBar();
    drawExploreArrows();

    // Sticky intro banner — wrapped, boxed, no fade. Sits at the top of the play
    // field until the player's first real action clears it.
    if (introBanner) {
      ctx.save();
      ctx.font = "bold 14px 'Trebuchet MS', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const maxTextW = VIEW_W - 80;         // keep well inside both canvas edges
      const lines = wrapLines(introBanner.text, maxTextW);
      const lineH = 20, padX = 18, padY = 12;
      let boxW = 0;
      for (const ln of lines) boxW = Math.max(boxW, ctx.measureText(ln).width);
      boxW = Math.min(boxW + padX*2, VIEW_W - 24);
      const boxH = lines.length * lineH + padY*2;
      const cx = VIEW_W / 2, top = VIEW_Y + 12;
      // plate
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = "#141e28";
      roundRect(ctx, cx - boxW/2, top, boxW, boxH, 10);
      ctx.fill();
      ctx.strokeStyle = "rgba(125,224,125,.35)"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.globalAlpha = 1;
      // text lines
      ctx.fillStyle = "#dbe6f0";
      let ly = top + padY + lineH/2;
      for (const ln of lines) { ctx.fillText(ln, cx, ly); ly += lineH; }
      // dismiss hint
      ctx.font = "10px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = "#7de07d";
      ctx.fillText("— click anything to begin —", cx, top + boxH - 2);
      ctx.restore();
    }

    // Centered notification flash — fades over ~2.4s, holding solid for first half.
    if (flash) {
      const FLASH_MS = 2400, age = performance.now() - flash.born;
      if (age < FLASH_MS) {
        const p = age / FLASH_MS;
        const alpha = p < 0.6 ? 1 : Math.max(0, 1 - (p - 0.6) / 0.4);
        ctx.save();
        ctx.font = "bold 16px 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        const tw = ctx.measureText(flash.text).width;
        const cx = VIEW_W / 2, cy = VIEW_Y + 26;
        ctx.globalAlpha = alpha * 0.82;
        ctx.fillStyle = "#1a2530";
        const pad = 14, ph = 30;
        roundRect(ctx, cx - tw/2 - pad, cy - ph/2, tw + pad*2, ph, 8);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,.15)"; ctx.lineWidth = 1; ctx.stroke();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = flash.color;
        ctx.fillText(flash.text, cx, cy);
        ctx.restore();
      } else {
        flash = null;
      }
    }

    // (levelComplete screen draws the banner explicitly in update(); no need here)
    drawTooltip();
    if (showPicker) drawPicker();
  }

  // small "Ln" badge in a building tile's lower-left corner (world space)
  function levelBadge(gx, gy, level) {
    const bx = gx*TILE + 3, by = gy*TILE + TILE - 15;
    ctx.save();
    ctx.fillStyle = "rgba(20,30,40,.82)";
    roundRect(ctx, bx, by, 20, 12, 3);
    ctx.fill();
    ctx.fillStyle = "#ffcf3f";
    ctx.font = "bold 9px 'Trebuchet MS', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("L" + level, bx + 10, by + 6);
    ctx.restore();
  }

  // small rounded-rect helper for the flash plate
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  // shadowed rounded panel helper — the core of the "professional" look
  function panel(x, y, w, h, r, fill, opts = {}) {
    ctx.save();
    if (opts.shadow !== false) {
      ctx.shadowColor = "rgba(0,0,0,.45)";
      ctx.shadowBlur = opts.shadowBlur ?? 8;
      ctx.shadowOffsetY = opts.shadowOffsetY ?? 3;
    }
    roundRect(ctx, x, y, w, h, r);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.restore();
    // top inner highlight for a raised feel
    if (opts.highlight !== false) {
      ctx.save();
      roundRect(ctx, x+1.5, y+1.5, w-3, h-3, r-1);
      ctx.clip();
      const g = ctx.createLinearGradient(0, y, 0, y+h*0.5);
      g.addColorStop(0, "rgba(255,255,255,.16)");
      g.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(x, y, w, h*0.5);
      ctx.restore();
    }
    if (opts.stroke) {
      roundRect(ctx, x+.5, y+.5, w-1, h-1, r);
      ctx.strokeStyle = opts.stroke; ctx.lineWidth = opts.strokeW ?? 2; ctx.stroke();
    }
  }

  // draw a small resource icon (tile from a sheet) at a given screen box
  function icon(tileIdx, dx, dy, size, img, ready) {
    if (!ready) return;
    const { sx, sy } = srcXY(tileIdx);
    ctx.drawImage(img, sx, sy, SRC, SRC, dx, dy, size, size);
  }

  // ---- Top HUD bar ----
  function drawHUD() {
    // bar background
    ctx.fillStyle = "#243342";
    ctx.fillRect(0, 0, VIEW_W, HUD_H);
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.fillRect(0, HUD_H-3, VIEW_W, 3);

    const cy = HUD_H/2;
    let x = 14;

    // Level label
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "bold 15px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#ffffff";
    ctx.fillText("OUTPOST", x, cy-9);
    ctx.font = "10px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#8fb0d0";
    const _hudL = LEVELS[currentLevel];
    ctx.fillText(`${_hudL.subtitle} · ${_hudL.name.toUpperCase()}`, x, cy+8);
    x += 150;

    // resource pills
    x = drawResourcePill(x, cy, TILEMAP.tree, "#e09a4a", res.wood, "wood");
    x = drawResourcePill(x, cy, TILEMAP.rock, "#9fb0c0", res.stone, "stone");

    // worker count pill
    x = drawResourcePill(x, cy, null, "#5fc55f", workers.length + "/" + MAX_WORKERS, "crew", "☺");

    // timer + stars (right-aligned)
    ctx.textAlign = "right";
    ctx.font = "bold 16px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(timerStr, VIEW_W - 14, cy - 8);
    // live star preview based on current SIM time (matches the timer above)
    const sec = done ? null : Math.floor(simNow / 1000);
    const liveStars = done ? winStars : starsFor(sec ?? 0);
    ctx.font = "12px sans-serif";
    const gW = 12, rightX = VIEW_W - 14;
    ctx.textAlign = "center";
    for (let i=0;i<3;i++) {
      ctx.fillStyle = i < liveStars ? STAR_COLORS[i] : EMPTY_STAR;
      // draw right-aligned block: rightmost star at rightX
      ctx.fillText(i < liveStars ? "★" : "☆", rightX - (2-i)*gW - gW/2, cy + 9);
    }
    ctx.textAlign = "left";
  }

  function drawResourcePill(x, cy, tileIdx, color, value, label, glyph) {
    const w = 92, h = 38, y = cy - h/2;
    panel(x, y, w, h, 9, "#1b2836", { shadowBlur: 5, shadowOffsetY: 2 });
    // icon
    if (tileIdx != null) {
      icon(tileIdx, x+7, y+7, 24, sheet, sheetReady);
    } else if (glyph) {
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "18px sans-serif"; ctx.fillStyle = color;
      ctx.fillText(glyph, x+19, y+h/2);
    }
    // value + label
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "bold 17px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(value, x+36, cy-6);
    ctx.font = "9px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = color;
    ctx.fillText(label.toUpperCase(), x+36, cy+8);
    return x + w + 8;
  }

  // Bouncing arrows on the right/bottom edges of the play viewport, shown only
  // when there's more world to scroll to that direction. Cue for larger maps.
  function drawExploreArrows() {
    const canRight = camera.x < worldPxW() - VIEW_W - 1;
    const canDown  = camera.y < worldPxH() - VIEW_H - 1;
    const canLeft  = camera.x > 1;
    const canUp    = camera.y > 1;
    if (!canRight && !canDown && !canLeft && !canUp) return;
    const t = performance.now() / 1000;
    const bounce = Math.sin(t * 4) * 5;   // px of travel
    ctx.save();
    ctx.fillStyle = "#ffcf3f";
    ctx.strokeStyle = "rgba(0,0,0,.5)"; ctx.lineWidth = 2;
    if (canRight) { arrowTri(VIEW_W - 16 + bounce, VIEW_Y + VIEW_H/2, 1, 0); }
    if (canLeft)  { arrowTri(16 - bounce, VIEW_Y + VIEW_H/2, -1, 0); }
    if (canDown)  { arrowTri(VIEW_W/2, VIEW_Y + VIEW_H - 16 + bounce, 0, 1); }
    if (canUp)    { arrowTri(VIEW_W/2, VIEW_Y + 16 - bounce, 0, -1); }
    ctx.restore();
  }
  // Filled triangle arrow at (cx,cy) pointing along unit (dx,dy).
  function arrowTri(cx, cy, dx, dy) {
    const s = 12, px = -dy, py = dx;
    ctx.beginPath();
    ctx.moveTo(cx + dx*s, cy + dy*s);
    ctx.lineTo(cx - dx*s + px*s, cy - dy*s + py*s);
    ctx.lineTo(cx - dx*s - px*s, cy - dy*s - py*s);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  // ---- Bottom build bar ----
  function drawBuildBar() {
    const by = HUD_H + VIEW_H;
    ctx.fillStyle = "#243342";
    ctx.fillRect(0, by, VIEW_W, BUILD_H);
    ctx.fillStyle = "rgba(255,255,255,.06)";
    ctx.fillRect(0, by, VIEW_W, 3);

    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#8fb0d0";
    ctx.fillText("BUILD", 16, by + 16);

    // build buttons as cards
    buildButtons = [];
    const keys = Object.keys(BUILDINGS);
    const cardW = 150, cardH = 54, gap = 12;
    let cx = 16, cyTop = by + 24;
    for (const key of keys) {
      const b = BUILDINGS[key];
      const affordable = res.wood >= b.wood && res.stone >= b.stone;
      const active = buildMode === key;
      const hover = pointInRect(mouse.x, mouse.y, cx, cyTop, cardW, cardH);

      let fill = "#2f4a63";
      if (active) fill = "#3f7a3f";
      else if (hover && affordable) fill = "#3a5a78";
      panel(cx, cyTop, cardW, cardH, 10, fill,
            { stroke: active ? "#7de07d" : "rgba(255,255,255,.12)", strokeW: active?2:1 });

      // icon
      icon(b.tile, cx+8, cyTop+11, 32, sheet, sheetReady);
      // label + cost + desc
      ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
      ctx.font = "bold 14px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = affordable ? "#ffffff" : "#8a9aa8";
      ctx.fillText(b.label, cx+46, cyTop+20);
      ctx.font = "11px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = affordable ? "#ffcf3f" : "#c07a5a";
      ctx.fillText(costText(b), cx+46, cyTop+34);
      ctx.font = "9px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = "#9fb8cc";
      ctx.fillText(b.desc, cx+46, cyTop+47);

      buildButtons.push({ key, x: cx, y: cyTop, w: cardW, h: cardH });
      cx += cardW + gap;
    }

    // hint text to the right
    if (buildHint) {
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillStyle = "#7de07d";
      ctx.fillText(buildHint, cx + 6, by + BUILD_H/2);
    }

    // restart button (bottom-right)
    const rbW = 84, rbH = 30, rbX = VIEW_W - rbW - 14, rbY = by + BUILD_H - rbH - 12;
    const rbHover = pointInRect(mouse.x, mouse.y, rbX, rbY, rbW, rbH);
    panel(rbX, rbY, rbW, rbH, 8, rbHover ? "#3a5a78" : "#2f4a63",
          { stroke: "rgba(255,255,255,.12)", strokeW: 1 });
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#ffffff";
    ctx.fillText("↻ Restart", rbX + rbW/2, rbY + rbH/2);
    restartBtn = { x: rbX, y: rbY, w: rbW, h: rbH };

    // quit button (left of restart) — back to the level's title/intro screen
    const qbW = 72, qbX = rbX - qbW - 8, qbY = rbY, qbH = rbH;
    const qbHover = pointInRect(mouse.x, mouse.y, qbX, qbY, qbW, qbH);
    panel(qbX, qbY, qbW, qbH, 8, qbHover ? "#6a3a3a" : "#553030",
          { stroke: "rgba(255,255,255,.12)", strokeW: 1 });
    ctx.fillStyle = "#ffffff";
    ctx.fillText("✕ Quit", qbX + qbW/2, qbY + qbH/2);
    quitBtn = { x: qbX, y: qbY, w: qbW, h: qbH };
  }

  function pointInRect(px, py, x, y, w, h) {
    return px >= x && px <= x+w && py >= y && py <= y+h;
  }

  // ---- Hover tooltip ----
  // Returns { text, color } for the tile under the cursor, or null.
  function tileTooltip(gx, gy) {
    if (gx < 0 || gy < 0 || gx >= worldCols || gy >= worldRows) return null;

    // Workshops (upgradeable buildings)
    const ws = workshops.find(s => s.x === gx && s.y === gy);
    if (ws) {
      if (ws.level >= 2) return { text: "Workshop · Max Level", color: "#9fb8cc" };
      const u = WORKSHOP_UPGRADE;
      return { text: `Upgrade for ${u.wood}w ${u.stone}s`, color: "#ffcf3f" };
    }

    // Houses (the starting home and any built via the menu). The stockpile is
    // the ethereal resource total in the HUD, not a tile — these are all houses.
    const ho = houses.find(hh => hh.x === gx && hh.y === gy);
    if (ho) return { text: `House · Level ${ho.level || 1}`, color: "#cfe6c0" };

    const t = grid[gy][gx];
    if (t === TREE) return { text: "Wood", color: "#e09a4a" };
    if (t === ROCK) return { text: "Stone", color: "#9fb0c0" };
    if (t === RUBBLE) return { text: "Break Wall", color: "#c9a06a" };
    if (t === TOWER && !tower.built) {
      if (tower.building) return { text: "Add builder to the tower", color: "#7de07d" };
      return { text: `Build Tower for ${NEED_WOOD}w ${NEED_STONE}s`, color: "#ffcf3f" };
    }
    return null;
  }

  // Draw a small tooltip near the cursor (screen space).
  function drawTooltip() {
    if (screen !== "play" || done || buildMode) return;
    if (regionAt(mouse.y) !== "grid") return;
    const { tx, ty } = screenToTile(mouse.x, mouse.y);
    const tip = tileTooltip(tx, ty);
    if (!tip) return;

    ctx.save();
    ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    const tw = ctx.measureText(tip.text).width;
    const padX = 9, h = 24;
    let bx = mouse.x + 14, by = mouse.y - h - 6;
    // keep on-screen
    if (bx + tw + padX*2 > VIEW_W) bx = mouse.x - tw - padX*2 - 14;
    if (by < VIEW_Y) by = mouse.y + 16;
    panel(bx, by, tw + padX*2, h, 7, "rgba(20,30,40,.92)",
          { shadowBlur: 6, shadowOffsetY: 2, highlight: false, stroke: "rgba(255,255,255,.14)", strokeW: 1 });
    ctx.fillStyle = tip.color;
    ctx.fillText(tip.text, bx + padX, by + h/2);
    ctx.restore();
  }

  // ---- Level-complete overlay ----
  function drawWinBanner() {
    ctx.fillStyle = "rgba(15,22,30,.78)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const cw = 380, ch = 260, cx = (canvas.width-cw)/2, cy = (canvas.height-ch)/2;
    panel(cx, cy, cw, ch, 16, "#2f4a63", { shadowBlur: 24, shadowOffsetY: 8,
           stroke: "rgba(255,255,255,.15)", strokeW: 2 });

    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px 'Trebuchet MS', sans-serif";
    ctx.fillText((LEVELS[currentLevel].clearText || "LEVEL CLEARED").toUpperCase(), cx+cw/2, cy+52);

    ctx.font = "34px sans-serif";
    // per-star tier colors: bronze, silver, gold; empty stars greyed
    const glyphW = 30, total = glyphW*3, sx0 = cx+cw/2 - total/2 + glyphW/2;
    for (let i=0;i<3;i++) {
      ctx.fillStyle = i < winStars ? STAR_COLORS[i] : EMPTY_STAR;
      ctx.fillText(i < winStars ? "★" : "☆", sx0 + i*glyphW, cy+100);
    }

    ctx.font = "12px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = "#b8c9d9";
    ctx.fillText(winTimeStr, cx+cw/2, cy+130);

  }

  // Full-sheet index picker. D toggles, T flips sheet. Reads indices straight off.
  function drawPicker() {
    const cell = 44, pad = 2, cols = SHEET_COLS;
    const img   = pickerSheet ? charSheet : sheet;
    const ready = pickerSheet ? charReady : sheetReady;
    const name  = pickerSheet ? "dungeon.png (characters)" : "tilemap.png (terrain)";

    ctx.fillStyle = "rgba(8,6,4,.94)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#e8ddc8";
    ctx.font = "12px 'Trebuchet MS', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`TILE PICKER — ${name}   ·   D close   ·   T flip sheet`, pad+2, 15);

    if (!ready) {
      ctx.fillText(`${pickerSheet ? "dungeon.png" : "tilemap.png"} not loaded — serve over http/https, not file://`, pad+2, 34);
      return;
    }

    const ox = pad, oy = 22;
    for (let i = 0; i < SHEET_N; i++) {
      const c = i % cols, r = (i / cols) | 0;
      const dx = ox + c*cell, dy = oy + r*cell;
      const { sx, sy } = srcXY(i);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, sx, sy, SRC, SRC, dx, dy, cell-2, cell-2);
      ctx.fillStyle = "rgba(0,0,0,.6)";
      ctx.fillRect(dx, dy+cell-13, 20, 11);
      ctx.fillStyle = "#ffe08a";
      ctx.font = "9px monospace";
      ctx.fillText(i, dx+2, dy+cell-4);
    }
  }

  function drawTree(cx, cy, n) {
    const hurt = n ? n.hp / JOB[TREE].hp : 1;
    ctx.fillStyle = "#5a3a1e"; ctx.fillRect(cx-3, cy+4, 6, 10);
    ctx.fillStyle = `rgb(${60+ (1-hurt)*40}, ${120*hurt+40}, 50)`;
    ctx.beginPath(); ctx.arc(cx, cy-2, 12*Math.max(.5,hurt), 0, Math.PI*2); ctx.fill();
  }
  function drawRock(cx, cy, n) {
    const hurt = n ? n.hp / JOB[ROCK].hp : 1;
    ctx.fillStyle = `rgb(${130+ (1-hurt)*30}, ${140}, ${150})`;
    ctx.beginPath();
    ctx.moveTo(cx-11, cy+9); ctx.lineTo(cx-6, cy-9);
    ctx.lineTo(cx+7, cy-7); ctx.lineTo(cx+12, cy+9);
    ctx.closePath(); ctx.fill();
  }
  function drawRubble(cx, cy, n) {
    ctx.fillStyle = "#4a3d2c";
    for (let i=0;i<4;i++){
      const ox=(i%2?6:-6), oy=(i<2?-5:6);
      ctx.fillRect(cx+ox-4, cy+oy-4, 8, 8);
    }
  }
  function drawHouse(x, y) {
    ctx.fillStyle = "#3a2c1c"; ctx.fillRect(x+6, y+6, TILE-12, TILE-12);
    ctx.strokeStyle = "#6b5236"; ctx.lineWidth=2; ctx.strokeRect(x+6, y+6, TILE-12, TILE-12);
    ctx.fillStyle = "#9a8b73"; ctx.font="8px sans-serif"; ctx.textAlign="center";
    ctx.fillText("HOME", x+TILE/2, y+TILE-4);
  }
  function drawTower(x, y) {
    const built = tower.built;
    ctx.fillStyle = built ? "#7a6a4a" : "#2c2318";
    ctx.fillRect(x+8, y+6, TILE-16, TILE-10);
    ctx.strokeStyle = built ? "#e6b422" : "#5a4632";
    ctx.lineWidth = 2; ctx.setLineDash(built ? [] : [4,3]);
    ctx.strokeRect(x+8, y+6, TILE-16, TILE-10);
    ctx.setLineDash([]);
    if (built) { ctx.fillStyle="#e6b422"; ctx.fillRect(x+TILE/2-2, y+2, 4, 8); }
  }
  function drawWorker(w) {
    const cx = w.px*TILE + TILE/2;      // sprite center x
    const topY = w.py*TILE;             // cell top y

    // ---- procedural motion offsets ----
    let bob = 0, wiggle = 0, lift = 0;
    if (w.state === "moving") {
      // walk-bob: hop on a sine wave, ~5 hops/sec
      bob = -Math.abs(Math.sin(w.animT / 90)) * 3;
    } else if (w.state === "working" || w.state === "building" || w.state === "tower") {
      // work-wiggle: quick side-to-side while chopping/mining/building
      wiggle = Math.sin(w.animT / 45) * 2;
    }
    if (w.carry) lift = -3;             // carry-lift: raised while hauling

    const drawX = cx + wiggle;
    const drawY = topY + bob + lift;

    if (charReady && w.sprite != null) {
      ctx.save();
      ctx.imageSmoothingEnabled = false;
      // translate to sprite center, flip horizontally by facing, draw centered
      ctx.translate(drawX, drawY + TILE/2);
      ctx.scale(w.facing, 1);
      const { sx, sy } = srcXY(w.sprite);
      ctx.drawImage(charSheet, sx, sy, SRC, SRC, -TILE/2, -TILE/2, TILE, TILE);
      ctx.restore();
    } else {
      // primitive fallback (also gets bob/lift/wiggle so motion is visible pre-sprite)
      const px = drawX, py = drawY + TILE/2;
      ctx.fillStyle = "#e8ddc8";
      ctx.beginPath(); ctx.arc(px, py-4, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#6fae5f";
      ctx.fillRect(px-5, py, 10, 12);
    }

    // carry indicator (drawn over the sprite so state is always readable)
    if (w.carry) {
      ctx.fillStyle = w.carry === "wood" ? "#b5763a" : "#8a94a0";
      ctx.fillRect(drawX-4, drawY + 2, 8, 6);
    }
  }

  // ---- HUD / win --------------------------------------------------------
  function updateHUD() { /* HUD is drawn each frame from res.* — nothing to push */ }
  function starsFor(sec) { return sec <= GOLD_SEC ? 3 : sec <= SILVER_SEC ? 2 : 1; }
  // Star tier colors by POSITION: 1st bronze, 2nd silver, 3rd gold. Used wherever
  // earned stars are shown so the tiers read consistently.
  const STAR_COLORS = ["#c77b3c", "#c8d2dc", "#ffcf3f"];   // bronze, silver, gold
  const EMPTY_STAR = "#4a5866";

  // ---- Tower objective gate --------------------------------------------
  // A level may require objectives (houses built, all walls cleared) BEFORE the
  // tower will accept workers. Defined per-level in LEVELS[].objectives; a level
  // with no objectives (like L1) is ungated. Returns { ok, why } where `why` is
  // a player-facing message naming what's still missing.
  function wallsRemaining() {
    let n = 0;
    for (const [, nd] of nodes) if (nd.type === RUBBLE) n++;
    return n;
  }
  function towerGate() {
    const obj = LEVELS[currentLevel].objectives;
    if (!obj) return { ok: true };
    if (obj.houses && houses.length < obj.houses) {
      const need = obj.houses - houses.length;
      return { ok: false, why: `Build ${need} more house${need>1?"s":""} first (${houses.length}/${obj.houses}).` };
    }
    if (obj.clearWalls && wallsRemaining() > 0) {
      return { ok: false, why: `Clear the wall first — ${wallsRemaining()} section${wallsRemaining()>1?"s":""} left.` };
    }
    return { ok: true };
  }

  function win(now) {
    done = true;
    const sec = Math.floor(simNow / 1000);   // pure sim time — device-independent
    winStars = starsFor(sec);
    winTimeStr = `Finished in ${fmt(sec)}  ·  Gold ≤ ${fmt(GOLD_SEC)}, Silver ≤ ${fmt(SILVER_SEC)}`;
    setMsg("Watchtower complete. Outpost secured.");
    recordStars(currentLevel, winStars);   // persist best-ever; unlocks next level
    screen = "levelComplete";
  }

  // ---- helpers ----------------------------------------------------------
  const lerp = (a,b,t) => a + (b-a)*t;
  const fmt = (s) => Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
  function setMsg(m){ flashMsg(m); }

    if (b.stone) parts.push(`${b.stone}s`);

  // ---- Level select -----------------------------------------------------
  // A 5x2 grid with room for 10 levels. Completed levels show earned stars lit;
  // locked levels are greyed. Only unlocked levels are clickable.
  const SELECT_SLOTS = 10;
  function drawLevelSelect() {
    const W = canvas.width;
    drawMenuBackdrop();
    ctx.textAlign = "center";

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 34px 'Trebuchet MS', sans-serif";
    ctx.fillText("SELECT LEVEL", W/2, 70);

    selectCells = [];
    const cols = 5, rows = 2, cellW = 120, cellH = 120, gapX = 20, gapY = 28;
    const gridW = cols*cellW + (cols-1)*gapX;
    const gridX = (W - gridW)/2, gridY = 110;

    for (let i = 0; i < SELECT_SLOTS; i++) {
      const c = i % cols, r = Math.floor(i / cols);
      const x = gridX + c*(cellW+gapX), y = gridY + r*(cellH+gapY);
      const exists = i < LEVELS.length;
      const unlocked = exists && isUnlocked(i);
      const completed = exists && isCompleted(i);
      const stars = starsForLevel(i);
      const hover = unlocked && pointInRect(mouse.x, mouse.y, x, y, cellW, cellH);

      // cell background: bright if unlocked, subdued if locked/absent
      let fill;
      if (!exists)          fill = "#232f3a";
      else if (!unlocked)   fill = "#2a3846";
      else if (completed)   fill = hover ? "#3f6a48" : "#35563d";
      else                  fill = hover ? "#4a6076" : "#3c5064";
      panel(x, y, cellW, cellH, 12, fill, { stroke: unlocked ? "rgba(255,255,255,.2)" : "rgba(255,255,255,.06)", strokeW: 2 });

      // number
      ctx.textBaseline = "middle";
      ctx.fillStyle = exists ? (unlocked ? "#ffffff" : "#5f7085") : "#3a4a58";
      ctx.font = "bold 40px 'Trebuchet MS', sans-serif";
      ctx.fillText(String(i+1), x+cellW/2, y+cellH/2 - 8);

      // stars row (only for existing levels): three slots, earned ones gold
      if (exists) {
        ctx.font = "18px sans-serif";
        const glyphW = 18, totalW = glyphW*3, startX = x+cellW/2 - totalW/2 + glyphW/2;
        for (let s = 0; s < 3; s++) {
          ctx.fillStyle = s < stars ? STAR_COLORS[s] : EMPTY_STAR;
          ctx.fillText(s < stars ? "★" : "☆", startX + s*glyphW, y+cellH - 26);
        }
      }

      // lock glyph for locked existing levels
      if (exists && !unlocked) {
        ctx.font = "16px sans-serif"; ctx.fillStyle = "#5f7085";
        ctx.fillText("\uD83D\uDD12", x+cellW-18, y+18);
      }

      selectCells.push({ i, x, y, w: cellW, h: cellH, clickable: unlocked });
    }
    ctx.textBaseline = "alphabetic";

    // Bottom row: Main Menu + Clear Progress, side by side.
    const bW = 160, bH = 40, gap = 16;
    const rowY = gridY + rows*(cellH+gapY) + 6;
    const bX = (W - (bW*2 + gap))/2;
    const bHover = pointInRect(mouse.x, mouse.y, bX, rowY, bW, bH);
    panel(bX, rowY, bW, bH, 10, bHover ? "#4a6076" : "#3c5064", { stroke:"rgba(255,255,255,.18)", strokeW:2 });
    ctx.fillStyle = "#dceaf5"; ctx.textBaseline = "middle";
    ctx.font = "bold 15px 'Trebuchet MS', sans-serif";
    ctx.fillText("‹  Main Menu", bX+bW/2, rowY+bH/2);
    selectBackBtn = { x: bX, y: rowY, w: bW, h: bH };

    // Clear Progress — destructive (red), wipes all stars/unlocks. Also handy
    // for testing. Two-click confirm so it isn't fired by accident.
    const cX = bX + bW + gap;
    const cHover = pointInRect(mouse.x, mouse.y, cX, rowY, bW, bH);
    panel(cX, rowY, bW, bH, 10, cHover ? "#6a3a3a" : "#553030", { stroke:"rgba(255,255,255,.15)", strokeW:2 });
    ctx.fillStyle = clearArmed ? "#ffd0d0" : "#e8c4c4";
    ctx.fillText(clearArmed ? "Tap again to confirm" : "Clear Progress", cX+bW/2, rowY+bH/2);
    clearProgressBtn = { x: cX, y: rowY, w: bW, h: bH };
    ctx.textBaseline = "alphabetic";
  }

  // simple canvas word-wrap, centered
  function wrapText(text, cx, y, maxWidth, lineHeight) {
    const words = text.split(" ");
    let line = "", ly = y;
    for (const word of words) {
      const test = line ? line + " " + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, cx, ly);
        line = word; ly += lineHeight;
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, cx, ly);
  }

  // Like wrapText, but RETURNS the array of lines instead of drawing — used to
  // size a box before rendering (caller must set ctx.font first for measuring).
  function wrapLines(text, maxWidth) {
    const words = text.split(" ");
    const lines = [];
    let line = "";
    for (const word of words) {
      const test = line ? line + " " + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line); line = word;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  function start() {
    done = false;
    resetState();
    screen = "play";              // Restart/Play Again skip the title
    startTime = performance.now();
    if (!raf) raf = requestAnimationFrame(update);
  }

  // Enter a level from the menu/select: show its intro screen first, then play.
  function gotoLevel(idx) {
    if (!isUnlocked(idx)) return;
    currentLevel = idx;
    resetState(idx);
    screen = "levelIntro";
    if (!raf) raf = requestAnimationFrame(update);
  }
  // From the intro screen, actually begin play.
  function beginPlay() {
    screen = "play";
    startTime = performance.now();
  }
  // True if there's a next level after the current one that exists in LEVELS.
  function hasNextLevel() { return currentLevel + 1 < LEVELS.length; }

  // Which level the main-menu Play button targets: the furthest unlocked level
  // the player hasn't cleared yet (else the last unlocked). Shared by the button
  // LABEL and the CLICK so they can never name one level and load another.
  function nextPlayLevel() {
    let target = 0;
    for (let i = 0; i < LEVELS.length; i++) {
      if (isUnlocked(i)) target = i;
      if (!isCompleted(i)) break;
    }
    return target;
  }

  // First-ever load: main menu. Progress is restored from localStorage.
  function boot() {
    loadProgress();
    resetState(0);
    screen = "mainMenu";
    if (!raf) raf = requestAnimationFrame(update);
  }

  boot();
})();
</script>
