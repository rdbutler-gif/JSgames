<script>
// ===================================================================
//  Grassland Run — engine that consumes the Level Builder format.
//  A level object: { cols, rows, spawn, goal, terrain[], items[],
//  enemies[], hazards[], deco[], theme, gravity }.
// ===================================================================
const TS = 64;                          // world tile size (px)
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const VW = cv.width, VH = cv.height;
let skyGrad=null;   // cached sky gradient (rebuilt lazily; VW/VH are fixed)

// ---- assets ----
const imgs={}, snds={};
let muted=false, booted=false;
function loadAll(){
  const ps=Object.keys(ASSETS.img).map(k=>new Promise(r=>{
    const i=new Image(); i.onload=()=>r(); i.onerror=()=>{console.error('img',k);r();};
    i.src="data:image/png;base64,"+ASSETS.img[k]; imgs[k]=i;
  }));
  for(const k in ASSETS.snd) snds[k]="data:audio/ogg;base64,"+ASSETS.snd[k];
  return Promise.all(ps);
}
// ---- audio ----
// iOS Safari is slow to spin up media elements and re-decodes on every
// `new Audio(dataURI)`. So we decode each clip ONCE into a small pool of
// reusable <audio> elements and just rewind+play a free one — no per-SFX
// allocation, no GC churn, no repeated decode. This is the main fix for
// audio/graphics drift on older iPads.
const SND_POOL=3;                 // simultaneous voices per clip
const sndPool={};                 // k -> [HTMLAudioElement]
const sndTurn={};                 // k -> round-robin index
function primeAudio(k){
  const pool=[];
  for(let i=0;i<SND_POOL;i++){
    const a=new Audio(snds[k]); a.volume=.5; a.preload='auto';
    pool.push(a);
  }
  sndPool[k]=pool; sndTurn[k]=0;
}
function play(k){
  if(muted||!snds[k])return;
  let pool=sndPool[k];
  if(!pool){ primeAudio(k); pool=sndPool[k]; }
  // pick the next voice round-robin; rewind and fire it
  const a=pool[sndTurn[k]];
  sndTurn[k]=(sndTurn[k]+1)%pool.length;
  try{ a.currentTime=0; }catch(e){}
  a.play().catch(()=>{});
}

// ---- frame lookups ----
function terFrame(name){ return FRAMES.terrain[name] || FRAMES.terrain['terrain_grass_block_center']; }
function itemFrame(name){ return FRAMES.items[name]; }
// enemy kind -> {sheet frames for animation, behavior}
const ENEMY_DEF = {
  fly:          {frames:['fly_a','fly_b'], fps:8, stompable:true, move:'fly'},
  bee:          {frames:['bee_a','bee_rest'], fps:8, stompable:true, move:'fly'},
  slime_normal: {frames:['slime_normal_walk_a','slime_normal_rest'], fps:6, stompable:true, move:'patrol'},
  slime_spike:  {frames:['slime_spike_walk_a','slime_spike_rest'], fps:6, stompable:false, move:'patrol'},
  frog:         {frames:['frog_idle','frog_jump'], fps:4, stompable:true, move:'hop'},
  saw:          {frames:['saw_a','saw_b'], fps:10, stompable:false, move:'spin'},
  snail:        {frames:['snail_walk_a','snail_rest'], fps:4, stompable:true, move:'patrol'},
  ladybug:      {frames:['ladybug_walk_a','ladybug_rest'], fps:6, stompable:true, move:'patrol'},
  mouse:        {frames:['mouse_walk_a','mouse_rest'], fps:8, stompable:true, move:'patrol'},
};
function enemyFrame(kind, idx){
  const d=ENEMY_DEF[kind]||ENEMY_DEF.slime_normal;
  const nm=d.frames[idx % d.frames.length];
  return FRAMES.enemies[nm] || FRAMES.enemies['slime_normal_rest'];
}

// ---- gravity presets ----
const GRAV_PRESET = { normal:{g:0.7,jump:-13.2}, floaty:{g:0.42,jump:-11.5}, heavy:{g:0.95,jump:-15} };

// ===================================================================
//  Level state
// ===================================================================
let levelIndex=0, L=null;
let solids=[];            // {x,y,w,h} in world px, built from terrain grid
let solidSet=null;        // Set "gx,gy" for fast neighbor lookup
let items=[], enemies=[], hazards=[], deco=[];
let movers=[];            // moving platforms (ferries) lifted out of odd-theme terrain
let ladderSet=null, ladderTopSet=null;   // climbable cells + top rungs (one-way platforms)
let levelTips=[], activeTip=null, activeTipT=0;   // tutorial popups (Level 1)
let goalRect=null, spawnPx={x:0,y:0};
let player, cam, keys={}, anim=0;
let coinsGot=0, coinsTotal=0, lives=3, state='ready', invuln=0;

// ---- scoring (arcade) ----
const SCORE = { coin:100, gem:500, stomp:200, timePerSec:10, allCoins:2000, noDamage:3000 };
const STAR_THRESH = [0, 0.45, 0.75];   // fraction of a level's "par" score for 1/2/3 stars
let score=0;                 // running score this run
let combo=0;                 // stomp chain since last ground touch
let comboTimer=0;            // frames left to show the combo popup
let tookDamage=false;        // for the no-damage bonus
let levelTime=0, timeLeft=0; // countdown (seconds) for time bonus
let scorePops=[];            // floating "+N" popups {x,y,text,t,color}
let runSummary=null;         // filled at level end: {base,time,allCoins,noDmg,total,stars,best,isNewBest}

// ---- persistence (best score + stars per level). Degrades to session-only
//      if localStorage is unavailable (sandboxed preview, some file:// setups). ----
const SAVE_KEY='grasslandRun.progress.v1';
let progress={};             // { [levelName]: {best, stars} }
let storageOK=true;
function loadProgress(){
  try{ const raw=localStorage.getItem(SAVE_KEY); progress = raw?JSON.parse(raw):{}; }
  catch(e){ storageOK=false; progress={}; }
}
function saveProgress(){
  if(!storageOK) return;
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); }
  catch(e){ storageOK=false; }
}
function levelKey(i){ return (LEVELS[i] && LEVELS[i].name) ? LEVELS[i].name+'#'+i : 'level#'+i; }
function bestFor(i){ return progress[levelKey(i)] || {best:0, stars:0}; }

// award points and spawn a floating "+N" popup at a world position
function addScore(pts, wx, wy, color, tag){
  score += pts;
  scorePops.push({ x:wx+TS/2, y:wy, t:0, text:(tag?tag+'  ':'')+'+'+pts, color:color||'#ffe9b0' });
}

// A rough "par" score for a level: everything collectible + all enemies + a
// healthy time bonus. Used only to place the 1/2/3-star thresholds.
function parScore(i){
  const lv=LEVELS[i]; if(!lv) return 1;
  let p=0;
  (lv.items||[]).forEach(([x,y,k])=> p += k.startsWith('gem')?SCORE.gem:(k==='block_coin'?SCORE.coin:SCORE.coin));
  (lv.enemies||[]).forEach(()=> p += SCORE.stomp);
  p += SCORE.allCoins + SCORE.noDamage;
  const cols=lv.cols||40; p += Math.max(30,Math.round(cols*1.4))*SCORE.timePerSec*0.6;
  return Math.max(1,p);
}

// Tally bonuses, compute stars, persist the best, and enter the win screen.
function finishLevel(){
  const base=score;
  const timeBonus = Math.round(timeLeft)*SCORE.timePerSec;
  const allCoins  = (coinsTotal>0 && coinsGot>=coinsTotal) ? SCORE.allCoins : 0;
  const noDmg     = !tookDamage ? SCORE.noDamage : 0;
  const total = base + timeBonus + allCoins + noDmg;
  score = total;

  const par=parScore(levelIndex);
  let stars=1;
  if(total >= par*STAR_THRESH[2]) stars=3;
  else if(total >= par*STAR_THRESH[1]) stars=2;

  const prev=bestFor(levelIndex);
  const isNewBest = total>prev.best;
  const newBest = Math.max(prev.best, total);
  const newStars = Math.max(prev.stars, stars);
  progress[levelKey(levelIndex)] = { best:newBest, stars:newStars };
  saveProgress();

  runSummary = { base, time:timeBonus, allCoins, noDmg, total, stars,
                 best:newBest, isNewBest, coinsGot, coinsTotal };
  state='won'; menuSel=0; play('select');
}
let gravG=0.7, jumpV=-13.2;

// ---- screen state machine (canvas-drawn menus, OUTPOST-style) ----
// 'title' | 'levelSelect' | 'play'   — 'play' defers to `state` for win/lose.
let screen='title';
let paused=false;            // in-play pause overlay (freezes sim, world stays visible)
let menuBtns={};            // named button rects for hit-testing on the current screen
let resetArmed=false;       // level-select: first tap arms, second tap confirms the score wipe
let resetToast='';          // transient confirmation message after a reset
let titleHoverPrev=-1;      // last title button the mouse was over (-1 = none), for hover SFX
let selectCells=[];         // level-select grid cells
let exportMode=false;       // level-select back-door: X then P arms clipboard-export on click
let exportKeyX=false;       // tracks the X in the X->P combo
let exportToast='';         // brief on-screen confirmation after a copy
let mmx=-1, mmy=-1;         // mouse pos in canvas space, for hover
let menuSel=0;              // keyboard/gamepad menu cursor
let padMenuPrev={up:false,down:false,left:false,right:false,a:false};

// ---- canvas button/panel helpers ----
function roundRect(c,x,y,w,h,r){ r=Math.min(r,w/2,h/2);
  c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
function pointIn(px,py,r){ return px>=r.x&&py>=r.y&&px<=r.x+r.w&&py<=r.y+r.h; }
function panel(x,y,w,h,rad,fill,opts={}){
  ctx.save();
  ctx.shadowColor=opts.shadowColor??'rgba(0,0,0,.45)'; ctx.shadowBlur=opts.shadowBlur??8; ctx.shadowOffsetY=opts.shadowColor?0:3;
  roundRect(ctx,x,y,w,h,rad); ctx.fillStyle=fill; ctx.fill(); ctx.restore();
  ctx.save(); roundRect(ctx,x+1.5,y+1.5,w-3,h-3,rad-1); ctx.clip();
  const g=ctx.createLinearGradient(0,y,0,y+h*0.5);
  g.addColorStop(0,'rgba(255,255,255,.16)'); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h*0.5); ctx.restore();
  if(opts.stroke){ roundRect(ctx,x+.5,y+.5,w-1,h-1,rad); ctx.strokeStyle=opts.stroke;
    ctx.lineWidth=opts.strokeW??2; ctx.stroke(); }
}

// Build a ferry from a run of odd-theme tiles. Travels horizontally, ping-pong,
// across the wider open span beside it (the valley). Distance/dir derived from
// where the surrounding solid terrain is; falls back to a sensible default.
function makeMover(run, x0, ty, wTiles){
  const px=x0*TS, py=ty*TS, pw=wTiles*TS;
  // decide travel: scan for how much open air is to the left vs right at this row
  const rowSolidX = new Set((L.terrain||[])
    .filter(([x,y,n])=> y===ty && (n.match(/terrain_([a-z]+)_/)||[])[1]===(L.theme||'grass'))
    .map(([x])=>x));
  let openR=0; for(let x=x0+wTiles; x<L.cols; x++){ if(rowSolidX.has(x))break; openR++; }
  let openL=0; for(let x=x0-1; x>=0; x--){ if(rowSolidX.has(x))break; openL++; }
  // travel toward the wider side; span capped so it doesn't run off the map
  const goRight = openR>=openL;
  const spanTiles = Math.min(12, Math.max(3, (goRight?openR:openL)-1));
  const range = spanTiles*TS;
  return {
    x:px, y:py, w:pw, h:TS, name:run[0].name,   // draw with the odd-theme sprite
    tiles: run.map(r=>r.name),                    // per-tile sprite names for the run
    x0:px, dir: goRight?1:-1, range, speed:0.9,   // px/frame — slow ferry
    px_prev:px,                                    // last frame x, to carry the rider
  };
}

function buildLevel(i){
  L = LEVELS[i]; levelIndex=i;
  const cols=L.cols, rows=L.rows;
  solids=[]; items=[]; enemies=[]; hazards=[]; deco=[];
  solidSet=new Set();
  coinsGot=0; coinsTotal=0; lives=3; invuln=0;
  score=0; combo=0; comboTimer=0; tookDamage=false; scorePops=[]; runSummary=null;
  paused=false;
  // tutorial tips: copy from the level (if any), track fired state + active tip
  levelTips = (L.tips||[]).map(([x,text,dur])=>({x, text, dur:(dur||4)*60, fired:false}));
  activeTip = null; activeTipT = 0;

  // terrain -> solid rects. But first, detect "moving platforms": contiguous
  // horizontal runs of tiles whose THEME differs from the level's theme (e.g.
  // dirt tiles painted into a sand level). Those become ferries instead of
  // static ground — a reusable builder convention, not a Level-3 special case.
  movers=[];
  const levelTheme = L.theme || 'grass';
  const terr = (L.terrain||[]).map(([x,y,name])=>({x,y,name,
    theme:(name.match(/terrain_([a-z]+)_/)||[])[1] || levelTheme}));
  const oddTiles = terr.filter(t=>t.theme!==levelTheme);
  const normalTiles = terr.filter(t=>t.theme===levelTheme);
  // group odd tiles into contiguous horizontal runs on the same row
  const used=new Set();
  oddTiles.sort((a,b)=> a.y-b.y || a.x-b.x);
  for(const t of oddTiles){
    const key=t.x+','+t.y; if(used.has(key)) continue;
    // extend right along the same row while tiles are present & odd
    const run=[t]; used.add(key);
    let nx=t.x+1;
    while(true){
      const nk=nx+','+t.y;
      const nt=oddTiles.find(o=>o.x===nx && o.y===t.y);
      if(nt && !used.has(nk)){ run.push(nt); used.add(nk); nx++; }
      else break;
    }
    // build a ferry from this run
    const x0=Math.min(...run.map(r=>r.x)), wTiles=run.length;
    const mv=makeMover(run, x0, t.y, wTiles);
    movers.push(mv);
  }

  // static terrain (everything that isn't a mover)
  (normalTiles).forEach(t=>{
    solids.push({x:t.x*TS, y:t.y*TS, w:TS, h:TS, name:t.name});
    solidSet.add(t.x+','+t.y);
  });
  // items
  (L.items||[]).forEach(([x,y,kind])=>{
    const isBlock = kind==='block_coin'||kind==='block_empty';
    items.push({x:x*TS, y:y*TS, gx:x, gy:y, kind, got:false, block:isBlock, used:false});
    // Coin tally: every regular coin, plus each FULL ?-block (block_coin gives a
    // coin when punched). block_empty holds nothing, so it doesn't count. Gems are
    // scored but tracked separately, not part of the coin count.
    if(kind==='coin_gold' || kind==='block_coin') coinsTotal++;
  });
  // enemies
  (L.enemies||[]).forEach(([x,y,kind])=>{
    const d=ENEMY_DEF[kind]||ENEMY_DEF.slime_normal;
    enemies.push({x:x*TS+6, y:y*TS+6, w:TS-12, h:TS-12, kind, def:d,
      vx:1.0, dir:(Math.random()<0.5?-1:1), alive:true, t:Math.random()*100, turnCd:0,
      homeY:y*TS+6, hopT:0, spin:0});
  });
  // hazards (spikes/lava/water) — smaller hitbox so grazing the edge is fair
  (L.hazards||[]).forEach(([x,y,kind])=>{
    hazards.push({x:x*TS, y:y*TS, w:TS, h:TS, kind});
  });
  // deco (non-solid art). Ladder tiles (kind matching ladder_*) are ALSO
  // registered as a functional climb layer: ladderSet holds every ladder cell,
  // ladderTopSet holds just the top rungs (which double as one-way platforms).
  ladderSet=new Set(); ladderTopSet=new Set();
  (L.deco||[]).forEach(([x,y,kind])=>{
    deco.push({x:x*TS, y:y*TS, kind});
    if(/^ladder_/.test(kind)){
      ladderSet.add(x+','+y);
      if(kind==='ladder_top') ladderTopSet.add(x+','+y);
    }
  });

  // spawn + goal
  spawnPx={x:(L.spawn?.x??2)*TS, y:(L.spawn?.y??2)*TS};
  goalRect={x:(L.goal?.x??cols-2)*TS, y:(L.goal?.y??2)*TS, w:TS, h:TS};

  // gravity tuning
  const gp=GRAV_PRESET[L.gravity]||GRAV_PRESET.normal; gravG=gp.g; jumpV=gp.jump;

  player={x:spawnPx.x, y:spawnPx.y, w:44, h:60, vx:0, vy:0, onGround:false, jumps:0, face:1, hurt:0, climbing:false};
  cam={x:0,y:0};
  worldW=cols*TS; worldH=rows*TS;
  // time par scales with level width: ~1.4s per column, min 30s. Countdown feeds the time bonus.
  levelTime = Math.max(30, Math.round(cols*1.4));
  timeLeft = levelTime;
  state='play';
}
let worldW=0, worldH=0;

// ===================================================================
//  Physics
// ===================================================================
function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// Per-FRAME work (input polling, menu nav): runs once per rendered frame,
// independent of how many physics steps happen. Keeps gamepad/menu responsive
// on high-refresh displays where a frame may contain zero physics steps.
function perFrame(){
  pollGamepad();
  if(mouse.hold) updateMouseDir();
}
// Fixed-STEP physics sim: runs at a locked 60/sec via the accumulator loop.
function update(){
  anim++;
  if(screen!=='play') return;    // menus don't run the sim
  if(paused) return;             // paused: sim frozen, pause overlay drawn in draw()
  if(state==='dying'){ updateDeath(); return; }   // play the death arc, then -> 'lost'
  if(state!=='play') return;
  const p=player;
  const ACC=0.9, MAX=6, FRIC=0.78;

  // ---- move platforms first; remember each one's delta so we can carry riders ----
  for(const mv of movers){
    mv.px_prev = mv.x;
    mv.x += mv.speed*mv.dir;
    if(mv.x > mv.x0 + mv.range){ mv.x = mv.x0 + mv.range; mv.dir = -1; }
    if(mv.x < mv.x0){ mv.x = mv.x0; mv.dir = 1; }
    mv.dx = mv.x - mv.px_prev;
  }
  // carry the player if they were riding a platform last frame
  if(p.rideMover){
    const mv = p.rideMover;
    if(movers.includes(mv)) p.x += mv.dx;   // move with the platform
  }
  p.rideMover = null;   // re-established below if still standing on one

  // Movement intent: -1 left, +1 right, 0 none — merged from all input sources.
  let dir=0;
  if(keys['ArrowLeft'])  dir-=1;
  if(keys['ArrowRight']) dir+=1;
  if(mouse.hold)         dir+=mouse.dir;      // right-click held: steer toward cursor
  if(pad.axis!==0)       dir+=pad.axis;       // left stick
  if(touch.moveDir!==0)  dir+=touch.moveDir;  // touch drag on the left half
  dir=Math.max(-1,Math.min(1,dir));

  // ---- LADDER / CLIMB ----------------------------------------------------
  // Vertical intent: -1 up, +1 down. Keyboard arrows + gamepad vertical axis.
  let vint=0;
  if(keys['ArrowUp'])   vint-=1;
  if(keys['ArrowDown']) vint+=1;
  if(pad.vaxis!==0)     vint+=pad.vaxis;
  if(touch.moveVdir!==0) vint+=touch.moveVdir;   // touch drag up/down on the left half
  vint=Math.max(-1,Math.min(1,vint));

  // Which grid cells does the player currently overlap? Use the horizontal
  // centre column, and every row the body spans (so a tall player still
  // registers a ladder). onLadder = any overlapped cell is a ladder tile.
  const CLIMB=3.2;
  const cx = Math.floor((p.x + p.w/2)/TS);
  const r0 = Math.floor(p.y/TS), r1 = Math.floor((p.y+p.h-1)/TS);
  let onLadder=false, onLadderTop=false;
  for(let ry=r0; ry<=r1; ry++){
    if(ladderSet.has(cx+','+ry)) onLadder=true;
    if(ladderTopSet.has(cx+','+ry)) onLadderTop=true;
  }
  // top rung the player's feet are near (for dismount / standing)
  const footRow = Math.floor((p.y+p.h)/TS);
  const feetOnTopRung = ladderTopSet.has(cx+','+footRow);

  // Enter climb mode: on a ladder AND pressing up/down. Jump or left/right
  // (with no vertical intent) drops out of climbing.
  if(!p.climbing){
    if(onLadder && vint!==0) p.climbing=true;
  } else {
    // leaving the ladder region ends the climb
    if(!onLadder && !feetOnTopRung) p.climbing=false;
  }

  if(p.climbing){
    // Gravity off. Vertical movement is direct at climb speed.
    p.vy = vint*CLIMB;
    // Don't climb up past the top rung into empty air: if pressing up and the
    // cell above the head isn't a ladder, clamp so feet rest on the top rung.
    // Horizontal is allowed but slowed so you can line up / step off sideways.
    if(dir<0){ p.vx-=ACC*0.5; p.face=-1; }
    else if(dir>0){ p.vx+=ACC*0.5; p.face=1; }
    else p.vx*=0.6;
    p.vx=Math.max(-MAX*0.6,Math.min(MAX*0.6,p.vx));
    p.jumps=0;   // stepping off a ladder gives a fresh jump
  } else {
    if(dir<0){ p.vx-=ACC; p.face=-1; }
    else if(dir>0){ p.vx+=ACC; p.face=1; }
    else p.vx*=FRIC;
    p.vx=Math.max(-MAX,Math.min(MAX,p.vx));
    p.vy+=gravG; if(p.vy>16)p.vy=16;
  }

  // horizontal
  p.x+=p.vx;
  for(const s of solids){ if(aabb(p,s)){ if(p.vx>0)p.x=s.x-p.w; else if(p.vx<0)p.x=s.x+s.w; p.vx=0; } }
  for(const mv of movers){ if(aabb(p,mv)){ if(p.vx>0)p.x=mv.x-p.w; else if(p.vx<0)p.x=mv.x+mv.w; p.vx=0; } }
  // vertical
  const wasGround=p.onGround; p.onGround=false; p.y+=p.vy;
  for(const s of solids){ if(aabb(p,s)){
    if(p.vy>0){ p.y=s.y-p.h; p.vy=0; p.onGround=true; p.jumps=0; combo=0; }  // landing ends a stomp chain
    else if(p.vy<0){ p.y=s.y+s.h; p.vy=0; bumpBlock(s); }
  }}
  // moving platforms: same landing rules, plus mark the one we're riding
  for(const mv of movers){ if(aabb(p,mv)){
    if(p.vy>0){ p.y=mv.y-p.h; p.vy=0; p.onGround=true; p.jumps=0; combo=0; p.rideMover=mv; }
    else if(p.vy<0){ p.y=mv.y+mv.h; p.vy=0; }
  }}
  // ladder_top acts as a one-way platform: when NOT climbing and descending
  // (or falling), if the feet cross a top rung from above, land on it. This is
  // what lets you climb up a ladder and stand on the platform at the top, and
  // walk over the top of a ladder without falling in unless you press down.
  if(!p.climbing && p.vy>=0){
    const topRow = footRow;
    if(ladderTopSet.has(cx+','+topRow)){
      const rungY = topRow*TS;
      // only catch if feet were at/above the rung this frame (one-way)
      if(p.y+p.h > rungY && p.y+p.h - p.vy <= rungY+2 && vint>=0 && !keys['ArrowDown'] && pad.vaxis<=0){
        p.y = rungY - p.h; p.vy=0; p.onGround=true; p.jumps=0; combo=0;
      }
    }
  }
  if(wasGround && !p.onGround && p.jumps===0) p.jumps=1;
  if(p.x<0)p.x=0; if(p.x+p.w>worldW)p.x=worldW-p.w;
  if(p.y>worldH+160) return hurt(true);
  if(p.hurt>0)p.hurt--; if(invuln>0)invuln--;
  // countdown timer (60fps -> seconds); floors at 0
  if(timeLeft>0){ timeLeft=Math.max(0, timeLeft - 1/60); }
  // tutorial tips: fire when the player reaches a trigger x (once each)
  for(const tip of levelTips){
    if(!tip.fired && p.x >= tip.x*TS){ tip.fired=true; activeTip=tip; activeTipT=tip.dur; }
  }
  if(activeTipT>0){ activeTipT--; if(activeTipT===0) activeTip=null; }
  // age score popups
  for(const sp of scorePops) sp.t++;
  scorePops=scorePops.filter(sp=>sp.t<50);
  if(comboTimer>0)comboTimer--;

  // ?-block head-bump (item blocks)
  for(const it of items){ if(it.block && !it.used && p.vy<0){
    const br={x:it.x,y:it.y,w:TS,h:TS};
    if(aabb(p,br)){ it.used=true; p.vy=1;
      if(it.kind==='block_coin'){ play('coin'); coinsGot++; addScore(SCORE.coin, it.x, it.y); }
      else play('bump');   // empty block: just a bump, no coin
    }
  }}
  // collectibles
  for(const it of items){ if(it.block||it.got)continue;
    const ir={x:it.x+8,y:it.y+8,w:TS-16,h:TS-16};
    if(aabb(p,ir)){ it.got=true;
      const gem=it.kind.startsWith('gem');
      if(!gem) coinsGot++;                 // gems score but aren't part of the coin tally
      play(gem?'gem':'coin');
      addScore(gem?SCORE.gem:SCORE.coin, it.x, it.y, gem?'#8fd3ff':'#ffd34d'); }
  }
  // enemies
  for(const e of enemies){ if(!e.alive)continue; stepEnemy(e);
    if(aabb(p,e)){
      const stomp = p.vy>0 && (p.y+p.h - e.y) < 30;
      if(stomp && e.def.stompable){
        e.alive=false; p.vy=-9; p.jumps=1; play('disappear');
        combo++;                                   // chain grows per airborne stomp
        const pts = SCORE.stomp*combo;             // 200, 400, 600, …
        addScore(pts, e.x, e.y-10, '#ff9de0', combo>1?('x'+combo):null);
      }
      else hurt();
    }
  }
  // hazards
  for(const h of hazards){ const hr={x:h.x+10,y:h.y+18,w:TS-20,h:TS-24};
    if(aabb(p,hr)) hurt(); }
  // goal
  if(goalRect && aabb(p,goalRect)){ finishLevel(); }

  // camera
  cam.x=Math.max(0,Math.min(Math.max(0,worldW-VW), p.x+p.w/2-VW/2));
  cam.y=Math.max(0,Math.min(Math.max(0,worldH-VH), p.y+p.h/2-VH/2));
}

function bumpBlock(s){ play('bump'); }

function stepEnemy(e){
  e.t++;
  const m=e.def.move;
  if(m==='patrol'){
    e.x+=e.vx*e.dir;
    if(e.turnCd>0) e.turnCd--;
    // Look one step ahead in the direction of travel. Probe ground a full tile
    // below the enemy's midline so it reliably detects the platform it's standing
    // on (the sprite sits a few px above the tile, so a shallow probe misses it
    // and causes the spin-in-place jitter). A short cooldown after any turn stops
    // ping-ponging on narrow ledges.
    const aheadX = e.dir>0 ? e.x+e.w+2 : e.x-2;
    const gx=Math.floor(aheadX/TS);
    const midY=Math.floor((e.y+e.h/2)/TS);
    const belowY=Math.floor((e.y+e.h+TS*0.5)/TS);   // deep probe = tile under the feet
    const wallAhead = solidSet.has(gx+','+midY);
    const groundAhead = solidSet.has(gx+','+belowY);
    if(e.turnCd===0 && (wallAhead || !groundAhead)){ e.dir*=-1; e.turnCd=10; }
    if((e.x<0 || e.x+e.w>worldW) && e.turnCd===0){ e.dir*=-1; e.turnCd=10; }
  } else if(m==='fly'){
    e.x+=e.vx*e.dir*0.8;
    e.y=e.homeY + Math.sin(e.t*0.05)*22;
    // patrol a horizontal band; bounce off walls
    const gx=Math.floor((e.dir>0?e.x+e.w+2:e.x-2)/TS), midY=Math.floor((e.y+e.h/2)/TS);
    if(solidSet.has(gx+','+midY) || e.x<0 || e.x+e.w>worldW) e.dir*=-1;
  } else if(m==='hop'){
    if(e.onGround===undefined) e.onGround=true;
    e.hopT++;
    if(e.onGround && e.hopT>60){ e.vy=-9; e.onGround=false; e.hopT=0; e.dir = Math.random()<.5?-1:1; }
    e.vy=(e.vy||0)+gravG*0.8; e.y+=e.vy; e.x+=e.dir*1.4;
    // land on any solid top
    for(const s of solids){ if(aabb({x:e.x,y:e.y,w:e.w,h:e.h},s) && e.vy>0){
      e.y=s.y-e.h; e.vy=0; e.onGround=true; break; } }
    if(e.x<0||e.x+e.w>worldW) e.dir*=-1;
  } else if(m==='spin'){
    e.spin+=0.3; // saw sits and spins in place (deadly, not stompable)
  }
}

// Damage. Non-fatal hits: sound, i-frames, a small knockback, but the player
// stays put (no teleport to spawn). A pit fall is special — there's no ground to
// stand on, so it still costs a life and respawns at the last spawn point, unless
// it's the killing blow, which starts the death arc instead.
function hurt(fell){
  const p=player;
  if(state!=='play') return;
  if(invuln>0 && !fell) return;
  lives--; play('hurt'); p.hurt=30; invuln=90; tookDamage=true;
  if(lives<=0){ startDeath(); return; }
  if(fell){
    // fell in a pit but still alive: respawn at spawn point (nowhere else to go)
    p.x=spawnPx.x; p.y=spawnPx.y; p.vx=0; p.vy=0;
  } else {
    // knockback: pop up and away from facing, so a hit reads as a hit
    p.vy=-7; p.vx = -p.face*5;
  }
}

// Death arc: the character freezes in its "hit" pose, launches upward, then
// falls through the floor off the bottom of the screen (classic platformer
// death). When it clears the view, the game-over screen appears.
let death=null;
function startDeath(){
  const p=player;
  state='dying';
  play('death');               // distinct floaty death sting (layers over the hurt sound)
  death={ t:0, vy:-15 };        // strong upward pop
  p.vx=0;
}
function updateDeath(){
  const p=player;
  death.t++;
  death.vy += 0.85;             // gravity on the corpse
  p.y += death.vy;
  p.hurt=1;                     // keep the hit sprite showing
  // once it has fallen well below the view, go to the game-over screen
  if(p.y > worldH + 300 || death.t > 180){ state='lost'; menuSel=0; death=null; }
}

// ===================================================================
//  Rendering
// ===================================================================
function drawBG(){
  const key = {grass:'background_color_hills', dirt:'background_color_hills',
    sand:'background_color_desert', stone:'background_color_mushrooms',
    snow:'background_color_trees'}[L?.theme] || 'background_color_hills';
  const f=FRAMES.bg[key]; if(!f){ return; }
  // The Kenney backgrounds tile seamlessly, so any wrap line is a subpixel
  // sampling gap. Cure: integer tile width, integer draw positions, and draw
  // 1px wider so copies overlap instead of leaving a hairline.
  const scale=VH/256*1.15;
  const tw=Math.ceil(256*scale);
  const dh=Math.ceil(256*scale);
  const dy=Math.round(VH-256*scale*0.92);
  let off=Math.round(-(cam.x*0.3)%tw);
  for(let x=off-tw;x<VW+tw;x+=tw)
    ctx.drawImage(imgs.bg, f[0],f[1],256,256, Math.round(x), dy, tw+1, dh);
}
function blit(sheet,frame,dx,dy,dw,dh,flip){
  if(!frame||!imgs[sheet])return;
  const [sx,sy,sw,sh]=frame;
  if(flip){ctx.save();ctx.translate(dx+dw,dy);ctx.scale(-1,1);
    ctx.drawImage(imgs[sheet],sx,sy,sw,sh,0,0,dw,dh);ctx.restore();}
  else ctx.drawImage(imgs[sheet],sx,sy,sw,sh,dx,dy,dw,dh);
}
// Terrain-only blit: snaps to integer pixels and inflates the destination by
// 1px so abutting tiles overlap instead of leaving a sampler gap. This is the
// standard cure for scrolling-tilemap seams. Also insets the SOURCE rect by a
// hair so we never sample a neighbor frame out of the packed atlas.
function blitTile(frame,dx,dy){
  if(!frame||!imgs.tiles)return;
  const [sx,sy,sw,sh]=frame;
  const x=Math.round(dx), y=Math.round(dy);
  ctx.drawImage(imgs.tiles, sx+0.5, sy+0.5, sw-1, sh-1, x, y, TS+1, TS+1);
}
// ===================================================================
//  Menu screens — drawn entirely on the canvas (OUTPOST idiom)
// ===================================================================
function drawMenuBackdrop(){
  // grassland sky gradient + parallax hills, reused from the play background
  if(!skyGrad){ skyGrad=ctx.createLinearGradient(0,0,0,VH); skyGrad.addColorStop(0,'#8ec9e8'); skyGrad.addColorStop(1,'#cfeeff'); }
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,VW,VH);
  const f=FRAMES.bg['background_color_hills'];
  if(f){ const scale=VH/256*1.15, tw=Math.ceil(256*scale), dy=Math.round(VH-256*scale*0.92);
    const off=Math.round(-(anim*0.4)%tw);
    for(let x=off-tw;x<VW+tw;x+=tw) ctx.drawImage(imgs.bg,f[0],f[1],256,256,Math.round(x),dy,tw+1,Math.ceil(256*scale)); }
  // darkening veil so text/buttons pop
  ctx.fillStyle='rgba(8,20,12,.34)'; ctx.fillRect(0,0,VW,VH);
}

function drawTitle(){
  drawMenuBackdrop();
  ctx.textAlign='center';
  const t=anim/60, pulse=1+0.03*Math.sin(t*1.8);

  // title character sprite bouncing beside the logo
  const bob=Math.sin(t*2)*8;
  const cf=FRAMES.chars['character_green_idle'];
  if(cf) ctx.drawImage(imgs.char, cf[0],cf[1],cf[2],cf[3], VW/2-340, VH*0.20-40+bob, 96,96);

  // big title
  ctx.save();
  ctx.translate(VW/2, VH*0.24); ctx.scale(pulse,pulse);
  ctx.font="bold 66px 'Trebuchet MS', sans-serif";
  ctx.lineWidth=8; ctx.strokeStyle='#0d2a14'; ctx.strokeText('Grassland Run',0,0);
  ctx.fillStyle='#7ed957'; ctx.fillText('Grassland Run',0,0);
  ctx.restore();
  ctx.font="bold 20px 'Trebuchet MS', sans-serif"; ctx.fillStyle='#eafbe0';
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=6;
  ctx.fillText('A BROWSER-BASED PLATFORMER', VW/2, VH*0.24+52); ctx.shadowBlur=0;

  // buttons
  menuBtns={};
  const bw=260, bx=(VW-bw)/2;
  const items=[
    {key:'play',  y:VH*0.50, h:56, fill:'#4fb54f', hi:'#5fc55f', ink:'#12301a', label:'▶  Play  '+(LEVELS[0]?.subtitle||'Level 1')},
    {key:'select',y:VH*0.50+72, h:50, fill:'#3c5064', hi:'#4a6076', ink:'#dceaf5', label:'Level Select'},
  ];
  // which button is highlighted: mouse-over wins exclusively; else pad/kb selection
  const mouseHover = items.findIndex(it=>pointIn(mmx,mmy,{x:bx,y:it.y,w:bw,h:it.h}));
  if(mouseHover>=0 && mouseHover!==titleHoverPrev) play('bump');   // sound on hover-enter
  titleHoverPrev = mouseHover;
  let hoverIdx = mouseHover;
  if(hoverIdx>=0) menuSel=hoverIdx; else hoverIdx=menuSel;
  items.forEach((it,i)=>{
    const hover = i===hoverIdx;
    panel(bx,it.y,bw,it.h,12, hover?it.hi:it.fill,
      hover ? {stroke:'#ffcf3f',strokeW:3,shadowColor:'rgba(255,207,63,.55)',shadowBlur:14}
            : {stroke:'rgba(255,255,255,.22)',strokeW:2});
    ctx.fillStyle=it.ink; ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.font=`bold ${it.key==='play'?20:17}px 'Trebuchet MS', sans-serif`;
    ctx.fillText(it.label, VW/2, it.y+it.h/2);
    menuBtns[it.key]={x:bx,y:it.y,w:bw,h:it.h};
  });

  // controls footer, inside the canvas
  ctx.font="13px 'Trebuchet MS', sans-serif"; ctx.fillStyle='rgba(255,255,255,.75)';
  ctx.textBaseline='alphabetic';
  ctx.fillText('Keys ← → ↑   ·   ↑/↓ on ladders   ·   Mouse: right-hold move, left-click jump   ·   Pad: stick or d-pad + ✕/A   ·   Touch: left-drag move, right-tap jump', VW/2, VH-24);
  ctx.textAlign='left';
}

// Serialize a LEVELS[i] object back into the exact object-literal + comment
// format the builder's Import reads, so a level can be pulled from the game and
// dropped straight back into the builder for editing. Round-trips cleanly.
function serializeLevel(i){
  const L=LEVELS[i]; if(!L) return '';
  const triples=arr => '['+(arr||[]).map(a=>`[${a[0]},${a[1]},"${a[2]}"]`).join(',')+']';
  const q=s => JSON.stringify(s==null?'':s);
  const nT=(L.terrain||[]).length, nI=(L.items||[]).length, nE=(L.enemies||[]).length,
        nH=(L.hazards||[]).length, nD=(L.deco||[]).length;
  const head =
`// ==== Exported from Grassland Run ====\n`+
`// ${L.cols}×${L.rows} · ${nT} terrain · ${nI} items · ${nE} enemies · ${nH} hazards · ${nD} deco\n`+
`// spawn@${L.spawn?.x},${L.spawn?.y}  goal@${L.goal?.x},${L.goal?.y}  theme=${L.theme}\n`;
  const B=[];
  B.push('{');
  B.push(`  name: ${q(L.name)},`);
  B.push(`  subtitle: ${q(L.subtitle)},`);
  B.push(`  theme: ${q(L.theme)},`);
  if(L.gravity) B.push(`  gravity: ${q(L.gravity)},`);
  B.push(`  cols: ${L.cols}, rows: ${L.rows},`);
  B.push(`  spawn: { x: ${L.spawn?.x??2}, y: ${L.spawn?.y??2} },`);
  B.push(`  goal:  { x: ${L.goal?.x??(L.cols-2)}, y: ${L.goal?.y??2} },`);
  B.push(`  terrain: ${triples(L.terrain)},`);
  if(L.items&&L.items.length)   B.push(`  items: ${triples(L.items)},`);
  if(L.enemies&&L.enemies.length) B.push(`  enemies: ${triples(L.enemies)},`);
  if(L.hazards&&L.hazards.length) B.push(`  hazards: ${triples(L.hazards)},`);
  if(L.deco&&L.deco.length)     B.push(`  deco: ${triples(L.deco)},`);
  if(L.tips&&L.tips.length)      B.push(`  tips: ${JSON.stringify(L.tips)},`);
  B.push('}');
  return head + B.join('\n');
}
// Copy a level's serialized text to the clipboard (with a textarea fallback).
function exportLevelToClipboard(i){
  const txt=serializeLevel(i);
  const done=()=>{ exportToast='Level '+(i+1)+' copied — paste into the builder'; play('select');
    setTimeout(()=>{ exportToast=''; },2600); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done));
  } else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  try{
    const ta=document.createElement('textarea'); ta.value=txt;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
    ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done();
  }catch(e){ exportToast='Copy failed — see console'; console.log(txt); setTimeout(()=>exportToast='',2600); }
}

function drawLevelSelect(){
  drawMenuBackdrop();
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font="bold 40px 'Trebuchet MS', sans-serif"; ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=6;
  ctx.fillText(exportMode?'EXPORT A LEVEL':'SELECT LEVEL', VW/2, 74); ctx.shadowBlur=0;
  // export-mode subheader + toast
  if(exportMode){
    ctx.font="14px 'Trebuchet MS', sans-serif"; ctx.fillStyle='#ffcf3f';
    ctx.fillText('click a level to copy its data to the clipboard  ·  Esc to cancel', VW/2, 96);
  }
  if(exportToast){
    ctx.font="bold 15px 'Trebuchet MS', sans-serif";
    const tw=ctx.measureText(exportToast).width;
    const ty=VH-116;   // above the Back button (which sits at VH-70), with a gap
    panel(VW/2-tw/2-16, ty, tw+32, 30, 8, 'rgba(20,34,24,.95)', {stroke:'#7ed957',strokeW:2,shadowBlur:6});
    ctx.fillStyle='#eafbe0'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(exportToast, VW/2, ty+15); ctx.textBaseline='alphabetic';
  }

  selectCells=[];
  const cols=5, cellW=130, gapX=22, gapY=26;
  const filledRows=Math.max(1,Math.ceil(Math.max(1,LEVELS.length)/cols));
  const slots=Math.max((filledRows+1)*cols, cols*2); // filled rows + one spare row for future levels
  const rows=slots/cols;
  const gridW=cols*cellW+(cols-1)*gapX;
  const gridX=(VW-gridW)/2, gridY=118;
  const avail=(VH-70-16)-gridY;                        // room above Back button (VH-70) with padding
  const cellH=Math.min(118, Math.floor((avail-(rows-1)*gapY)/rows));
  for(let i=0;i<slots;i++){
    const c=i%cols, r=Math.floor(i/cols);
    const x=gridX+c*(cellW+gapX), y=gridY+r*(cellH+gapY);
    const exists=i<LEVELS.length;
    const hover = exists && (pointIn(mmx,mmy,{x,y,w:cellW,h:cellH}) || menuSel===i);
    const rec = exists?bestFor(i):{best:0,stars:0};
    let fill = !exists ? '#232f3a' : (rec.stars>0 ? (hover?'#3f6a48':'#35563d') : (hover?'#4a6076':'#3c5064'));
    let stroke = exists?'rgba(255,255,255,.22)':'rgba(255,255,255,.06)';
    if(exportMode && exists){ fill = hover?'#6a5a24':'#4a3f1a'; stroke=hover?'#ffcf3f':'rgba(255,207,63,.5)'; }
    panel(x,y,cellW,cellH,12,fill,{stroke,strokeW:hover?3:2});
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=exists?'#fff':'#3a4a58';
    ctx.font="bold 24px 'Trebuchet MS', sans-serif";
    ctx.fillText(exists?String(i+1):'–', x+cellW/2, y+22);
    if(exists){
      // stars row
      ctx.font='18px sans-serif';
      const gw=20, sx0=x+cellW/2-gw;
      for(let s=0;s<3;s++){ ctx.fillStyle = s<rec.stars?'#ffcf3f':'rgba(255,255,255,.16)';
        ctx.fillText(s<rec.stars?'★':'☆', sx0+s*gw, y+44); }
      // name + best
      ctx.font="italic 13px Georgia, 'Times New Roman', serif"; ctx.fillStyle='#cfe0d8';
      ctx.fillText((LEVELS[i].name||'').slice(0,16), x+cellW/2, y+cellH-30);
      if(rec.best>0){ ctx.font="11px Consolas, monospace"; ctx.fillStyle='#ffe9b0';
        ctx.fillText('BEST '+rec.best, x+cellW/2, y+cellH-14); }
    }
    selectCells.push({x,y,w:cellW,h:cellH,idx:i,exists});
  }

  // reset-confirmation toast (mirrors the export toast placement)
  if(resetToast){
    ctx.font="bold 15px 'Trebuchet MS', sans-serif";
    const tw=ctx.measureText(resetToast).width;
    const ty=VH-116;
    panel(VW/2-tw/2-16, ty, tw+32, 30, 8, 'rgba(34,20,20,.95)', {stroke:'#e06a6a',strokeW:2,shadowBlur:6});
    ctx.fillStyle='#fbe0e0'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(resetToast, VW/2, ty+15); ctx.textBaseline='alphabetic';
  }

  // back + reset buttons (side by side)
  const bw=150,bh=44,by=VH-70,bgap=16;
  const rw=170;
  const totalW=bw+bgap+rw, x0=VW/2-totalW/2;
  const bx=x0, rx=x0+bw+bgap;
  const bh_hover=pointIn(mmx,mmy,{x:bx,y:by,w:bw,h:bh});
  panel(bx,by,bw,bh,10, bh_hover?'#4a6076':'#3c5064',{stroke:'rgba(255,255,255,.2)',strokeW:2});
  ctx.fillStyle='#dceaf5'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font="bold 16px 'Trebuchet MS', sans-serif"; ctx.fillText('◂  Back', bx+bw/2, by+bh/2);
  // reset
  const rHover=pointIn(mmx,mmy,{x:rx,y:by,w:rw,h:bh});
  const rFill = resetArmed ? (rHover?'#b23838':'#8f2c2c') : (rHover?'#5a4048':'#4a343a');
  panel(rx,by,rw,bh,10, rFill,{stroke:resetArmed?'#ff9a9a':'rgba(255,160,160,.4)',strokeW:resetArmed?3:2});
  ctx.fillStyle=resetArmed?'#fff':'#f0d0d6';
  ctx.fillText(resetArmed?'Confirm reset?':'⟳  Reset scores', rx+rw/2, by+bh/2);
  menuBtns={back:{x:bx,y:by,w:bw,h:bh}, reset:{x:rx,y:by,w:rw,h:bh}};
  ctx.textAlign='left';
}

function draw(){
  ctx.clearRect(0,0,VW,VH);
  if(screen==='title'){ drawTitle(); return; }
  if(screen==='levelSelect'){ drawLevelSelect(); return; }
  if(!skyGrad){ skyGrad=ctx.createLinearGradient(0,0,0,VH); skyGrad.addColorStop(0,'#8ec9e8'); skyGrad.addColorStop(1,'#cfeeff'); }
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,VW,VH);
  if(!player){ ctx.fillStyle='rgba(0,0,0,.3)';ctx.font='18px sans-serif';ctx.textAlign='center';
    ctx.fillText('Loading…',VW/2,VH/2);ctx.textAlign='left';return; }
  drawBG();
  ctx.save(); ctx.translate(-Math.round(cam.x),-Math.round(cam.y));
  // Viewport cull bounds (world px). Anything fully outside gets skipped so a
  // wide level doesn't pay drawImage cost for hundreds of off-screen tiles —
  // the single biggest per-frame win on weaker devices like older iPads.
  const viewL=cam.x-TS, viewR=cam.x+VW+TS, viewT=cam.y-TS, viewB=cam.y+VH+TS;
  const onScreen=(x,y,w,h)=> x+w>=viewL && x<=viewR && y+h>=viewT && y<=viewB;
  // deco (behind)
  for(const d of deco){ if(!onScreen(d.x,d.y,TS,TS))continue; blit('tiles', itemFrame(d.kind), d.x, d.y, TS, TS, false); }
  // terrain
  for(const s of solids){ if(!onScreen(s.x,s.y,TS,TS))continue; blitTile(terFrame(s.name), s.x, s.y); }
  // moving platforms (ferries) — draw each tile of the run at the platform's live x
  for(const mv of movers){
    for(let i=0;i<mv.tiles.length;i++){ const tx=mv.x+i*TS; if(!onScreen(tx,mv.y,TS,TS))continue; blitTile(terFrame(mv.tiles[i]), tx, mv.y); }
  }
  // items
  for(const it of items){
    if(!onScreen(it.x,it.y,TS,TS))continue;
    if(it.block){ blit('tiles', itemFrame(it.used?'block_empty':'block_coin'), it.x,it.y,TS,TS,false); continue; }
    if(it.got)continue;
    const bob=Math.sin(anim*0.09+it.x)*3;
    blit('tiles', itemFrame(it.kind), it.x+8, it.y+8+bob, TS-16, TS-16, false);
  }
  // hazards
  for(const h of hazards){ if(!onScreen(h.x,h.y,TS,TS))continue; blit('tiles', itemFrame(h.kind), h.x, h.y, TS, TS, false); }
  // goal flag (animated)
  if(goalRect){ const ff=(Math.floor(anim/12)%2)?'flag_green_a':'flag_green_b';
    blit('tiles', itemFrame(state==='won'?ff:ff), goalRect.x, goalRect.y, TS, TS, false); }
  // enemies
  for(const e of enemies){ if(!e.alive)continue;
    if(!onScreen(e.x,e.y,e.w,e.h))continue;
    const idx=Math.floor(anim/(60/e.def.fps));
    if(e.def.move==='spin'){
      const f=enemyFrame(e.kind,idx);
      ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);ctx.rotate(e.spin);
      if(f)ctx.drawImage(imgs.enemies,f[0],f[1],f[2],f[3],-e.w/2,-e.h/2,e.w,e.h);ctx.restore();
    } else {
      blit('enemies', enemyFrame(e.kind,idx), e.x, e.y, e.w, e.h, e.dir>0);
    }
  }
  // player
  const p=player; let pf='character_green_idle';
  if(state==='dying') pf='character_green_hit';
  else if(!p.onGround) pf='character_green_jump';
  else if(Math.abs(p.vx)>0.6) pf=(Math.floor(anim/6)%2)?'character_green_walk_a':'character_green_walk_b';
  if(state==='dying'){
    // tumble as it flies off: rotate around the sprite center
    ctx.save();
    ctx.translate(p.x-6 + (p.w+12)/2, p.y-8 + (p.h+12)/2);
    ctx.rotate(death ? death.t*0.12 : 0);
    const f=FRAMES.chars['character_green_hit'];
    if(f) ctx.drawImage(imgs.char, f[0],f[1],f[2],f[3], -(p.w+12)/2, -(p.h+12)/2, p.w+12, p.h+12);
    ctx.restore();
  } else if(p.hurt>0 && Math.floor(anim/4)%2){ /* blink: skip draw this frame */ }
  else blit('char', FRAMES.chars[pf], p.x-6, p.y-8, p.w+12, p.h+12, p.face<0);

  // floating score popups (rise and fade)
  for(const sp of scorePops){
    const a=1-sp.t/50, ry=sp.y-sp.t*0.9;
    ctx.globalAlpha=Math.max(0,a);
    ctx.font="bold 18px 'Trebuchet MS', sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(8,20,12,.9)'; ctx.strokeText(sp.text, sp.x, ry);
    ctx.fillStyle=sp.color; ctx.fillText(sp.text, sp.x, ry);
    ctx.globalAlpha=1; ctx.textAlign='left';
  }

  ctx.restore();
  drawHUD();
  if(state==='play' && !paused) drawGoalArrow();
  if(activeTip && state==='play' && !paused) drawTip();
  if(state==='won')  endScreen('🏁 '+(L.name||'Level')+' cleared!', true);
  if(state==='lost') endScreen('💀 Game Over', false);
  if(paused && state==='play') pauseOverlay();
}
function hudLabel(txt,x,y,align,size,color){
  ctx.font=`bold ${size}px 'Trebuchet MS', sans-serif`;
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.lineWidth=4; ctx.strokeStyle='rgba(8,20,12,.85)'; ctx.strokeText(txt,x,y);
  ctx.fillStyle=color||'#fff'; ctx.fillText(txt,x,y);
}
function drawTip(){
  const tip=activeTip; if(!tip) return;
  // fade: quick in over first 15 frames, out over last 30
  const elapsed = tip.dur - activeTipT;
  let a = 1;
  if(elapsed < 15) a = elapsed/15;
  else if(activeTipT < 30) a = activeTipT/30;
  a = Math.max(0, Math.min(1, a));

  ctx.save();
  ctx.globalAlpha = a;
  ctx.font = "bold 20px 'Trebuchet MS', sans-serif";
  const tw = ctx.measureText(tip.text).width;
  const pad = 22, bw = tw + pad*2, bh = 44;
  const bx = VW/2 - bw/2, by = 62;   // just below the top-center buttons
  // slide down slightly as it fades in
  const slide = (1-a) * -8;
  panel(bx, by+slide, bw, bh, 12, 'rgba(20,34,24,.92)', {stroke:'#7ed957', strokeW:2, shadowBlur:10});
  ctx.globalAlpha = a;
  ctx.fillStyle = '#eafbe0'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(tip.text, VW/2, by+slide+bh/2);
  ctx.restore();
  ctx.textAlign='left';
}
// A single bouncing arrow that points toward the goal flag whenever it's off
// screen. The flag is always the objective, so one directed indicator guides
// the player (up the tower, across the valley, wherever it is).
function drawGoalArrow(){
  if(!goalRect) return;
  // flag center in screen space
  const fx = goalRect.x + goalRect.w/2 - Math.round(cam.x);
  const fy = goalRect.y + goalRect.h/2 - Math.round(cam.y);
  const margin = 8;
  const onScreen = fx>=margin && fx<=VW-margin && fy>=margin && fy<=VH-margin;
  if(onScreen) return;   // flag visible — no arrow needed

  // direction from screen center to the flag
  const cx=VW/2, cy=VH/2;
  let dx=fx-cx, dy=fy-cy;
  const len=Math.hypot(dx,dy)||1; dx/=len; dy/=len;
  const ang=Math.atan2(dy,dx);

  // place the arrow where that ray hits the edge band, inset by pad
  const pad=42;
  const halfW=VW/2-pad, halfH=VH/2-pad;
  // scale the unit vector out to the edge rectangle
  const scale=Math.min(halfW/Math.abs(dx||1e-6), halfH/Math.abs(dy||1e-6));
  let ax=cx+dx*scale, ay=cy+dy*scale;
  // bounce along the pointing direction
  const t=anim/60, bounce=Math.sin(t*5)*6;
  ax+=dx*bounce; ay+=dy*bounce;

  ctx.save();
  ctx.translate(ax,ay); ctx.rotate(ang);
  // arrow: a rounded triangle with a short tail, drawn pointing +x then rotated
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=6; ctx.shadowOffsetY=2;
  ctx.fillStyle='#ffcf3f'; ctx.strokeStyle='rgba(0,0,0,.55)'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(16,0); ctx.lineTo(-8,-13); ctx.lineTo(-2,0); ctx.lineTo(-8,13);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function drawHUD(){
  // hearts (top-left)
  for(let i=0;i<3;i++) blit('tiles', itemFrame(i<lives?'hud_heart':'hud_heart_empty'), 12+i*40,12,34,34,false);

  // score (top-left, under hearts) — outlined so it reads on any background
  hudLabel('SCORE  '+String(score).padStart(6,'0'), 14, 66, 'left', 22, '#ffe9b0');

  // level number + name (top-left, under score)
  const lvNum = 'LEVEL '+(levelIndex+1);
  hudLabel(lvNum, 14, 92, 'left', 15, '#7ed957');
  ctx.font="bold 15px 'Trebuchet MS', sans-serif";
  const numW = ctx.measureText(lvNum).width;
  if(L.name) hudLabel(L.name, 14+numW+10, 92, 'left', 15, 'rgba(255,255,255,.9)');

  // coins (top-right) with a dark pill behind so white text never sits on white sky
  const coinTxt=coinsGot+' / '+coinsTotal;
  ctx.font="bold 22px 'Trebuchet MS', sans-serif";
  const cw=ctx.measureText(coinTxt).width;
  const pillW=cw+52, pillX=VW-pillW-12;
  panel(pillX, 12, pillW, 36, 8, 'rgba(20,34,24,.8)', {stroke:'rgba(255,255,255,.18)',strokeW:1,shadowBlur:4});
  blit('tiles', itemFrame('coin_gold'), pillX+8, 15, 30, 30, false);
  hudLabel(coinTxt, pillX+44, 30, 'left', 22, '#ffd34d');

  // timer (top-right, under coins) — turns red under 10s
  const secs=Math.ceil(timeLeft);
  hudLabel('⏱ '+secs+'s', VW-14, 66, 'right', 20, secs<=10?'#ff7a5a':'#dff0e6');

  // combo indicator (center) when a chain is live
  if(combo>1){ hudLabel('COMBO x'+combo, VW/2, 96, 'center', 24, '#ff9de0'); }

  if(muted) hudLabel('MUTED', VW-16, 92, 'right', 14, '#ff6');

  ctx.textAlign='left';
  // in-play controls: Pause + Restart, top-center (bottom is reserved for touch)
  if(state==='play'){
    const bw=104,bh=32,gap=10;
    const totalW=bw*2+gap, x0=VW/2-totalW/2, by=10;
    const px=x0, rx=x0+bw+gap;
    const drawBtn=(x,y,label,icon)=>{
      const hover=pointIn(mmx,mmy,{x,y,w:bw,h:bh});
      panel(x,y,bw,bh,8, hover?'#4a6076':'rgba(30,46,36,.88)',{stroke:'rgba(255,255,255,.22)',strokeW:1,shadowBlur:4});
      ctx.fillStyle='#dceaf5'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font="bold 14px 'Trebuchet MS', sans-serif";
      ctx.fillText(icon+'  '+label, x+bw/2, y+bh/2); ctx.textAlign='left';
      return {x,y,w:bw,h:bh};
    };
    menuBtns={
      pause:   drawBtn(px,by,'Pause','⏸'),
      restart: drawBtn(rx,by,'Restart','↻'),
    };
  }
  // touch-zone hint (only on touch devices, and only during active play)
  if(touch.everUsed && state==='play'){
    ctx.save();
    // faint divider down the middle
    ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.setLineDash([6,8]); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(VW/2, 52); ctx.lineTo(VW/2, VH-40); ctx.stroke(); ctx.setLineDash([]);
    ctx.globalAlpha=0.5; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font="12px 'Trebuchet MS', sans-serif"; ctx.fillStyle='rgba(255,255,255,.6)';
    // only label while idle (no active move touch) so it doesn't nag during play
    if(touch.moveId===null){
      ctx.fillText('◂ drag to move ▸', VW*0.25, VH-14);
      ctx.fillText('tap to jump', VW*0.75, VH-14);
    }
    ctx.restore(); ctx.textAlign='left';
  }
}
function endScreen(title, won){
  ctx.fillStyle='rgba(8,14,10,.82)'; ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='bold 40px Trebuchet MS, sans-serif'; ctx.fillText(title, VW/2, won?VH*0.14:VH*0.34);

  if(won && runSummary){
    const s=runSummary;
    // stars
    ctx.font='40px sans-serif';
    const starW=46, sx0=VW/2 - starW; 
    for(let i=0;i<3;i++){ ctx.fillStyle = i<s.stars?'#ffcf3f':'rgba(255,255,255,.18)';
      ctx.fillText(i<s.stars?'★':'☆', sx0+i*starW, VH*0.24); }
    // breakdown lines
    ctx.textBaseline='middle'; ctx.font="17px 'Trebuchet MS', sans-serif";
    const rows=[
      ['Coins & kills', s.base],
      ['Time bonus', s.time],
      ['All coins', s.allCoins],
      ['No damage', s.noDmg],
    ];
    let y=VH*0.32;
    rows.forEach(([label,val])=>{
      ctx.textAlign='left'; ctx.fillStyle=val>0?'#cfe0d8':'#6b8072';
      ctx.fillText(label, VW/2-130, y);
      ctx.textAlign='right'; ctx.fillStyle=val>0?'#fff':'#6b8072';
      ctx.fillText((val>0?'+':'')+val, VW/2+130, y);
      y+=26;
    });
    // total + best
    ctx.textAlign='left'; ctx.fillStyle='#ffe9b0'; ctx.font="bold 22px 'Trebuchet MS', sans-serif";
    ctx.fillText('TOTAL', VW/2-130, y+6);
    ctx.textAlign='right'; ctx.fillText(String(s.total), VW/2+130, y+6);
    ctx.textAlign='center'; ctx.font="14px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = s.isNewBest?'#7ed957':'rgba(255,255,255,.6)';
    ctx.fillText(s.isNewBest?'★ NEW BEST!':('Best: '+s.best), VW/2, y+34);
  } else if(!won){
    ctx.font='18px Trebuchet MS, sans-serif'; ctx.fillStyle='#ffb3a0';
    ctx.fillText('Score  '+score, VW/2, VH*0.34+40);
  }

  const hasNext=LEVELS[levelIndex+1];
  menuBtns={};
  const bw=220, bx=VW/2-bw/2; let y=won?VH*0.70:VH*0.52;
  const rows=[];
  if(won && hasNext) rows.push({key:'next', label:'▶  Next Level', fill:'#4fb54f', hi:'#5fc55f', ink:'#12301a'});
  rows.push({key:'retry', label:won?'↻  Replay':'↻  Try Again', fill:'#3c5064', hi:'#4a6076', ink:'#dceaf5'});
  rows.push({key:'select', label:'≡  Level Select', fill:'#3c5064', hi:'#4a6076', ink:'#dceaf5'});
  endRows=rows.map(r=>r.key);
  if(menuSel>=rows.length) menuSel=0;
  rows.forEach((r,i)=>{
    const h=46, hover=pointIn(mmx,mmy,{x:bx,y,w:bw,h}) || menuSel===i;
    panel(bx,y,bw,h,12, hover?r.hi:r.fill, {stroke: hover?'#ffcf3f':'rgba(255,255,255,.22)', strokeW: hover?3:2});
    ctx.fillStyle=r.ink; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font="bold 17px 'Trebuchet MS', sans-serif";
    ctx.fillText(r.label, VW/2, y+h/2);
    menuBtns[r.key]={x:bx,y,w:bw,h};
    y+=54;
  });
  ctx.textAlign='left';
}

// Pause overlay — drawn over the frozen level. Resume returns to play; Quit

function doPause(){ if(state==='play'&&!paused){ paused=true; menuSel=0; play('select'); } }
function doResume(){ paused=false; play('select'); }
function doRestart(){ paused=false; buildLevel(levelIndex); screen='play'; }
function quitToMain(){ paused=false; gotoTitle(); }

// ===================================================================
//  Input & loop
// ===================================================================
// ===================================================================
//  Input — keyboard, mouse, and gamepad. Routes to menus or play by `screen`.
// ===================================================================
const mouse = { hold:false, dir:0, x:0, y:0 };
// Touch: left half of the screen is a relative d-pad (drag from where the finger
// landed decides left/right), right half taps to jump. Tracked per-finger by id.
const touch = { moveId:null, startX:0, startY:0, moveDir:0, moveVdir:0, DEAD:18, VDEAD:22, everUsed:false };
const pad   = { axis:0, vaxis:0, jumpPrev:false, index:null };

function tryJump(fromUpKey){
  if(screen!=='play'||state!=='play') return;
  const p=player;
  if(!p) return;
  // On a ladder, ArrowUp means "climb up", not "jump" — swallow it so the
  // climb logic in update() handles it. Space (fromUpKey false) still jumps
  // off the ladder. Jumping off clears the climb state.
  if(p.climbing){
    if(fromUpKey) return;          // up-arrow climbs, doesn't jump
    p.climbing=false;              // Space leaps off the ladder
    p.vy=jumpV; p.jumps=1; p.onGround=false; play('jump'); return;
  }
  if(p.jumps<2){ p.vy=jumpV; p.jumps++; p.onGround=false; play(p.jumps>1?'jumphigh':'jump'); }
}

// ---- screen transitions ----
function startLevel(i){ if(!LEVELS[i])return; buildLevel(i); screen='play'; play('select'); }
function gotoTitle(){ screen='title'; menuSel=0; exportMode=false; exportKeyX=false; exportToast=''; resetArmed=false; resetToast=''; titleHoverPrev=-1; play('select'); }
function gotoSelect(){ screen='levelSelect'; menuSel=0; exportMode=false; exportKeyX=false; exportToast=''; resetArmed=false; resetToast=''; play('select'); }

// wipe all best scores / stars (level-select "Reset" button, two-tap guarded)
function resetAllScores(){
  progress={}; saveProgress();
  resetArmed=false; resetToast='All scores cleared';
  play('bump'); setTimeout(()=>{ resetToast=''; },1600);
}

// how many selectable menu items on the current screen (for kb/pad cursor)
function menuCount(){
  if(screen==='title') return 2;
  if(screen==='levelSelect') return LEVELS.length;
  return 0;
}
// activate the current menu cursor selection
function menuActivate(){
  if(screen==='title'){ menuSel===0 ? startLevel(0) : gotoSelect(); }
  else if(screen==='levelSelect'){ startLevel(menuSel); }
}

// ---- keyboard ----
addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();

  // menu navigation
  if(screen==='title'||screen==='levelSelect'){
    // level-select back-door: press X, then P, to arm clipboard-export mode
    if(screen==='levelSelect'){
      if(e.key==='x'||e.key==='X'){ exportKeyX=true; return; }
      if((e.key==='p'||e.key==='P') && exportKeyX){ exportMode=!exportMode; exportKeyX=false;
        exportToast = exportMode ? 'EXPORT MODE — click a level to copy it' : 'Export mode off';
        play('bump'); if(!exportMode) setTimeout(()=>{ if(!exportMode)exportToast=''; },1500); return; }
      exportKeyX=false;   // any other key breaks the combo
    }
    const n=menuCount();
    if(e.key==='ArrowDown'||e.key==='ArrowRight'){ menuSel=(menuSel+1)%n; resetArmed=false; play('bump'); }
    else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){ menuSel=(menuSel-1+n)%n; resetArmed=false; play('bump'); }
    else if(e.key==='Enter'||e.key===' '){ menuActivate(); }
    else if(e.key==='Escape'&&screen==='levelSelect'){ if(exportMode){exportMode=false;exportToast='';} else if(resetArmed){resetArmed=false;} else gotoTitle(); }
    return;
  }
  // play
  // Pause overlay: arrows + Enter drive Resume / Quit; Esc or P resumes.
  if(paused){
    const n=Math.max(1,pauseRows.length);
    if(e.key==='ArrowDown'){ menuSel=(menuSel+1)%n; play('bump'); return; }
    if(e.key==='ArrowUp'){ menuSel=(menuSel-1+n)%n; play('bump'); return; }
    if(e.key==='Enter'||e.key===' '){ (pauseRows[menuSel]==='resume')?doResume():quitToMain(); return; }
    if(e.key==='Escape'||e.key==='p'||e.key==='P'){ doResume(); return; }
    return;
  }
  // On the win/lose end screen, arrows + Enter drive the same buttons the pad uses.
  if(state==='won'||state==='lost'){
    const n=Math.max(1,endRows.length);
    if(e.key==='ArrowDown'){ menuSel=(menuSel+1)%n; play('bump'); return; }
    if(e.key==='ArrowUp'){ menuSel=(menuSel-1+n)%n; play('bump'); return; }
    if(e.key==='Enter'){ activateEndRow(); return; }
  }
  keys[e.key]=true;
  if((e.key==='ArrowUp'||e.key===' ')&&!e.repeat) tryJump(e.key==='ArrowUp');
  if(e.key==='r'||e.key==='R') doRestart();
  if((e.key==='n'||e.key==='N') && LEVELS[levelIndex+1]) startLevel(levelIndex+1);
  if(e.key==='m'||e.key==='M') muted=!muted;
  if((e.key==='Escape'||e.key==='p'||e.key==='P')&&state==='play') doPause();
});
addEventListener('keyup',e=>{ keys[e.key]=false; });

// ---- mouse ----
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(VW/r.width); mouse.y=(e.clientY-r.top)*(VH/r.height);
  mmx=mouse.x; mmy=mouse.y;                 // hover tracking for menus
  if(mouse.hold) updateMouseDir();
});
function updateMouseDir(){
  if(!player){ mouse.dir=0; return; }
  const screenPX = player.x - Math.round(cam?cam.x:0) + player.w/2;
  const dx = mouse.x - screenPX;
  mouse.dir = Math.abs(dx)<8 ? 0 : (dx>0?1:-1);
}
function menuClick(mx,my){
  // returns true if a button was hit
  if(screen==='title'){
    if(menuBtns.play && pointIn(mx,my,menuBtns.play)){ startLevel(0); return true; }
    if(menuBtns.select && pointIn(mx,my,menuBtns.select)){ gotoSelect(); return true; }
  } else if(screen==='levelSelect'){
    for(const c of selectCells){ if(c.exists && pointIn(mx,my,c)){
      resetArmed=false;
      if(exportMode){ exportLevelToClipboard(c.idx); }   // export instead of play
      else startLevel(c.idx);
      return true;
    } }
    if(menuBtns.reset && pointIn(mx,my,menuBtns.reset)){
      if(resetArmed) resetAllScores();
      else { resetArmed=true; play('bump'); }
      return true;
    }
    if(menuBtns.back && pointIn(mx,my,menuBtns.back)){ if(exportMode){exportMode=false;exportToast='';} gotoTitle(); return true; }
  } else if(screen==='play'){
    // pause overlay takes priority when open
    if(paused){
      if(menuBtns.resume && pointIn(mx,my,menuBtns.resume)){ doResume(); return true; }
      if(menuBtns.quit && pointIn(mx,my,menuBtns.quit)){ quitToMain(); return true; }
      return true;   // swallow clicks behind the overlay
    }
    if(state==='play'){
      if(menuBtns.pause && pointIn(mx,my,menuBtns.pause)){ doPause(); return true; }
      if(menuBtns.restart && pointIn(mx,my,menuBtns.restart)){ doRestart(); return true; }
    }
    if(state==='won'||state==='lost'){
      if(menuBtns.next && pointIn(mx,my,menuBtns.next)){ startLevel(levelIndex+1); return true; }
      if(menuBtns.retry && pointIn(mx,my,menuBtns.retry)){ buildLevel(levelIndex); screen='play'; return true; }
      if(menuBtns.select && pointIn(mx,my,menuBtns.select)){ gotoSelect(); return true; }
    }
  }
  return false;
}
cv.addEventListener('mousedown',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(VW/r.width), my=(e.clientY-r.top)*(VH/r.height);
  mmx=mx; mmy=my;
  // menus / end screens consume clicks first
  if(screen!=='play' || state!=='play'){ if(menuClick(mx,my)) return; }
  if(screen==='play' && state==='play'){
    if(menuClick(mx,my)) return;               // the ≡ menu button
    if(e.button===0){ tryJump(); }             // left click jump
    else if(e.button===2){ mouse.hold=true; updateMouseDir(); }  // right hold steer
  }
});
addEventListener('mouseup',e=>{ if(e.button===2) mouse.hold=false; });
cv.addEventListener('contextmenu',e=>e.preventDefault());

// ---- touch ----
// Convert a touch's client coords into canvas space.
function touchPos(t){
  const r=cv.getBoundingClientRect();
  return { x:(t.clientX-r.left)*(VW/r.width), y:(t.clientY-r.top)*(VH/r.height) };
}
// Did this touch hit an on-screen button (menus, pause overlay, end screen, HUD)?
function touchHitsButton(p){
  for(const k in menuBtns){ if(menuBtns[k] && pointIn(p.x,p.y,menuBtns[k])) return k; }
  return null;
}
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  touch.everUsed=true;
  for(const t of e.changedTouches){
    const p=touchPos(t);
    // 1) buttons always win (menus, pause/restart, end screens, title, level select)
    const hit=touchHitsButton(p);
    if(hit){ handleButtonTap(hit); continue; }
    // level-select grid cells (not in menuBtns) — tap to start that level
    if(screen==='levelSelect'){
      let started=false;
      for(const c of selectCells){ if(c.exists && pointIn(p.x,p.y,c)){
        resetArmed=false;
        if(exportMode) exportLevelToClipboard(c.idx); else startLevel(c.idx);
        started=true; break; } }
      if(started) continue;
    }
    // 2) on menus/overlays with no button hit, a tap acts like "confirm/advance"
    if(screen!=='play' || paused || state!=='play'){
      // let a tap on the title/level-select start; otherwise ignore
      if(screen==='title' && !hit){ /* only buttons start from title */ }
      continue;
    }
    // 3) in active play: left half = movement d-pad, right half = jump
    if(p.x < VW/2){
      if(touch.moveId===null){ touch.moveId=t.identifier; touch.startX=p.x; touch.startY=p.y; touch.moveDir=0; touch.moveVdir=0; }
    } else {
      tryJump();   // right-half tap = jump (tap again mid-air = double jump)
    }
  }
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===touch.moveId){
      const p=touchPos(t);
      const dx=p.x-touch.startX;
      touch.moveDir = Math.abs(dx)<touch.DEAD ? 0 : (dx>0?1:-1);
      const dy=p.y-touch.startY;
      touch.moveVdir = Math.abs(dy)<touch.VDEAD ? 0 : (dy>0?1:-1);
    }
  }
},{passive:false});
function endTouch(e){
  for(const t of e.changedTouches){
    if(t.identifier===touch.moveId){ touch.moveId=null; touch.moveDir=0; touch.moveVdir=0; }
  }
}
cv.addEventListener('touchend',e=>{ e.preventDefault(); endTouch(e); },{passive:false});
cv.addEventListener('touchcancel',e=>{ endTouch(e); },{passive:false});

// Shared button-tap handler so touch and click route through the same actions.
function handleButtonTap(key){
  if(screen==='title'){ if(key==='play')startLevel(0); else if(key==='select')gotoSelect(); return; }
  if(screen==='levelSelect'){
    if(key==='back')gotoTitle();
    else if(key==='reset'){ if(resetArmed)resetAllScores(); else {resetArmed=true;play('bump');} }
    return;
  }
  if(screen==='play'){
    if(paused){ if(key==='resume')doResume(); else if(key==='quit')quitToMain(); return; }
    if(state==='play'){ if(key==='pause')doPause(); else if(key==='restart')doRestart(); return; }
    if(state==='won'||state==='lost'){
      if(key==='next')startLevel(levelIndex+1);
      else if(key==='retry'){ buildLevel(levelIndex); screen='play'; }
      else if(key==='select')gotoSelect();
    }
  }
}

// ---- gamepad ----
addEventListener('gamepadconnected',e=>{ pad.index=e.gamepad.index; });
addEventListener('gamepaddisconnected',e=>{ if(pad.index===e.gamepad.index){ pad.index=null; pad.axis=0; } });
function pollGamepad(){
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp=null;
  if(pad.index!=null && pads[pad.index]) gp=pads[pad.index];
  else { for(const g of pads){ if(g){ gp=g; pad.index=g.index; break; } } }
  if(!gp){ pad.axis=0; return; }
  const ax = gp.axes[0]||0, ay = gp.axes[1]||0;
  // D-pad buttons feed the same movement intent as the stick (either input works).
  const dpadX = (gp.buttons[15]&&gp.buttons[15].pressed) ? 1 : (gp.buttons[14]&&gp.buttons[14].pressed) ? -1 : 0;
  const dpadY = (gp.buttons[13]&&gp.buttons[13].pressed) ? 1 : (gp.buttons[12]&&gp.buttons[12].pressed) ? -1 : 0;
  pad.axis  = dpadX!==0 ? dpadX : (Math.abs(ax)<0.25 ? 0 : (ax>0?1:-1));
  pad.vaxis = dpadY!==0 ? dpadY : (Math.abs(ay)<0.35 ? 0 : (ay>0?1:-1));   // down = +1, up = -1 (ladders)
  const a  = !!(gp.buttons[0] && gp.buttons[0].pressed);   // ✕ / A
  const b  = !!(gp.buttons[1] && gp.buttons[1].pressed);   // ○ / B  (back)
  const start = !!(gp.buttons[9] && gp.buttons[9].pressed); // ☰ Menu/Start (right small btn)
  const view  = !!(gp.buttons[8] && gp.buttons[8].pressed); // ⧉ View/Back (left small btn)
  const up   = (gp.buttons[12]&&gp.buttons[12].pressed) || ay<-0.5;
  const down = (gp.buttons[13]&&gp.buttons[13].pressed) || ay>0.5;
  const left = (gp.buttons[14]&&gp.buttons[14].pressed) || ax<-0.5;
  const right= (gp.buttons[15]&&gp.buttons[15].pressed) || ax>0.5;

  if(screen==='title'||screen==='levelSelect'){
    // edge-triggered menu navigation
    const n=menuCount();
    if(screen==='levelSelect'){
      const cols=5;
      if(right&&!padMenuPrev.right){ menuSel=(menuSel+1)%n; resetArmed=false; play('bump'); }
      if(left&&!padMenuPrev.left){ menuSel=(menuSel-1+n)%n; resetArmed=false; play('bump'); }
      if(down&&!padMenuPrev.down){ menuSel = menuSel+cols<n ? menuSel+cols : menuSel%cols; resetArmed=false; play('bump'); }
      if(up&&!padMenuPrev.up){
        if(menuSel-cols>=0){ menuSel-=cols; }
        else { const lastRow=Math.floor((n-1)/cols); let t=lastRow*cols+(menuSel%cols); if(t>n-1)t-=cols; menuSel=t; }
        resetArmed=false; play('bump');
      }
    } else {
      if((down||right)&&!padMenuPrev.down){ menuSel=(menuSel+1)%n; play('bump'); }
      if((up||left)&&!padMenuPrev.up){ menuSel=(menuSel-1+n)%n; play('bump'); }
    }
    if(a&&!padMenuPrev.a){ menuActivate(); }
    if(b&&!padMenuPrev.b && screen==='levelSelect'){ gotoTitle(); }
    padMenuPrev={up, down, left, right, a, b, start:padMenuPrev.start};
    pad.jumpPrev=a; return;
  }

  // ---- pause overlay : navigate Resume / Quit ----
  if(paused){
    const n=Math.max(1,pauseRows.length);
    if(down&&!padMenuPrev.down){ menuSel=(menuSel+1)%n; play('bump'); }
    if(up&&!padMenuPrev.up){ menuSel=(menuSel-1+n)%n; play('bump'); }
    if(a&&!padMenuPrev.a){ (pauseRows[menuSel]==='resume')?doResume():quitToMain(); }
    if(view&&!padMenuPrev.view){ doResume(); }   // View again un-pauses
    padMenuPrev={up, down, a, b, start:padMenuPrev.start, view};
    pad.jumpPrev=a; return;
  }

  // ---- end screen (won/lost) : navigate its button list with the pad ----
  if(state==='won'||state==='lost'){
    const n=Math.max(1, endRows.length);
    if(down&&!padMenuPrev.down){ menuSel=(menuSel+1)%n; play('bump'); }
    if(up&&!padMenuPrev.up){ menuSel=(menuSel-1+n)%n; play('bump'); }
    if(a&&!padMenuPrev.a){ activateEndRow(); }
    if(b&&!padMenuPrev.b){ gotoSelect(); }
    padMenuPrev={up, down, a, b, start:padMenuPrev.start, view};
    pad.jumpPrev=a; return;
  }

  // ---- active play ----
  if(a && !pad.jumpPrev){ tryJump(); }                       // jump
  if(view && !padMenuPrev.view){ doPause(); }                // ⧉ View -> Pause
  if(start && !padMenuPrev.start){ doRestart(); }            // ☰ Menu -> Restart
  pad.jumpPrev=a; padMenuPrev.b=b; padMenuPrev.start=start; padMenuPrev.view=view;
}
// fire the currently-highlighted end-screen button
function activateEndRow(){
  const key=endRows[menuSel]||endRows[0];
  if(key==='next') startLevel(levelIndex+1);
  else if(key==='retry'){ buildLevel(levelIndex); screen='play'; }
  else if(key==='select') gotoSelect();
}

// ---- Fixed-timestep loop -------------------------------------------------
// The sim is tuned for 60 updates/second. A 120Hz display (iPad ProMotion) was
// calling update() twice as often, doubling game speed. Fix: accumulate real
// elapsed time and run update() a whole number of fixed 1/60s steps to match
// wall-clock, decoupling physics from refresh rate. Draw once per frame.
// Because each step is still exactly 1/60s, every tuned constant (jump height,
// gravity, mover speed) is unchanged — no re-tuning, and no dt-spike tunneling.
const STEP = 1000/60;         // ms per physics step
// Global speed dial. 1.0 = the locked-60Hz reference speed; below 1.0 slows the
// entire game uniformly (movement, gravity, jumps, enemies, ferry) while each
// physics step stays exactly 1/60s internally — so no constant needs re-tuning
// and collision never sees a large step. Raise/lower this one number to taste.
const GAME_SPEED = 0.82;
let lastT = 0, acc = 0;
function loop(now){
  if(!lastT) lastT = now;
  let frame = now - lastT;
  lastT = now;
  if(frame > 250) frame = 250;   // clamp after a tab-stall so we don't spiral
  acc += frame * GAME_SPEED;     // scale real time -> fewer sim steps = slower game
  perFrame();                    // input polling, once per rendered frame
  let steps = 0;
  while(acc >= STEP && steps < 5){   // run physics at a locked 60/sec (scaled)
    update();
    acc -= STEP;
    steps++;
  }
  draw();
  requestAnimationFrame(loop);
}
loadAll().then(()=>{ loadProgress(); booted=true; screen='title'; state='ready'; requestAnimationFrame(loop); });

// iOS/Safari won't play any audio until a real user gesture. On the first
// touch/click/key, prime every clip's pool and nudge each element (play+pause
// muted) so the OS marks them unlocked — later SFX then fire instantly.
let audioUnlocked=false;
function unlockAudio(){
  if(audioUnlocked)return; audioUnlocked=true;
  for(const k in snds){
    if(!sndPool[k]) primeAudio(k);
    for(const a of sndPool[k]){
      const v=a.volume; a.volume=0;
      a.play().then(()=>{ a.pause(); a.currentTime=0; a.volume=v; })
              .catch(()=>{ a.volume=v; });
    }
  }
}
['pointerdown','touchstart','keydown','mousedown'].forEach(ev=>
  addEventListener(ev, unlockAudio, {once:true, passive:true}));

</script>
