<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Patrol</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; width: 100%; height: 100vh; }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.8);
      padding: 12px;
      border: 2px solid #0f0;
      pointer-events: none;
      z-index: 10;
      line-height: 1.6;
    }
    #interaction {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.9);
      padding: 10px 20px;
      border: 2px solid #ff9900;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      display: none;
      font-size: 14px;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,255,0,0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="hud">
    FLOOR: <span id="floor">1</span><br>
    COINS: <span id="coins">0</span><br>
    KEYS: <span id="keys">0</span><br>
    ---<br>
    WASD: Move | Right-click: Look<br>
    Left-click: Use
  </div>
  <div id="interaction"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let playerPos = { x: -2.5, y: 1.7, z: -2.5 };
    let currentFloor = 0;
    let controls = {};
    let inventory = { coins: 0, keys: 0 };
    let rightMouseDown = false;
    let interactables = [];
    let coins = [];
    let doorColliders = [];

    const ROOM_SIZE = 8;
    const GRID_SIZE = 5;
    const DOOR_WIDTH = 1.6;
    const DOOR_HEIGHT = 3.3;

    function createWallTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#666';
      ctx.fillRect(0, 0, 256, 256);
      for (let i = 0; i < 100; i++) {
        ctx.fillStyle = `rgba(100,100,100,${Math.random() * 0.5})`;
        ctx.fillRect(Math.random() * 256, Math.random() * 256, Math.random() * 40 + 10, Math.random() * 40 + 10);
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      return texture;
    }

    function createFloorTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(0, 0, 256, 256);
      const brickH = 20;
      const brickW = 40;
      for (let y = 0; y < 256; y += brickH) {
        for (let x = 0; x < 256; x += brickW) {
          const offset = (y / brickH) % 2 === 0 ? 0 : brickW / 2;
          ctx.fillStyle = `rgba(139,69,19,${Math.random() * 0.4})`;
          ctx.fillRect(x + offset, y, brickW - 2, brickH - 2);
          ctx.strokeStyle = '#4A2511';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + offset, y, brickW - 2, brickH - 2);
        }
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      return texture;
    }

    function createWallWithDoorOpening(roomX, roomZ, roomY, side, hasDoor) {
      const wallTex = createWallTexture();
      const wallMat = new THREE.MeshLambertMaterial({ map: wallTex });
      const h = 6;
      const w = ROOM_SIZE;
      const group = new THREE.Group();

      if (!hasDoor) {
        const wallGeom = new THREE.PlaneGeometry(w, h);
        const wall = new THREE.Mesh(wallGeom, wallMat);
        group.add(wall);
        return group;
      }

      // Create wall sections around door opening
      const doorX = (DOOR_WIDTH) / 2;
      const doorTop = h - DOOR_HEIGHT;

      if (side === 'E' || side === 'W') {
        // East or West wall - door opening is vertical
        // Bottom section
        const bottomGeom = new THREE.PlaneGeometry(w, DOOR_HEIGHT / 2);
        const bottom = new THREE.Mesh(bottomGeom, wallMat);
        bottom.position.y = DOOR_HEIGHT / 4;
        group.add(bottom);

        // Top section
        const topGeom = new THREE.PlaneGeometry(w, h - DOOR_HEIGHT);
        const top = new THREE.Mesh(topGeom, wallMat);
        top.position.y = DOOR_HEIGHT + (h - DOOR_HEIGHT) / 2;
        group.add(top);

        // Left section
        const leftGeom = new THREE.PlaneGeometry(w / 2 - DOOR_WIDTH / 2, DOOR_HEIGHT);
        const left = new THREE.Mesh(leftGeom, wallMat);
        left.position.y = DOOR_HEIGHT / 2;
        left.position.x = -(w / 4 - DOOR_WIDTH / 4);
        group.add(left);

        // Right section
        const right = new THREE.Mesh(leftGeom, wallMat);
        right.position.y = DOOR_HEIGHT / 2;
        right.position.x = w / 4 - DOOR_WIDTH / 4;
        group.add(right);
      } else {
        // North or South wall - door opening is also vertical
        const bottomGeom = new THREE.PlaneGeometry(w, DOOR_HEIGHT / 2);
        const bottom = new THREE.Mesh(bottomGeom, wallMat);
        bottom.position.y = DOOR_HEIGHT / 4;
        group.add(bottom);

        const topGeom = new THREE.PlaneGeometry(w, h - DOOR_HEIGHT);
        const top = new THREE.Mesh(topGeom, wallMat);
        top.position.y = DOOR_HEIGHT + (h - DOOR_HEIGHT) / 2;
        group.add(top);

        const leftGeom = new THREE.PlaneGeometry(w / 2 - DOOR_WIDTH / 2, DOOR_HEIGHT);
        const left = new THREE.Mesh(leftGeom, wallMat);
        left.position.y = DOOR_HEIGHT / 2;
        left.position.x = -(w / 4 - DOOR_WIDTH / 4);
        group.add(left);

        const right = new THREE.Mesh(leftGeom, wallMat);
        right.position.y = DOOR_HEIGHT / 2;
        right.position.x = w / 4 - DOOR_WIDTH / 4;
        group.add(right);
      }

      return group;
    }

    function createRoom(gridX, gridY, floorNum) {
      const roomX = gridX * ROOM_SIZE - (GRID_SIZE / 2) * ROOM_SIZE;
      const roomZ = gridY * ROOM_SIZE - (GRID_SIZE / 2) * ROOM_SIZE;
      const roomY = floorNum * -12;
      
      const group = new THREE.Group();
      group.position.y = roomY;
      scene.add(group);

      const floorTex = createFloorTexture();
      const w = ROOM_SIZE;
      const h = 6;

      // Floor
      const floorGeom = new THREE.PlaneGeometry(w, w);
      const floorMat = new THREE.MeshLambertMaterial({ map: floorTex });
      const floor = new THREE.Mesh(floorGeom, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(roomX, 0.05, roomZ);
      group.add(floor);

      // Ceiling
      const ceilMat = new THREE.MeshLambertMaterial({ color: 0x333 });
      const ceil = new THREE.Mesh(floorGeom, ceilMat);
      ceil.rotation.x = Math.PI / 2;
      ceil.position.set(roomX, h, roomZ);
      group.add(ceil);

      // Walls with door openings
      const hasEastDoor = gridX < GRID_SIZE - 1;
      const hasSouthDoor = gridY < GRID_SIZE - 1;

      const northWall = createWallWithDoorOpening(roomX, roomZ, roomY, 'N', false);
      northWall.position.set(roomX, h/2, roomZ - w/2);
      group.add(northWall);

      const southWall = createWallWithDoorOpening(roomX, roomZ, roomY, 'S', hasSouthDoor);
      southWall.position.set(roomX, h/2, roomZ + w/2);
      group.add(southWall);

      const eastWall = createWallWithDoorOpening(roomX, roomZ, roomY, 'E', hasEastDoor);
      eastWall.position.set(roomX + w/2, h/2, roomZ);
      eastWall.rotation.y = Math.PI / 2;
      group.add(eastWall);

      const westWall = createWallWithDoorOpening(roomX, roomZ, roomY, 'W', false);
      westWall.position.set(roomX - w/2, h/2, roomZ);
      westWall.rotation.y = Math.PI / 2;
      group.add(westWall);

      return { x: roomX, z: roomZ, y: roomY, gridX, gridY, floorNum };
    }

    function addCoin(room, offsetX, offsetZ) {
      const coinGeom = new THREE.SphereGeometry(0.3, 16, 16);
      const coinMat = new THREE.MeshStandardMaterial({ 
        color: 0xFFD700,
        emissive: 0xFFFF00,
        emissiveIntensity: 0.8,
        metalness: 0.6
      });
      const coin = new THREE.Mesh(coinGeom, coinMat);
      coin.position.set(room.x + offsetX, room.y + 1.2, room.z + offsetZ);
      scene.add(coin);

      const time = Math.random() * Math.PI * 2;
      coins.push({
        mesh: coin,
        baseY: coin.position.y,
        time,
        collected: false
      });
    }

    function addChest(room, offsetX, offsetZ, hasKey) {
      const chestGeom = new THREE.BoxGeometry(1, 0.7, 0.7);
      const chestMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
      const chest = new THREE.Mesh(chestGeom, chestMat);
      chest.position.set(room.x + offsetX, room.y + 0.4, room.z + offsetZ);
      scene.add(chest);

      interactables.push({
        mesh: chest,
        action: () => {
          if (hasKey) {
            inventory.keys++;
            showInteraction('Found a key!');
          } else {
            inventory.coins += 5;
            showInteraction('Found 5 coins!');
          }
          updateHUD();
          chest.visible = false;
        }
      });
    }

    function addStairs(room) {
      const stairsGeom = new THREE.BoxGeometry(2, 0.3, 3);
      const stairsMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
      const stairs = new THREE.Mesh(stairsGeom, stairsMat);
      stairs.position.set(room.x, room.y + 0.3, room.z);
      scene.add(stairs);

      interactables.push({
        mesh: stairs,
        action: () => {
          currentFloor = currentFloor === 0 ? 1 : 0;
          playerPos.y = 1.7;
          showInteraction(`Floor ${currentFloor + 1}`);
          updateHUD();
        }
      });
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0a);
      scene.fog = new THREE.Fog(0x0a0a0a, 40, 100);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(playerPos.x, playerPos.y, playerPos.z);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      const light = new THREE.PointLight(0xffff99, 1.5, 60);
      light.position.set(0, 5, 0);
      scene.add(light);

      // Create rooms for both floors
      for (let floor = 0; floor < 2; floor++) {
        for (let gx = 0; gx < GRID_SIZE; gx++) {
          for (let gy = 0; gy < GRID_SIZE; gy++) {
            const room = createRoom(gx, gy, floor);
            
            // Add coins
            if (Math.random() < 0.7) addCoin(room, Math.random() * 3 - 1.5, Math.random() * 3 - 1.5);
            if (Math.random() < 0.5) addCoin(room, Math.random() * 3 - 1.5, Math.random() * 3 - 1.5);
            
            // Add chests
            if (Math.random() < 0.3) addChest(room, 2, 2, Math.random() < 0.2);
            if (Math.random() < 0.3) addChest(room, -2, -2, false);
            
            // Add stairs only to floor 0, room 0,0
            if (floor === 0 && gx === 0 && gy === 0) addStairs(room);
          }
        }
      }

      setupControls();
      animate();
    }

    function setupControls() {
      document.addEventListener('keydown', (e) => {
        controls[e.key.toLowerCase()] = true;
      });
      document.addEventListener('keyup', (e) => {
        controls[e.key.toLowerCase()] = false;
      });
      document.addEventListener('mousemove', (e) => {
        if (rightMouseDown) {
          camera.rotation.order = 'YXZ';
          camera.rotation.y -= e.movementX * 0.005;
          camera.rotation.x -= e.movementY * 0.005;
          camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
        }
      });
      document.addEventListener('mousedown', (e) => {
        if (e.button === 2) rightMouseDown = true;
        if (e.button === 0) interact();
      });
      document.addEventListener('mouseup', (e) => {
        if (e.button === 2) rightMouseDown = false;
      });
      document.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    function interact() {
      let closest = null;
      let closestDist = 3;
      for (let obj of interactables) {
        const dist = camera.position.distanceTo(obj.mesh.position);
        if (dist < closestDist) {
          closest = obj;
          closestDist = dist;
        }
      }
      if (closest) closest.action();
    }

    function updateCoins() {
      coins.forEach(c => {
        c.time += 0.02;
        c.mesh.position.y = c.baseY + Math.sin(c.time) * 0.5;
        c.mesh.rotation.x += 0.02;
        
        if (!c.collected && camera.position.distanceTo(c.mesh.position) < 1.5) {
          c.collected = true;
          c.mesh.visible = false;
          inventory.coins++;
          updateHUD();
        }
      });
    }

    function updateHUD() {
      document.getElementById('coins').textContent = inventory.coins;
      document.getElementById('keys').textContent = inventory.keys;
      document.getElementById('floor').textContent = currentFloor + 1;
    }

    function showInteraction(text) {
      const el = document.getElementById('interaction');
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 2000);
    }

    function animate() {
      requestAnimationFrame(animate);

      const speed = 0.1;
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      forward.normalize();
      const right = new THREE.Vector3().crossVectors(camera.up, forward).normalize();

      if (controls['w']) { playerPos.x += forward.x * speed; playerPos.z += forward.z * speed; }
      if (controls['s']) { playerPos.x -= forward.x * speed; playerPos.z -= forward.z * speed; }
      if (controls['a']) { playerPos.x -= right.x * speed; playerPos.z -= right.z * speed; }
      if (controls['d']) { playerPos.x += right.x * speed; playerPos.z += right.z * speed; }

      camera.position.set(playerPos.x, playerPos.y, playerPos.z);
      
      updateCoins();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
