<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ordnance — Fireworks Board</title>
<style>
  :root {
    --ink: #e8e2d0;
    --dim: #8a8574;
    --brass: #c8a24a;
    --brass-dim: #6b5a2e;
    --panel: #14161b;
    --panel-hi: #1c1f27;
    --line: #2a2e38;
    --hot: #ff5b3a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #06070a;
    font-family: "Courier New", ui-monospace, monospace;
    color: var(--ink);
    user-select: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* header readout */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: flex; align-items: baseline; gap: 14px;
    pointer-events: none;
    z-index: 5;
  }
  #hud .brand {
    font-weight: 700; letter-spacing: 3px; font-size: 13px;
    color: var(--brass);
    text-shadow: 0 0 12px rgba(200,162,74,.35);
  }
  #hud .sub { font-size: 10px; letter-spacing: 2px; color: var(--dim); }
  #hud .count { margin-left: auto; font-size: 11px; letter-spacing: 1px; color: var(--dim); }
  #hud .count b { color: var(--ink); }

  /* the launch console */
  #console {
    position: absolute; left: 0; right: 0; bottom: 0;
    z-index: 6;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(180deg, rgba(6,7,10,0) 0%, rgba(6,7,10,.82) 32%, rgba(6,7,10,.96) 100%);
  }
  #tray {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    max-width: 880px; margin: 0 auto;
  }
  .shell {
    position: relative;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-hi), var(--panel));
    border-radius: 9px;
    padding: 9px 6px 8px;
    cursor: pointer;
    text-align: center;
    transition: transform .05s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .shell:hover { border-color: var(--brass-dim); }
  .shell:active, .shell.fired { transform: translateY(2px) scale(.97); }
  .shell.fired { box-shadow: 0 0 0 1px var(--sw), 0 0 18px -2px var(--sw); border-color: var(--sw); }
  .shell .key {
    position: absolute; top: 5px; left: 6px;
    font-size: 9px; color: var(--dim);
    border: 1px solid var(--line); border-radius: 3px;
    padding: 0 3px; line-height: 13px; min-width: 13px;
  }
  .shell .glyph { font-size: 22px; line-height: 1; margin: 3px 0 5px; color: var(--sw); text-shadow: 0 0 10px var(--sw); }
  .shell .name { font-size: 10px; letter-spacing: .5px; color: var(--ink); font-weight700; }
  .shell .name { font-weight: 700; }
  .shell .desc { font-size: 8.5px; letter-spacing: .3px; color: var(--dim); margin-top: 2px; height: 20px; }

  #footline {
    max-width: 880px; margin: 8px auto 0;
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; letter-spacing: 1px; color: var(--dim);
  }
  #footline .hint { flex: 1; }
  #footline .hint b { color: var(--brass); }
  .toggle {
    border: 1px solid var(--line); background: var(--panel);
    color: var(--dim); border-radius: 6px;
    padding: 5px 9px; font: inherit; font-size: 10px; letter-spacing: 1px;
    cursor: pointer;
  }
  .toggle[aria-pressed="true"] { color: var(--brass); border-color: var(--brass-dim); }

  /* tap anywhere-to-aim tip, fades out */
  #tip {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 4; pointer-events: none; text-align: center;
    color: var(--dim); font-size: 12px; letter-spacing: 2px;
    transition: opacity 1.2s ease; opacity: 1;
  }
  #tip.gone { opacity: 0; }
  #tip .big { color: var(--ink); font-size: 15px; letter-spacing: 3px; }

  @media (max-width: 560px) {
    #tray { grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .shell .key { display: none; }
    #hud .sub { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .shell { transition: none; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>

  <div id="hud">
    <span class="brand">ORDNANCE</span>
    <span class="sub">municipal display board</span>
    <span class="count">launched&nbsp;<b id="stat">0</b></span>
  </div>

  <div id="tip">
    <div class="big">pick a shell, then tap the sky to aim</div>
    tap a launch button below — or press 1–6
  </div>

  <div id="console">
    <div id="tray"><!-- built by JS --></div>
    <div id="footline">
      <span class="hint">Auto-aim off: <b>tap/click the sky</b> to set the burst point · <b>Space</b> = repeat last</span>
      <button class="toggle" id="autoBtn" aria-pressed="true">AUTO-AIM: ON</button>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// ORDNANCE — a fireworks shooter. Physics core adapted from the win-screen
// flourish: delta-time integration, mortar rise to apex, star-glyph sparks.
// Extended into distinct shell TYPES, each with its own burst behavior.
// ---------------------------------------------------------------------------

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d", { alpha: false });
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

const GRAV = 320;             // px/s^2
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

// ----- palettes ------------------------------------------------------------
const GOLD   = ["#ffd25b", "#ffb347", "#ffe9a8"];
const CRIMSON= ["#ff5b3a", "#ff2e63", "#ff8a5b"];
const AZURE  = ["#4ad6ff", "#7a8bff", "#b6e3ff"];
const VIOLET = ["#c084ff", "#ff6ad5", "#8a7bff"];
const EMERALD= ["#5bffa0", "#39d98a", "#c8ffdd"];
const RAINBOW= ["#ff5b3a","#ffd25b","#5bffa0","#4ad6ff","#c084ff","#ff6ad5"];
const pick = a => a[(Math.random()*a.length)|0];

// ----- shell catalogue -----------------------------------------------------
// each type defines its rise + a burst() that pushes sparks into `sparks`.
const TYPES = {
  peony: {
    name: "Peony",  glyph: "✸", desc: "classic round burst",
    sw: "#ffd25b", pal: GOLD,
    burst(x, y, pal) {
      const n = 60, spd = 150 + Math.random()*40, c = pick(pal);
      for (let i=0;i<n;i++){
        const a = (i/n)*Math.PI*2 + Math.random()*0.1;
        const s = spd*(0.6+Math.random()*0.5);
        addSpark(x,y, Math.cos(a)*s, Math.sin(a)*s, c, 1.4+Math.random()*0.6, 0.55, "star");
      }
    }
  },
  chrysanth: {
    name: "Chrysanthemum", glyph: "❋", desc: "trailing willow rays",
    sw: "#ff5b3a", pal: CRIMSON,
    burst(x,y,pal){
      const n = 46, spd = 130 + Math.random()*40;
      for (let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2+Math.random()*0.08;
        const s=spd*(0.7+Math.random()*0.4);
        addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s, pick(pal), 1.9+Math.random()*0.8, 0.9, "trail");
      }
    }
  },
  ring: {
    name: "Ring", glyph: "◎", desc: "flat expanding halo",
    sw: "#4ad6ff", pal: AZURE,
    burst(x,y,pal){
      const n=54, spd=170, c=pick(pal), tilt=Math.random()*0.5-0.25;
      for(let i=0;i<n;i++){
        const a=(i/n)*Math.PI*2;
        const vx=Math.cos(a)*spd, vy=Math.sin(a)*spd*0.35 + tilt*spd;
        addSpark(x,y,vx,vy,c,1.3+Math.random()*0.4,0.4,"star");
      }
    }
  },
  crackle: {
    name: "Crackle", glyph: "✺", desc: "popping glitter shell",
    sw: "#c084ff", pal: VIOLET,
    burst(x,y,pal){
      const n=90, spd=110+Math.random()*90;
      for(let i=0;i<n;i++){
        const a=Math.random()*Math.PI*2, s=spd*(0.3+Math.random());
        addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s, pick(pal), 0.7+Math.random()*0.7, 0.3, "glitter");
      }
    }
  },
  palm: {
    name: "Palm", glyph: "❀", desc: "rising fronds + core",
    sw: "#5bffa0", pal: EMERALD,
    burst(x,y,pal){
      const n=12, spd=175, c=pick(pal);
      for(let i=0;i<n;i++){
        const a=(-Math.PI/2) + (i-(n-1)/2)*(Math.PI/n)*0.9;
        addSpark(x,y,Math.cos(a)*spd, Math.sin(a)*spd, c, 1.9+Math.random()*0.5, 1.0, "trail");
      }
      for(let i=0;i<24;i++){
        const a=Math.random()*Math.PI*2, s=60*Math.random();
        addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s,c,0.9,0.5,"glitter");
      }
    }
  },
  finale: {
    name: "Finale", glyph: "✹", desc: "double-break rainbow",
    sw: "#ff6ad5", pal: RAINBOW,
    burst(x,y,pal){
      for(let i=0;i<70;i++){
        const a=(i/70)*Math.PI*2, s=160*(0.6+Math.random()*0.5);
        addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s, pick(pal), 1.3+Math.random()*0.5, 0.5,"star");
      }
      // secondary inner break, slightly delayed via shorter fuse sparks
      for(let i=0;i<40;i++){
        const a=Math.random()*Math.PI*2, s=70*(0.5+Math.random());
        addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s, pick(pal), 1.7+Math.random()*0.6, 0.7,"trail");
      }
    }
  }
};
const ORDER = ["peony","chrysanth","ring","crackle","palm","finale"];

// ----- particle pools ------------------------------------------------------
const shells = [];   // {x,y,vx,vy,type,pal,color,burstY,trail:[]}
const sparks = [];   // {x,y,vx,vy,rot,vrot,life,ttl,color,size,kind,drag,trail:[]}
let launched = 0;
let lastType = "peony";

function addSpark(x,y,vx,vy,color,ttl,drag,kind){
  sparks.push({
    x,y,vx,vy,
    rot: Math.random()*Math.PI*2, vrot:(Math.random()-0.5)*8,
    life:0, ttl, color,
    size: kind==="glitter" ? 3+Math.random()*3 : 11+Math.random()*8,
    kind, drag,
    trail: (kind==="trail" || kind==="star") ? [] : null,
  });
}

function launch(typeKey, tx, ty){
  const T = TYPES[typeKey];
  lastType = typeKey;
  const x = tx != null ? tx : W*(0.2+Math.random()*0.6);
  const burstY = ty != null ? ty : H*(0.16+Math.random()*0.24);
  const rise = Math.max(40, H - burstY);
  const vy = -Math.sqrt(2*GRAV*rise);
  shells.push({
    x, y: H+8,
    vx: (tx!=null ? 0 : (Math.random()-0.5)*40),
    vy, type: typeKey, pal: T.pal, color: pick(T.pal),
    burstY, trail: []
  });
  launched++;
  document.getElementById("stat").textContent = launched;
  flashButton(typeKey);
  dismissTip();
}

// ----- stepping ------------------------------------------------------------
let last = performance.now();
function step(now){
  let dt = (now-last)/1000; last = now;
  if (dt > 0.05) dt = 0.05;

  // shells
  for (let i=shells.length-1;i>=0;i--){
    const s = shells[i];
    s.vy += GRAV*dt; s.x += s.vx*dt; s.y += s.vy*dt;
    s.trail.push(s.x, s.y); if (s.trail.length>10) s.trail.splice(0,2);
    // burst at apex OR when it reaches its intended burst height on the way up
    if (s.vy >= 0 || s.y <= s.burstY){
      TYPES[s.type].burst(s.x, s.y, s.pal);
      shells.splice(i,1);
    }
  }
  // sparks
  for (let i=sparks.length-1;i>=0;i--){
    const p = sparks[i];
    p.vy += GRAV*0.45*dt;
    p.vx *= (1 - p.drag*dt*2);
    p.vy *= (1 - p.drag*dt*0.6);
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.rot += p.vrot*dt;
    p.life += dt;
    if (p.trail){
      p.trail.push(p.x,p.y);
      const cap = p.kind==="star" ? 6 : 12;
      if (p.trail.length > cap) p.trail.splice(0, p.trail.length - cap);
    }
    if (p.life >= p.ttl) sparks.splice(i,1);
  }
}

// ----- drawing -------------------------------------------------------------
function draw(){
  // hard clear every frame: no ghosting, no leftover tint. Glow/afterglow
  // comes from each particle's own fading trail, not from a translucent wipe.
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#06070a";
  ctx.fillRect(0,0,W,H);

  // rising shells
  ctx.globalCompositeOperation = "lighter";
  ctx.lineCap = "round";
  for (const s of shells){
    ctx.strokeStyle = s.color; ctx.lineWidth = 2; ctx.globalAlpha = 0.4;
    ctx.beginPath();
    for (let j=0;j<s.trail.length;j+=2){
      if (j===0) ctx.moveTo(s.trail[j], s.trail[j+1]);
      else ctx.lineTo(s.trail[j], s.trail[j+1]);
    }
    ctx.stroke();
    ctx.globalAlpha = 0.35; ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, 4.5, 0, Math.PI*2); ctx.fill(); // soft halo
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2, 0, Math.PI*2); ctx.fill();   // bright core
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";

  // sparks — no canvas shadowBlur (very expensive per-particle). Additive
  // "lighter" is used only for the spark pass so overlaps read as glow, then
  // we switch straight back. Cleared fully each frame, so nothing accumulates.
  ctx.globalCompositeOperation = "lighter";
  for (const p of sparks){
    const k = p.life/p.ttl;
    const alpha = k < 0.12 ? k/0.12 : (1 - (k-0.12)/0.88);
    if (alpha <= 0) continue;
    ctx.fillStyle = p.color;
    ctx.strokeStyle = p.color;

    if (p.kind === "glitter"){
      const tw = 0.5 + 0.5*Math.sin(p.life*40 + p.rot*6);
      ctx.globalAlpha = Math.max(0, alpha*tw);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.5, 0, Math.PI*2); ctx.fill();
    } else if (p.kind === "trail"){
      // fading polyline gives the willow/palm afterglow for free
      if (p.trail && p.trail.length >= 4){
        ctx.globalAlpha = alpha * 0.6;
        ctx.lineWidth = 2; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(p.trail[0], p.trail[1]);
        for (let j=2;j<p.trail.length;j+=2) ctx.lineTo(p.trail[j], p.trail[j+1]);
        ctx.stroke();
      }
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, Math.PI*2); ctx.fill();
    } else { // star: short streak + soft outer dot + bright core (cheap glow)
      if (p.trail && p.trail.length >= 4){
        ctx.globalAlpha = alpha * 0.4;
        ctx.lineWidth = 1.6; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(p.trail[0], p.trail[1]);
        for (let j=2;j<p.trail.length;j+=2) ctx.lineTo(p.trail[j], p.trail[j+1]);
        ctx.stroke();
      }
      ctx.globalAlpha = alpha * 0.35;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.28, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.12, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";
}

function loop(now){ step(now); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// ----- build the console ---------------------------------------------------
const tray = document.getElementById("tray");
ORDER.forEach((key, idx) => {
  const T = TYPES[key];
  const el = document.createElement("div");
  el.className = "shell";
  el.style.setProperty("--sw", T.sw);
  el.dataset.type = key;
  el.innerHTML =
    `<span class="key">${idx+1}</span>`+
    `<div class="glyph">${T.glyph}</div>`+
    `<div class="name">${T.name}</div>`+
    `<div class="desc">${T.desc}</div>`;
  el.addEventListener("click", () => launch(key));
  tray.appendChild(el);
});

function flashButton(key){
  const el = tray.querySelector(`[data-type="${key}"]`);
  if (!el) return;
  el.classList.add("fired");
  setTimeout(()=>el.classList.remove("fired"), 140);
}

// ----- aiming: tap/click the sky ------------------------------------------
let autoAim = true;
const autoBtn = document.getElementById("autoBtn");
autoBtn.addEventListener("click", () => {
  autoAim = !autoAim;
  autoBtn.setAttribute("aria-pressed", String(autoAim));
  autoBtn.textContent = `AUTO-AIM: ${autoAim ? "ON" : "OFF"}`;
});

// clicking/tapping the sky region launches lastType at that point.
// (console + hud swallow their own events so buttons still work.)
function skyAim(clientX, clientY){
  // ignore taps that land on the console or hud
  const consoleTop = document.getElementById("console").getBoundingClientRect().top;
  if (clientY >= consoleTop) return;
  launch(lastType, clientX, clientY);
}
canvas.addEventListener("pointerdown", (e) => {
  if (autoAim) return;                 // in auto mode, sky taps do nothing special
  skyAim(e.clientX, e.clientY);
});
// In AUTO mode, tapping the sky still fires (at that x, auto height) — feels good on mobile.
canvas.addEventListener("pointerdown", (e) => {
  if (!autoAim) return;
  const consoleTop = document.getElementById("console").getBoundingClientRect().top;
  if (e.clientY >= consoleTop) return;
  launch(lastType, e.clientX, null);
});

// ----- keyboard (Win11) ----------------------------------------------------
window.addEventListener("keydown", (e) => {
  if (e.repeat) return;
  const n = parseInt(e.key, 10);
  if (n >= 1 && n <= ORDER.length) { launch(ORDER[n-1]); return; }
  if (e.code === "Space") { e.preventDefault(); launch(lastType); }
  if (e.key.toLowerCase() === "a") { autoBtn.click(); }
});

// ----- tip fade ------------------------------------------------------------
const tipEl = document.getElementById("tip");
let tipDismissed = false;
function dismissTip(){ if (tipDismissed) return; tipDismissed = true; tipEl.classList.add("gone"); }
setTimeout(dismissTip, 6000);

// gentle idle: if nothing launched in a while, pop one so the sky's never dead
let idleTimer = setInterval(() => {
  if (shells.length === 0 && sparks.length < 20 && !document.hidden) {
    launch(ORDER[(Math.random()*ORDER.length)|0]);
  }
}, 4200);
</script>
</body>
</html>
