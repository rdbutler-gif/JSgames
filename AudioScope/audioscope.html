<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUDIOSCOPE</title>
<style>
  :root {
    --bg: #0a0e0d;
    --panel: #111816;
    --phosphor: #36e07a;
    --phosphor-dim: #1a6b3c;
    --amber: #e0a236;
    --grid: #14241c;
    --text: #6f8a7e;
    --bezel: #1c2622;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(circle at 50% 0%, #0d1411 0%, var(--bg) 70%);
    color: var(--text);
    font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding: 1rem 1.4rem 0.8rem;
    border-bottom: 1px solid var(--bezel);
  }
  h1 {
    font-size: 1.05rem;
    letter-spacing: 0.45em;
    color: var(--phosphor);
    font-weight: 600;
    text-shadow: 0 0 12px var(--phosphor-dim);
  }
  .sub { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text); opacity: 0.7; }
  .scope-wrap {
    flex: 1;
    position: relative;
    margin: 0.9rem 1.4rem;
    border: 1px solid var(--bezel);
    border-radius: 6px;
    background: var(--panel);
    box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px #000;
    overflow: hidden;
    min-height: 340px;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .scanlines {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px);
    mix-blend-mode: multiply;
  }
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.7);
  }
  .readout {
    position: absolute; top: 10px; left: 14px;
    font-size: 0.65rem; letter-spacing: 0.15em;
    color: var(--phosphor-dim); pointer-events: none;
    line-height: 1.6;
  }
  .readout b { color: var(--phosphor); }
  .controls {
    display: flex; flex-wrap: wrap; align-items: center; gap: 0.7rem;
    padding: 0 1.4rem 1.2rem;
  }
  button, label.file, select {
    background: var(--bezel);
    color: var(--phosphor);
    border: 1px solid var(--phosphor-dim);
    padding: 0.5rem 0.9rem;
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button:hover, label.file:hover, select:hover {
    background: var(--phosphor-dim); color: #d9ffe9;
    box-shadow: 0 0 10px var(--phosphor-dim);
  }
  button:disabled { opacity: 0.35; cursor: default; box-shadow: none; }
  input[type=file] { display: none; }
  .now { font-size: 0.72rem; color: var(--amber); letter-spacing: 0.08em; flex: 1; min-width: 140px; }
  .meter {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.65rem; letter-spacing: 0.1em;
  }
  input[type=range] { width: 90px; accent-color: var(--phosphor); }
  .modes { display: flex; gap: 0.3rem; }
  .modes button.active { background: var(--phosphor); color: #06140c; box-shadow: 0 0 14px var(--phosphor); }
  @media (prefers-reduced-motion: reduce) { .scanlines { display: none; } }
</style>
</head>
<body>
  <header>
    <h1>AUDIOSCOPE</h1>
    <span class="sub">SPECTRUM · WAVEFORM · TRANSIENT FIELD</span>
  </header>

  <div class="scope-wrap">
    <canvas id="scope"></canvas>
    <div class="readout" id="readout"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
  </div>

  <div class="controls">
    <label class="file" for="audiofile">LOAD FILE</label>
    <input type="file" id="audiofile" accept="audio/*">
    <button id="playBtn" disabled>PLAY</button>
    <span class="now" id="nowPlaying">— no signal —</span>
    <div class="modes">
      <button data-mode="bars" class="active">BARS</button>
      <button data-mode="wave">WAVE</button>
      <button data-mode="field">FIELD</button>
      <button data-mode="all">ALL</button>
    </div>
    <div class="meter">
      GAIN
      <input type="range" id="gain" min="0.2" max="3" step="0.05" value="1">
    </div>
  </div>

<script>
const cvs = document.getElementById('scope');
const ctx = cvs.getContext('2d');
const fileInput = document.getElementById('audiofile');
const playBtn = document.getElementById('playBtn');
const nowPlaying = document.getElementById('nowPlaying');
const readout = document.getElementById('readout');
const gainSlider = document.getElementById('gain');
const modeBtns = [...document.querySelectorAll('.modes button')];

let audioCtx, analyser, source, gainNode, audioEl;
let freqData, timeData;
let mode = 'bars';
let raf = null;
let particles = [];
let lastBass = 0, bassAvg = 0, ringR = 0;
// kaleidoscope bloom: 0 = pure green baseline, 1 = full rainbow mandala.
// It eases up on a trigger then drains back down, so color comes in periods.
let bloom = 0;            // current bloom level 0..1
let bloomTarget = 0;      // where bloom is easing toward
let bloomHold = 0;        // frames left to hold at full before draining
let nextRandomBloom = 240 + Math.random() * 600; // self-triggering timer
let frame = 0;
let loudAvg = 0;          // rolling loudness, to detect a "big hit"
let lastLoud = 0;         // most recent loudness, shared with paintField
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function resize() {
  const r = cvs.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cvs.width = r.width * dpr;
  cvs.height = r.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

function initAudio(file) {
  if (audioEl) { audioEl.pause(); URL.revokeObjectURL(audioEl.src); }
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.55;
    gainNode = audioCtx.createGain();
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
    gainNode.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  audioEl = new Audio();
  audioEl.src = URL.createObjectURL(file);
  audioEl.crossOrigin = 'anonymous';
  source = audioCtx.createMediaElementSource(audioEl);
  source.connect(gainNode);
  audioEl.addEventListener('ended', () => { playBtn.textContent = 'PLAY'; });
  playBtn.disabled = false;
  playBtn.textContent = 'PLAY';
  nowPlaying.textContent = file.name;
}

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) { initAudio(f); }
});

playBtn.addEventListener('click', () => {
  if (!audioEl) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (audioEl.paused) { audioEl.play(); playBtn.textContent = 'PAUSE'; }
  else { audioEl.pause(); playBtn.textContent = 'PLAY'; }
});

gainSlider.addEventListener('input', () => {
  if (gainNode) gainNode.gain.value = parseFloat(gainSlider.value);
});

modeBtns.forEach(b => b.addEventListener('click', () => {
  modeBtns.forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  mode = b.dataset.mode;
}));

function bandEnergy(lo, hi) {
  let sum = 0;
  for (let i = lo; i < hi; i++) sum += freqData[i];
  return sum / (hi - lo) / 255;
}

function drawGrid(w, h) {
  ctx.strokeStyle = 'rgba(54,224,122,0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= w; x += w / 12) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = 0; y <= h; y += h / 8) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
}

function drawBars(w, h) {
  const bins = analyser.frequencyBinCount;
  const bars = 96;
  const bw = w / bars;
  for (let i = 0; i < bars; i++) {
    // logarithmic-ish bin mapping so bass doesn't dominate the width
    const idx = Math.floor(Math.pow(i / bars, 2) * bins);
    const v = freqData[idx] / 255;
    const bh = v * h * 0.9;
    const hue = 140 - v * 90; // green -> amber on peaks
    ctx.fillStyle = `hsl(${hue}, 80%, ${30 + v * 35}%)`;
    ctx.fillRect(i * bw, h - bh, bw - 1, bh);
    // peak cap glow
    ctx.fillStyle = `hsla(${hue},90%,70%,0.9)`;
    ctx.fillRect(i * bw, h - bh, bw - 1, 2);
  }
}

function drawWave(w, h) {
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'var(--phosphor)';
  ctx.strokeStyle = '#36e07a';
  ctx.shadowColor = '#36e07a';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  const slice = w / timeData.length;
  for (let i = 0; i < timeData.length; i++) {
    const v = timeData[i] / 128 - 1;
    const y = h / 2 + v * h * 0.42;
    i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * slice, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// updates the bloom envelope each frame: rises on a trigger, holds, drains.
function updateBloom(loud) {
  frame++;
  // detect a big hit: loudness well above its rolling average
  loudAvg = loudAvg * 0.95 + loud * 0.05;
  const hit = loud - loudAvg;
  if (hit > 0.18 && bloom < 0.2 && !reduceMotion) {
    bloomTarget = 1; bloomHold = 90 + Math.random() * 150;
  }
  // self-triggering timer so blooms also happen on quiet passages
  if (--nextRandomBloom <= 0 && !reduceMotion) {
    bloomTarget = 1; bloomHold = 90 + Math.random() * 150;
    nextRandomBloom = 360 + Math.random() * 900;
  }
  // envelope: ease toward target, hold at full, then drain back to 0
  if (bloomTarget === 1) {
    bloom += (1 - bloom) * 0.06;
    if (bloom > 0.95) { if (--bloomHold <= 0) bloomTarget = 0; }
  } else {
    bloom += (0 - bloom) * 0.03;
    if (bloom < 0.01) bloom = 0;
  }
}

// draws the particles + ring once, in the current coordinate frame.
// hueShift rotates colour; sat/light scale with bloom so green fades to rainbow.
function paintField(w, h, cx, cy) {
  const spin = frame * 0.01 * bloom; // particles drift in colour as bloom rises
  particles.forEach(p => {
    // base hue from particle, pushed around the wheel during a bloom
    const hue = (p.hue + bloom * (p.ang * 57 + spin * 60)) % 360;
    const sat = 85;
    const light = 45 + bloom * 20;
    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${Math.max(0, p.life)})`;
    const s = 1.5 + p.life * 3 * (1 + bloom);
    ctx.fillRect(cx + p.x, cy + p.y, s, s);
  });
  // ring colour also blooms
  const ringHue = (140 + bloom * (frame * 2 % 360)) % 360;
  ctx.strokeStyle = `hsla(${ringHue},85%,${55 + bloom*10}%,${0.25 + lastLoud})`;
  ctx.lineWidth = 1.5 + lastLoud * 8;
  ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2); ctx.stroke();
}

function drawField(w, h) {
  const lead = bandEnergy(8, 40);   // guitar lead / note attacks live here
  const mid = bandEnergy(20, 80);
  // slow baseline = a long-term floor, so individual notes stay above it
  bassAvg = bassAvg * 0.97 + lead * 0.03;
  const attack = lead - bassAvg;
  // burst budget: sharp attacks spray a lot, sustained energy keeps a steady drizzle
  let n = 0;
  if (attack > 0.02 && !reduceMotion) n += Math.floor((lead + attack * 3) * 60);
  if (lead > 0.12 && !reduceMotion) n += Math.floor(lead * 14); // floor burst
  if (n > 0) {
    const sp = 3 + (lead + Math.max(0, attack) * 4) * 22;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({
        x: 0, y: 0,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        ang: a,                       // launch angle, used for rainbow mapping
        life: 1, hue: 140 - mid * 100
      });
    }
  }
  if (particles.length > 1200) particles.splice(0, particles.length - 1200);

  // advance physics once (positions are relative to field centre now)
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.985; p.vy *= 0.985;
    p.life -= 0.011;
  });
  particles = particles.filter(p => p.life > 0);

  const loud = bandEnergy(1, 200);
  lastLoud = loud;
  ringR = ringR * 0.82 + (loud * Math.min(w, h) * 1.6) * 0.18;
  updateBloom(loud);

  const cx = w / 2, cy = h / 2;
  ctx.shadowColor = bloom > 0.05 ? `hsl(${frame*2%360},90%,60%)` : '#36e07a';
  ctx.shadowBlur = 6 + bloom * 6;

  if (bloom < 0.02) {
    // pure baseline: draw once, no symmetry, cheapest path
    paintField(w, h, cx, cy);
  } else {
    // kaleidoscope: mirror the field into N wedges around the centre.
    // segments grow with the bloom for a "shapes emerging" feel.
    const seg = 6 + Math.round(bloom * 6); // 6..12 wedges
    ctx.save();
    ctx.translate(cx, cy);
    for (let i = 0; i < seg; i++) {
      ctx.save();
      ctx.rotate((i / seg) * Math.PI * 2);
      if (i % 2) ctx.scale(1, -1); // mirror alternate wedges -> true kaleidoscope
      paintField(w, h, 0, 0);
      ctx.restore();
    }
    ctx.restore();
  }
  ctx.shadowBlur = 0;
}

function render() {
  raf = requestAnimationFrame(render);
  const w = cvs.clientWidth, h = cvs.clientHeight;
  if (!analyser) { ctx.clearRect(0, 0, w, h); drawGrid(w, h); return; }

  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  // opaque clear every frame — no alpha-fade residue. FIELD trails come from
  // each particle's own life decay, not from a translucent overlay.
  ctx.fillStyle = '#0a0e0d';
  ctx.fillRect(0, 0, w, h);
  drawGrid(w, h);

  if (mode === 'bars') drawBars(w, h);
  else if (mode === 'wave') drawWave(w, h);
  else if (mode === 'field') drawField(w, h);
  else { // all — split panes
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, w, h * 0.5); ctx.clip();
    ctx.translate(0, 0); drawBars(w, h * 0.5); ctx.restore();
    ctx.save();
    ctx.beginPath(); ctx.rect(0, h * 0.5, w, h * 0.5); ctx.clip();
    ctx.save(); ctx.translate(0, h * 0.5); drawWave(w, h * 0.5); ctx.restore();
    drawField(w, h); ctx.restore();
  }

  const bass = bandEnergy(1, 8), mid = bandEnergy(20, 80), treble = bandEnergy(200, 500);
  readout.innerHTML =
    `MODE <b>${mode.toUpperCase()}</b>  FFT <b>${analyser.fftSize}</b><br>` +
    `LOW <b>${(bass*100|0).toString().padStart(3,'0')}</b> ` +
    `MID <b>${(mid*100|0).toString().padStart(3,'0')}</b> ` +
    `HI <b>${(treble*100|0).toString().padStart(3,'0')}</b>`;
}
render();
</script>
</body>
</html>
